<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zedtopvibes · Album Details</title>
    
    <!-- Resource Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Main CSS -->
    <link rel="stylesheet" href="/css/style.css">
    
</head>
<body>
    <!-- Header loads here -->
    <div id="header-placeholder"></div>
<!-- Instead of custom classes, use the reusable ones -->
<div class="detail-breadcrumb">
    <a href="/">Home</a> » 
    <a href="/music.html">Music</a> » 
    <strong id="breadcrumb-title">Album Details</strong>
</div>

<div class="detail-header" id="album-header">
    <div class="detail-artwork">
        <img id="album-cover" src="/images/default-album.jpg" alt="Album cover">
    </div>
    <div class="detail-info">
        <h1 class="detail-title" id="album-title">Loading...</h1>
        <a class="detail-subtitle-link" id="album-artist">Loading...</a>
        <div class="detail-meta">
            <span class="detail-meta-item"><i class="fas fa-calendar-alt"></i> <span id="album-release">---</span></span>
            <span class="detail-meta-item"><i class="fas fa-music"></i> <span id="album-tracks-count">---</span> tracks</span>
            <span class="detail-meta-item"><i class="fas fa-clock"></i> <span id="album-duration">---</span></span>
            <span class="detail-meta-item"><i class="fas fa-headphones"></i> <span id="album-plays">---</span> plays</span>
        </div>
        <p class="detail-description" id="album-description">Loading album description...</p>
        
        <div class="share-buttons">
            <button class="share-btn share-telegram" onclick="shareTelegram()"><i class="fab fa-telegram"></i> Telegram</button>
            <button class="share-btn share-facebook" onclick="shareFacebook()"><i class="fab fa-facebook"></i> Facebook</button>
            <button class="share-btn share-whatsapp" onclick="shareWhatsApp()"><i class="fab fa-whatsapp"></i> WhatsApp</button>
            <button class="share-btn share-copy" onclick="copyLink()"><i class="fas fa-link"></i> Copy Link</button>
        </div>
    </div>
</div>
    <!-- ===== TRACKLIST SECTION ===== -->
    <div class="section-header" style="margin-top:0;">
        <h2 class="section-title">
            <i class="fas fa-align-left" style="margin-right: 8px;"></i>
            Tracklist
        </h2>
    </div>
    
    <div class="corner">
        <div class="music-grid" id="tracklist-container">
            <div class="loading-spinner">Loading tracks...</div>
        </div>
    </div>

    <!-- ===== PAGINATION FOR TRACKLIST ===== -->
    <div class="page-navi" align="center">
        <!-- Pagination buttons will be added by JavaScript -->
    </div>

    <!-- ===== RECOMMENDED ALBUMS SECTION ===== -->
    <div class="section-header section-spacing">
        <h2 class="section-title">
            <i class="fas fa-thumbs-up" style="margin-right: 8px;"></i>
            Recommended Albums
        </h2>
    </div>
    
    <div class="corner">
        <div class="music-grid" id="recommended-container">
            <div class="loading-spinner">Loading recommendations...</div>
        </div>
    </div>

    <!-- Footer loads here -->
    <div id="footer-placeholder"></div>

    <!-- Album Page JavaScript -->
    <script>
        // API Base - using main site
        const API_BASE = 'https://zedtopvibes.pages.dev/api';
        const IMAGE_BASE = 'https://zedtopvibes.pages.dev';
        
        // Pagination variables
        let currentTrackPage = 1;
        let tracksPerPage = 8;
        let allTracks = [];
        
        // Helper functions
        function formatDuration(seconds) {
            if (!seconds) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        function getAlbumImage(album) {
            if (album.cover_url && album.cover_url !== 'null' && album.cover_url !== '') {
                if (album.cover_url.startsWith('/')) {
                    return `${IMAGE_BASE}${album.cover_url}`;
                }
                return album.cover_url;
            }
            return '/images/default-album.jpg';
        }
        
        // Calculate total duration from tracks
        function calculateTotalDuration(tracks) {
            if (!tracks || tracks.length === 0) return '0 min';
            const totalSeconds = tracks.reduce((sum, track) => sum + (track.duration || 0), 0);
            const minutes = Math.floor(totalSeconds / 60);
            if (minutes > 60) {
                const hours = Math.floor(minutes / 60);
                const remainingMinutes = minutes % 60;
                return `${hours} hr ${remainingMinutes} min`;
            }
            return `${minutes} min`;
        }
        
        // Get album slug from URL path (clean URL: /album/neon-dreams)
        function getAlbumSlug() {
            const path = window.location.pathname;
            const cleanPath = path.replace(/\/$/, '');
            const match = cleanPath.match(/\/album\/([^\/]+)/);
            return match ? match[1] : null;
        }
        
        // Render tracklist with pagination
        function renderTracklist(tracks) {
            const container = document.getElementById('tracklist-container');
            if (!container) return;
            
            if (!tracks || tracks.length === 0) {
                container.innerHTML = '<div class="error-message">No tracks found for this album</div>';
                const paginationDiv = document.querySelector('.page-navi');
                if (paginationDiv) paginationDiv.style.display = 'none';
                return;
            }
            
            // Store all tracks globally
            allTracks = tracks;
            
            // Calculate pagination
            const totalPages = Math.ceil(allTracks.length / tracksPerPage);
            const start = (currentTrackPage - 1) * tracksPerPage;
            const end = start + tracksPerPage;
            const paginatedTracks = allTracks.slice(start, end);
            
            // Render tracks for current page
            container.innerHTML = paginatedTracks.map((track, index) => {
                const actualIndex = start + index;
                return `
                    <a href="/song/${track.slug || track.id}" class="music-item">
                        <div class="item-container">
                            <div class="item-thumb">
                                <div class="roundthumb track-number" style="background: #ff5500; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">
                                    ${String(actualIndex + 1).padStart(2, '0')}
                                </div>
                            </div>
                            <div class="item-data">
                                <span class="track-title"><b>${escapeHtml(track.title)}</b></span>
                                <div class="artist-name">${escapeHtml(track.artist || 'Unknown Artist')}</div>
                                <span class="item-meta">
                                    <b style="color:#ff0000">${formatDuration(track.duration)}</b>
                                </span>
                            </div>
                        </div>
                    </a>
                `;
            }).join('');
            
            // Update pagination buttons
            updatePaginationButtons(totalPages);
        }
        
        // Update pagination HTML
        function updatePaginationButtons(totalPages) {
            const paginationContainer = document.querySelector('.page-navi');
            if (!paginationContainer) return;
            
            if (totalPages <= 1) {
                paginationContainer.style.display = 'none';
                return;
            }
            
            paginationContainer.style.display = 'block';
            
            let html = '';
            
            // Page 1 button
            if (currentTrackPage === 1) {
                html += `<span aria-current="page" class="page-numbers current">1</span>`;
            } else {
                html += `<a class="page-numbers" href="#" onclick="loadTracklistPage(1); return false;">1</a>`;
            }
            
            // Show ellipsis if needed
            if (currentTrackPage > 3) {
                html += `<span class="page-numbers dots">…</span>`;
            }
            
            // Pages around current
            for (let i = Math.max(2, currentTrackPage - 1); i <= Math.min(totalPages - 1, currentTrackPage + 1); i++) {
                if (i === currentTrackPage) {
                    html += `<span aria-current="page" class="page-numbers current">${i}</span>`;
                } else {
                    html += `<a class="page-numbers" href="#" onclick="loadTracklistPage(${i}); return false;">${i}</a>`;
                }
            }
            
            // Show ellipsis if needed
            if (currentTrackPage < totalPages - 2) {
                html += `<span class="page-numbers dots">…</span>`;
            }
            
            // Last page button
            if (totalPages > 1) {
                if (currentTrackPage === totalPages) {
                    html += `<span aria-current="page" class="page-numbers current">${totalPages}</span>`;
                } else {
                    html += `<a class="page-numbers" href="#" onclick="loadTracklistPage(${totalPages}); return false;">${totalPages}</a>`;
                }
            }
            
            // Next button
            if (currentTrackPage < totalPages) {
                html += `<a class="next page-numbers" href="#" onclick="loadTracklistPage(${currentTrackPage + 1}); return false;">Next »</a>`;
            }
            
            paginationContainer.innerHTML = html;
        }
        
        // Load tracklist page
        window.loadTracklistPage = function(page) {
            currentTrackPage = page;
            renderTracklist(allTracks);
            // Scroll to tracklist section
            const tracklistSection = document.querySelector('.section-header');
            if (tracklistSection) {
                tracklistSection.scrollIntoView({ behavior: 'smooth' });
            }
        };
        
        // ===== SHARE FUNCTIONS =====
        function getCurrentPageUrl() {
            return window.location.href;
        }
        
        function getShareText() {
            const albumTitle = document.getElementById('album-title')?.textContent || 'Album';
            const artistName = document.getElementById('album-artist')?.textContent || 'Artist';
            return `🎵 Check out "${albumTitle}" by ${artistName} on Zedtopvibes!`;
        }
        
        window.shareTelegram = function() {
            const url = getCurrentPageUrl();
            const text = getShareText();
            window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`, '_blank', 'noopener,noreferrer');
        };
        
        window.shareFacebook = function() {
            const url = getCurrentPageUrl();
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank', 'noopener,noreferrer');
        };
        
        window.shareWhatsApp = function() {
            const url = getCurrentPageUrl();
            const text = getShareText();
            window.open(`https://wa.me/?text=${encodeURIComponent(text + ' ' + url)}`, '_blank', 'noopener,noreferrer');
        };
        
        window.copyLink = function() {
            const url = getCurrentPageUrl();
            navigator.clipboard.writeText(url).then(() => {
                const copyBtn = document.querySelector('.share-btn.copy');
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                }, 2000);
            }).catch(() => {
                alert('Failed to copy link. Please copy manually: ' + url);
            });
        };
        
        // Load recommended albums
        async function loadRecommendedAlbums(currentAlbumId, currentArtist) {
            const container = document.getElementById('recommended-container');
            if (!container) return;
            
            try {
                const response = await fetch(`${API_BASE}/albums`);
                const albums = await response.json();
                const albumList = Array.isArray(albums) ? albums : (albums.results || []);
                
                let recommendations = albumList.filter(album => album.id != currentAlbumId);
                
                if (currentArtist) {
                    const sameArtist = recommendations.filter(album => album.artist === currentArtist);
                    if (sameArtist.length > 0) {
                        recommendations = [...sameArtist, ...recommendations.filter(a => a.artist !== currentArtist)];
                    }
                }
                
                recommendations = recommendations.slice(0, 6);
                
                if (!recommendations || recommendations.length === 0) {
                    container.innerHTML = '<div class="error-message">No recommendations available</div>';
                    return;
                }
                
                container.innerHTML = recommendations.map(album => `
                    <a href="/album/${album.slug}" class="music-item">
                        <div class="item-container">
                            <div class="item-thumb">
                                <img src="${getAlbumImage(album)}" 
                                     width="80" height="80" 
                                     class="roundthumb" 
                                     alt="${escapeHtml(album.title)}"
                                     onerror="this.src='/images/default-album.jpg'">
                            </div>
                            <div class="item-data">
                                <span class="track-title"><b>${escapeHtml(album.title)}</b></span>
                                <div class="artist-name">${escapeHtml(album.artist || 'Unknown Artist')}</div>
                                <span class="item-meta">
                                    <b style="color:#ff0000">${album.track_count || 0} tracks</b>
                                    ${album.release_date ? `<span style="margin-left:8px">${new Date(album.release_date).getFullYear()}</span>` : ''}
                                </span>
                            </div>
                        </div>
                    </a>
                `).join('');
                
            } catch (error) {
                console.error('Error loading recommendations:', error);
                container.innerHTML = '<div class="error-message">Failed to load recommendations</div>';
            }
        }
        
        // Load album details
        async function loadAlbumDetails() {
            const albumSlug = getAlbumSlug();
            
            if (!albumSlug) {
                document.getElementById('album-title').textContent = 'Album not specified';
                document.getElementById('album-description').textContent = 'No album slug provided in URL.';
                document.getElementById('tracklist-container').innerHTML = '<div class="error-message">Invalid album link</div>';
                document.getElementById('recommended-container').innerHTML = '';
                const paginationDiv = document.querySelector('.page-navi');
                if (paginationDiv) paginationDiv.style.display = 'none';
                return;
            }
            
            try {
                const apiUrl = `${API_BASE}/album/by-slug/${albumSlug}`;
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error('Album not found');
                }
                
                const album = await response.json();
                
                // Show header now that we have data
                document.getElementById('album-header').style.display = 'flex';
                
                // Populate album header
                document.getElementById('album-title').textContent = album.title || 'Untitled';
                document.getElementById('album-artist').textContent = album.artist || 'Unknown Artist';
                document.getElementById('album-artist').setAttribute('data-artist', album.artist || '');
                document.getElementById('breadcrumb-title').textContent = album.title || 'Album Details';
                
                // Release date
                const releaseYear = album.release_date ? new Date(album.release_date).getFullYear() : 'TBA';
                document.getElementById('album-release').textContent = releaseYear;
                
                // Track count
                const trackCount = album.tracks?.length || album.stats?.track_count || 0;
                document.getElementById('album-tracks-count').textContent = trackCount;
                
                // Duration
                const totalDuration = calculateTotalDuration(album.tracks || []);
                document.getElementById('album-duration').textContent = totalDuration;
                
                // Plays
                const totalPlays = album.stats?.total_plays || album.plays || 0;
                document.getElementById('album-plays').textContent = formatNumber(totalPlays);
                
                // Description
                document.getElementById('album-description').textContent = album.description || 'No description available.';
                
                // Album cover
                const coverImg = document.getElementById('album-cover');
                if (album.cover_url) {
                    const coverUrl = album.cover_url.startsWith('/') ? `${IMAGE_BASE}${album.cover_url}` : album.cover_url;
                    coverImg.src = coverUrl;
                } else {
                    coverImg.src = '/images/default-album.jpg';
                }
                
                // Reset pagination and render tracklist
                currentTrackPage = 1;
                renderTracklist(album.tracks || []);
                
                // Load recommended albums
                await loadRecommendedAlbums(album.id, album.artist);
                
            } catch (error) {
                console.error('Error loading album:', error);
                document.getElementById('album-title').textContent = 'Error loading album';
                document.getElementById('album-description').textContent = error.message;
                document.getElementById('tracklist-container').innerHTML = '<div class="error-message">Failed to load album. The album may not exist.</div>';
                document.getElementById('recommended-container').innerHTML = '';
                document.getElementById('album-header').style.display = 'flex';
                const paginationDiv = document.querySelector('.page-navi');
                if (paginationDiv) paginationDiv.style.display = 'none';
            }
        }
        
        // Load header and footer
        async function loadHeaderAndFooter() {
            try {
                const [headerData, footerData] = await Promise.all([
                    fetch('/header.html').then(r => r.text()),
                    fetch('/footer.html').then(r => r.text())
                ]);
                
                const headerPlaceholder = document.getElementById('header-placeholder');
                const footerPlaceholder = document.getElementById('footer-placeholder');
                
                if (headerPlaceholder) headerPlaceholder.innerHTML = headerData;
                if (footerPlaceholder) footerPlaceholder.innerHTML = footerData;
            } catch (error) {
                console.log('Header/footer files not found:', error);
            }
        }
        
        // Artist click handler
        document.addEventListener('click', function(e) {
            const artistLink = e.target.closest('#album-artist');
            if (artistLink) {
                e.preventDefault();
                const artistName = artistLink.textContent;
                if (artistName && artistName !== 'Loading...' && artistName !== 'Unknown Artist') {
                    const slug = artistName.toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]/g, '');
                    window.location.href = `/artist/${slug}`;
                }
            }
        });
        
        // Load everything when page is ready
        document.addEventListener('DOMContentLoaded', async function() {
            await loadHeaderAndFooter();
            await loadAlbumDetails();
        });
    </script>
</body>
</html>
