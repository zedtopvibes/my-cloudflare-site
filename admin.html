<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Zedtopvibes Admin Login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin: 0;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 380px;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }
        
        input {
            width: 100%;
            padding: 16px 14px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }
        
        input:focus {
            outline: none;
            border-color: #6c5ce7;
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 12px;
            cursor: pointer;
            transition: background 0.2s;
            -webkit-appearance: none;
        }
        
        button:hover {
            background: #5b4bc4;
        }
        
        button:disabled {
            background: #a0a0a0;
            cursor: not-allowed;
        }
        
        .error-message {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 16px;
            display: none;
        }
        
        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 16px;
            display: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 16px;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6c5ce7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .demo-hint {
            margin-top: 24px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            text-align: center;
        }
        
        .music-note {
            text-align: center;
            margin-bottom: 16px;
        }
        
        .music-note svg {
            width: 48px;
            height: 48px;
            fill: #6c5ce7;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="music-note">
            <svg viewBox="0 0 24 24">
                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
            </svg>
        </div>
        
        <h1>ZEDTOPVIBES</h1>
        <div class="subtitle">Admin Access</div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
            </div>
            
            <button type="submit" id="loginBtn">Access Dashboard</button>
            
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <div style="margin-top: 8px;">Verifying...</div>
            </div>
        </form>
        
        <div class="demo-hint">
            🔐 Credentials set in Cloudflare Dashboard
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loading = document.getElementById('loading');

        // Check if already logged in
        if (localStorage.getItem('admin_logged_in') === 'true') {
            const loginTime = localStorage.getItem('admin_login_time');
            if (loginTime) {
                const hoursSince = (Date.now() - parseInt(loginTime)) / (1000 * 60 * 60);
                if (hoursSince < 24) {
                    window.location.href = '/admin/';
                }
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            
            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }
            
            // Show loading
            loginBtn.disabled = true;
            loading.style.display = 'block';
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    successMessage.textContent = 'Login successful! Redirecting...';
                    successMessage.style.display = 'block';
                    loading.style.display = 'none';
                    
                    localStorage.setItem('admin_logged_in', 'true');
                    localStorage.setItem('admin_login_time', Date.now().toString());
                    
                    setTimeout(() => {
                        window.location.href = '/admin/';
                    }, 1000);
                } else {
                    showError(data.error || 'Invalid credentials');
                }
            } catch (error) {
                showError('Connection error. Please try again.');
                console.error('Login error:', error);
            }
        });
        
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            loginBtn.disabled = false;
            loading.style.display = 'none';
        }
    </script>
</body>
</html>
