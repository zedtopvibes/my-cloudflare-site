<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email - ZedTopVibes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            width: 100%;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            margin-bottom: 16px;
            color: #333;
        }
        p {
            color: #666;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 20px;
            text-align: center;
            letter-spacing: 4px;
            font-weight: 600;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button.secondary {
            background: #6c757d;
            margin-top: 12px;
        }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .back-link {
            display: block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎵 Verify Your Email</h1>
            <p>We sent a 6-digit verification code to <strong id="emailDisplay"></strong></p>
            <input type="text" id="code" placeholder="Enter 6-digit code" maxlength="6">
            <button onclick="verifyCode()">Verify Email</button>
            <button class="secondary" onclick="resendCode()">Resend Code</button>
            <a href="/" class="back-link">← Back to Login</a>
            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        // Get email from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        
        if (email) {
            document.getElementById('emailDisplay').textContent = email;
        } else {
            document.getElementById('emailDisplay').textContent = 'your email';
        }
        
        async function verifyCode() {
            const code = document.getElementById('code').value;
            const messageDiv = document.getElementById('message');
            
            if (!code || code.length !== 6) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Please enter the 6-digit verification code';
                return;
            }
            
            try {
                const res = await fetch('/api/auth/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ Email verified! Redirecting to login...';
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.error || 'Verification failed';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Network error. Please try again.';
            }
        }
        
        async function resendCode() {
            const messageDiv = document.getElementById('message');
            
            try {
                const res = await fetch('/api/auth/resend-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '📧 New code sent to your email!';
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.error || 'Failed to resend code';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Network error. Please try again.';
            }
        }
    </script>
</body>
</html>
