<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>aetheric · login</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* Your existing CSS here - keep it exactly the same */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b0f1c;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e6f0;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(47, 142, 208, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 80% 70%, rgba(112, 200, 255, 0.15) 0%, transparent 35%);
            pointer-events: none;
        }
        .wp-aether-container {
            background: rgba(22, 28, 40, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(47, 142, 208, 0.3);
            width: 400px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px #000;
        }
        .login-icon {
            text-align: center;
            margin-bottom: 1rem;
        }
        .login-icon i {
            font-size: 2.8rem;
            color: #70c8ff;
            filter: drop-shadow(0 0 12px #2f8ed0);
            background: rgba(0,0,0,0.2);
            width: 80px;
            height: 80px;
            line-height: 80px;
            border: 2px solid rgba(112,200,255,0.4);
        }
        .login-title {
            text-align: center;
            font-weight: 500;
            font-size: 1.6rem;
            margin-bottom: 1.8rem;
            background: linear-gradient(135deg, #ffffff, #b6dcff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .wp-field {
            margin-bottom: 1.3rem;
        }
        .wp-field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aad0ff;
            margin-bottom: 0.4rem;
        }
        .wp-field label i {
            margin-right: 6px;
            color: #70c8ff;
        }
        .wp-field input {
            width: 100%;
            background: rgba(10, 20, 30, 0.7);
            border: 1px solid #2f6f9f;
            padding: 0.9rem 1.2rem;
            color: #ffffff;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .wp-field input:focus {
            border-color: #70c8ff;
            box-shadow: 0 0 0 3px rgba(112,200,255,0.2);
        }
        .wp-login-button {
            width: 100%;
            background: linear-gradient(135deg, #1f6f9f, #2f8ed0);
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 1.5px;
            padding: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            margin: 1rem 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .wp-login-button:hover {
            background: linear-gradient(135deg, #2a7faf, #3f9eff);
        }
        .wp-login-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .error-message, .success-message, .loading {
            display: none;
            margin: 0.5rem 0;
            padding: 0.8rem;
            text-align: center;
            font-size: 0.9rem;
        }
        .error-message {
            background: rgba(180, 60, 60, 0.2);
            border: 1px solid rgba(255, 100, 100, 0.3);
            color: #ffb0b0;
        }
        .success-message {
            background: rgba(60, 180, 120, 0.2);
            border: 1px solid rgba(100, 255, 180, 0.3);
            color: #b0ffd0;
        }
        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #aad0ff;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(112,200,255,0.3);
            border-top: 3px solid #70c8ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .login-footer {
            margin-top: 1rem;
            padding-top: 0.8rem;
            text-align: center;
            font-size: 0.8rem;
            color: #8fa9cc;
            border-top: 1px solid rgba(47, 142, 208, 0.2);
        }
    </style>
</head>
<body>
    <div class="wp-aether-container">
        <div class="login-icon">
            <i class="fas fa-user-astronaut"></i>
        </div>
        <div class="login-title">login</div>

        <form id="loginForm">
            <div class="wp-field">
                <label for="username"><i class="fas fa-user"></i> username</label>
                <input type="text" id="username" name="username" placeholder="your username" required>
            </div>
            <div class="wp-field">
                <label for="password"><i class="fas fa-lock"></i> password</label>
                <input type="password" id="password" name="password" placeholder="········" required>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <div>Verifying...</div>
            </div>

            <button type="submit" class="wp-login-button" id="loginBtn">log in</button>
        </form>
        
        <div class="login-footer">
            <div>Secure Login</div>
            <div style="font-size: 0.7rem; opacity: 0.6;">© 2026</div>
        </div>
    </div>

    <script>
        // Check if already logged in (using localStorage)
        if (localStorage.getItem('aetheric_logged_in') === 'true') {
            window.location.href = '/admin/';
        }

        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loading = document.getElementById('loading');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            
            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }
            
            // Show loading
            loginBtn.disabled = true;
            loading.style.display = 'flex';
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // Store login state in localStorage
                    localStorage.setItem('aetheric_logged_in', 'true');
                    
                    successMessage.textContent = 'Login successful! Redirecting...';
                    successMessage.style.display = 'block';
                    loading.style.display = 'none';
                    
                    setTimeout(() => {
                        window.location.href = '/admin/';
                    }, 1000);
                } else {
                    showError(data.error || 'Invalid credentials');
                }
            } catch (error) {
                showError('Connection error. Please try again.');
                console.error('Login error:', error);
            }
        });
        
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            loginBtn.disabled = false;
            loading.style.display = 'none';
        }
    </script>
</body>
</html>
