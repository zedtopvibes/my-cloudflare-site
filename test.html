<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Test Resend - ZedTopVibes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1::before {
            content: '📧';
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            border-left: 3px solid #667eea;
            padding-left: 12px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
            display: block;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
            display: block;
        }

        .message.loading {
            background: #e7f3ff;
            color: #004085;
            border-left: 4px solid #007bff;
            display: block;
        }

        .result-details {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .result-details p {
            font-size: 12px;
            color: #666;
            margin: 5px 0;
            word-break: break-all;
        }

        .result-details strong {
            color: #333;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Test Resend</h1>
            <p class="subtitle">Verify that your email service is working correctly</p>
            
            <div class="input-group">
                <label>📧 Email Address</label>
                <input type="email" id="email" placeholder="you@example.com">
            </div>
            
            <button id="sendBtn" onclick="sendTestEmail()">Send Test Email →</button>
            
            <div id="message" class="message"></div>
            
            <div id="resultDetails" class="result-details" style="display: none;"></div>
        </div>
    </div>

    <script>
        // IMPORTANT: Replace with your actual Resend API key
        const RESEND_API_KEY = 're_YTuwbvdp_LWbnxXDn1eu26tuYg1VRysoe'; // ← PUT YOUR REAL KEY HERE
        
        async function sendTestEmail() {
            const email = document.getElementById('email').value;
            const sendBtn = document.getElementById('sendBtn');
            const messageDiv = document.getElementById('message');
            const resultDiv = document.getElementById('resultDetails');
            
            // Validate email
            if (!email) {
                showMessage('Please enter your email address', 'error');
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }
            
            // Show loading state
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="spinner"></span> Sending...';
            showMessage('Sending test email...', 'loading');
            resultDiv.style.display = 'none';
            
            try {
                const response = await fetch('https://api.resend.com/emails', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${RESEND_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        from: 'verify@zedtopvibes.com',
                        to: email,
                        subject: 'Test from ZedTopVibes 🎵',
                        html: `
                            <!DOCTYPE html>
                            <html>
                            <head>
                                <style>
                                    body { font-family: Arial, sans-serif; }
                                    .container { max-width: 500px; margin: 0 auto; padding: 20px; }
                                    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; text-align: center; color: white; border-radius: 10px 10px 0 0; }
                                    .content { background: #f4f4f4; padding: 20px; border-radius: 0 0 10px 10px; }
                                    h1 { margin: 0; }
                                </style>
                            </head>
                            <body>
                                <div class="container">
                                    <div class="header">
                                        <h1>🎵 ZedTopVibes</h1>
                                    </div>
                                    <div class="content">
                                        <h2>✅ Test Successful!</h2>
                                        <p>Your Resend integration is working perfectly.</p>
                                        <p>You can now start building your auth system.</p>
                                        <hr>
                                        <p style="font-size: 12px; color: #666;">Sent at: ${new Date().toLocaleString()}</p>
                                    </div>
                                </div>
                            </body>
                            </html>
                        `
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('✅ Email sent successfully! Check your inbox (and spam folder).', 'success');
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = `
                        <p><strong>✓ Email ID:</strong> ${data.id}</p>
                        <p><strong>✓ Sent to:</strong> ${email}</p>
                        <p><strong>✓ From:</strong> verify@zedtopvibes.com</p>
                        <p><strong>✓ Time:</strong> ${new Date().toLocaleString()}</p>
                    `;
                    document.getElementById('email').value = '';
                } else {
                    showMessage(`❌ Failed: ${data.message || 'Unknown error'}`, 'error');
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = `
                        <p><strong>Error:</strong> ${data.message || JSON.stringify(data)}</p>
                        <p><strong>Status:</strong> ${response.status}</p>
                    `;
                }
                
            } catch (error) {
                showMessage(`❌ Network error: ${error.message}`, 'error');
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `
                    <p><strong>Error:</strong> ${error.message}</p>
                    <p><strong>Tip:</strong> Check your API key and internet connection.</p>
                `;
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = 'Send Test Email →';
                
                // Auto-hide loading message after 5 seconds if still showing
                setTimeout(() => {
                    if (messageDiv.classList.contains('loading')) {
                        messageDiv.style.display = 'none';
                    }
                }, 5000);
            }
        }
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            
            // Auto-hide success/error after 8 seconds
            if (type === 'success' || type === 'error') {
                setTimeout(() => {
                    if (messageDiv.style.display !== 'none') {
                        messageDiv.style.opacity = '0';
                        setTimeout(() => {
                            messageDiv.style.display = 'none';
                            messageDiv.style.opacity = '1';
                        }, 300);
                    }
                }, 8000);
            }
        }
        
        // Allow Enter key to submit
        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendTestEmail();
            }
        });
        
        // Instructions on page load
        if (!RESEND_API_KEY || RESEND_API_KEY === 're_xxxxxxxx') {
            showMessage('⚠️ Please add your Resend API key to the script (line 130)', 'info');
        }
    </script>
</body>
</html>
