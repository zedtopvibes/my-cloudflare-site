<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Music Auth Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
            overflow-x: hidden;
            width: 100%;
        }

        .container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            overflow-x: hidden;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            overflow-x: hidden;
        }

        h2 {
            color: #333;
            font-size: 1.4rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            word-break: break-word;
        }

        h2::before {
            content: '🎵';
            font-size: 1.4rem;
        }

        .input-group {
            margin-bottom: 14px;
            width: 100%;
        }

        label {
            display: block;
            color: #666;
            margin-bottom: 6px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
            margin-top: 4px;
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        button.outline {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .output-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 14px;
            margin-top: 16px;
            width: 100%;
            overflow-x: auto;
        }

        .output-label {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.8rem;
            font-family: 'Courier New', 'Monaco', monospace;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
            word-break: break-all;
            max-width: 100%;
            box-sizing: border-box;
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #e0e0e0, transparent);
            margin: 16px 0;
        }

        /* No horizontal scroll on any element */
        .card, .container, body, html {
            overflow-x: hidden;
        }

        /* Ensure all text wraps */
        p, h1, h2, h3, button, label {
            word-break: break-word;
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            
            .card {
                padding: 16px;
            }
            
            h2 {
                font-size: 1.3rem;
            }
            
            input, button {
                padding: 10px 12px;
                font-size: 0.95rem;
            }
            
            pre {
                font-size: 0.7rem;
                padding: 10px;
            }
        }

        @media (hover: hover) {
            button:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            }
        }

        /* Fix for iOS input zoom */
        @media (max-width: 768px) {
            input, button, select, textarea {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Signup Card -->
        <div class="card">
            <h2>Create Account</h2>
            <div class="input-group">
                <label>📧 Email</label>
                <input type="email" id="signupEmail" placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label>🔒 Password</label>
                <input type="password" id="signupPassword" placeholder="At least 6 characters">
            </div>
            <button onclick="signup()">Sign Up →</button>
        </div>

        <!-- Login Card -->
        <div class="card">
            <h2>Welcome Back</h2>
            <div class="input-group">
                <label>📧 Email</label>
                <input type="email" id="loginEmail" placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label>🔒 Password</label>
                <input type="password" id="loginPassword" placeholder="Your password">
            </div>
            <button onclick="login()">Log In →</button>
        </div>

        <!-- Actions Card -->
        <div class="card">
            <h2>Account Actions</h2>
            <button class="outline" onclick="getMe()" style="margin-bottom: 10px;">👤 Get My Profile</button>
            <button class="secondary" onclick="logout()">🚪 Log Out</button>
        </div>

        <!-- Output Card -->
        <div class="card">
            <h2>Response</h2>
            <div class="output-section">
                <div class="output-label">📡 Server Response</div>
                <pre id="output">Ready to test authentication...</pre>
            </div>
        </div>
    </div>

    <script>
        async function signup() {
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            
            if (!email || !password) {
                showOutput({ error: 'Please fill in both email and password' }, true);
                return;
            }
            
            if (password.length < 6) {
                showOutput({ error: 'Password must be at least 6 characters' }, true);
                return;
            }
            
            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                showOutput(data, !res.ok);
                
                if (res.ok) {
                    clearSignupForm();
                }
            } catch (error) {
                showOutput({ error: 'Network error: ' + error.message }, true);
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showOutput({ error: 'Please fill in both email and password' }, true);
                return;
            }
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                showOutput(data, !res.ok);
                
                if (res.ok) {
                    clearLoginForm();
                }
            } catch (error) {
                showOutput({ error: 'Network error: ' + error.message }, true);
            }
        }

        async function getMe() {
            try {
                const res = await fetch('/api/auth/me');
                const data = await res.json();
                showOutput(data, !res.ok);
            } catch (error) {
                showOutput({ error: 'Network error: ' + error.message }, true);
            }
        }

        async function logout() {
            try {
                const res = await fetch('/api/auth/logout', { method: 'POST' });
                const data = await res.json();
                showOutput(data, !res.ok);
            } catch (error) {
                showOutput({ error: 'Network error: ' + error.message }, true);
            }
        }

        function showOutput(data, isError = false) {
            const outputEl = document.getElementById('output');
            outputEl.textContent = JSON.stringify(data, null, 2);
            outputEl.style.borderLeft = isError ? '3px solid #dc3545' : '3px solid #28a745';
            
            // Auto-scroll to output on mobile
            if (window.innerWidth <= 768) {
                document.querySelector('.card:last-child').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function clearSignupForm() {
            document.getElementById('signupEmail').value = '';
            document.getElementById('signupPassword').value = '';
        }

        function clearLoginForm() {
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        }

        // Allow Enter key to submit forms
        document.getElementById('signupPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') signup();
        });
        
        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });

        // Prevent horizontal scroll on touch devices
        document.addEventListener('touchmove', function(e) {
            if (document.documentElement.scrollLeft > 0) {
                document.documentElement.scrollLeft = 0;
            }
        }, { passive: false });
    </script>
</body>
</html>
