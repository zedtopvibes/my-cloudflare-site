<!DOCTYPE html>
<html>
<head>
    <title>Test Resend</title>
</head>
<body>
    <h2>Test Resend Email</h2>
    <input type="email" id="email" placeholder="Your email">
    <button onclick="sendTest()">Send Test Email</button>
    <pre id="result"></pre>

    <script>
    async function sendTest() {
        const email = document.getElementById('email').value;
        const res = await fetch('https://api.resend.com/emails', {
            method: 'POST',
            headers: {
                'Authorization': 're_YTuwbvdp_LWbnxXDn1eu26tuYg1VRysoe', // Your actual key
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                from: 'verify@zedtopvibes.com',
                to: email,
                subject: 'Test from ZedTopVibes',
                html: '<h1>Hello!</h1><p>Resend is working!</p>'
            })
        });
        const data = await res.json();
        document.getElementById('result').textContent = JSON.stringify(data, null, 2);
    }
    </script>
</body>
</html>
