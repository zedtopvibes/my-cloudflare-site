<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZedTopVibes - Auth Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h2 {
            margin-bottom: 20px;
            color: #333;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button.secondary {
            background: #6c757d;
            margin-top: 10px;
        }
        pre {
            background: #f4f4f4;
            padding: 12px;
            border-radius: 12px;
            overflow-x: auto;
            font-size: 12px;
            margin-top: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .divider {
            height: 1px;
            background: #eee;
            margin: 20px 0;
        }
        .success-text {
            color: #28a745;
        }
        .error-text {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>📝 Sign Up</h2>
            <input type="email" id="signupEmail" placeholder="Email">
            <input type="password" id="signupPassword" placeholder="Password (min 6 chars)">
            <button onclick="signup()">Create Account</button>
        </div>

        <div class="card">
            <h2>🔐 Login</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button onclick="login()">Login</button>
        </div>

        <div class="card">
            <h2>👤 Account</h2>
            <button onclick="getMe()">Get My Profile</button>
            <button class="secondary" onclick="logout()">Logout</button>
        </div>

        <div class="card">
            <h2>📡 Response</h2>
            <pre id="output">Ready...</pre>
        </div>
    </div>

    <script>
        async function signup() {
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            
            if (!email || !password) {
                showOutput({ error: 'Email and password required' }, true);
                return;
            }
            
            if (password.length < 6) {
                showOutput({ error: 'Password must be at least 6 characters' }, true);
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showOutput({ error: 'Invalid email format' }, true);
                return;
            }
            
            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    // Redirect to verification page
                    window.location.href = `/verify.html?email=${encodeURIComponent(email)}`;
                } else {
                    showOutput(data, true);
                }
            } catch (error) {
                showOutput({ error: 'Network error: ' + error.message }, true);
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showOutput({ error: 'Email and password required' }, true);
                return;
            }
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showOutput({ success: true, message: 'Login successful!', user: data.user }, false);
                    clearLoginForm();
                } else {
                    showOutput(data, true);
                }
            } catch (error) {
                showOutput({ error: 'Network error: ' + error.message }, true);
            }
        }

        async function getMe() {
            try {
                const res = await fetch('/api/auth/me');
                const data = await res.json();
                
                if (res.ok) {
                    showOutput(data, false);
                } else {
                    showOutput(data, true);
                }
            } catch (error) {
                showOutput({ error: 'Network error: ' + error.message }, true);
            }
        }

        async function logout() {
            try {
                const res = await fetch('/api/auth/logout', { method: 'POST' });
                const data = await res.json();
                
                if (res.ok) {
                    showOutput({ success: true, message: 'Logged out successfully!' }, false);
                } else {
                    showOutput(data, true);
                }
            } catch (error) {
                showOutput({ error: 'Network error: ' + error.message }, true);
            }
        }

        function showOutput(data, isError) {
            const outputEl = document.getElementById('output');
            outputEl.textContent = JSON.stringify(data, null, 2);
            if (isError) {
                outputEl.style.borderLeft = '3px solid #dc3545';
            } else {
                outputEl.style.borderLeft = '3px solid #28a745';
            }
        }

        function clearLoginForm() {
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        }

        // Allow Enter key to submit
        document.getElementById('signupPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') signup();
        });
        
        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
