<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- ===== SEO META TAGS ===== -->
    <title>Zedtopvibes · Discover New Music, Playlists & Artists</title>
    <meta name="description" content="Zedtopvibes - Your ultimate destination for discovering new music, artists, playlists, albums, compilations and EPs. Stream and explore the best music from around the world.">
    <meta name="keywords" content="music, playlists, albums, artists, EPs, compilations, streaming, discover music, new releases, trending songs, best of">
    <meta name="author" content="Zedtopvibes">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://zedtopvibes.com">
    <meta property="og:title" content="Zedtopvibes - Music Discovery">
    <meta property="og:description" content="Discover new music, artists, compilations and playlists from around the world">
    <meta property="og:image" content="https://zedtopvibes.com/og-image.jpg">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://zedtopvibes.com">
    <meta property="twitter:title" content="Zedtopvibes - Music Discovery">
    <meta property="twitter:description" content="Discover new music, artists, compilations and playlists from around the world">
    <meta property="twitter:image" content="https://zedtopvibes.com/og-image.jpg">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://zedtopvibes.com">
    
    <!-- Language -->
    <meta http-equiv="content-language" content="en-us">
    
    <!-- Favicon (add these later) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Header loads here -->
    <div id="header-placeholder"></div>

    <!-- ===== DYNAMIC HOMEPAGE SECTIONS ===== -->
    <!-- All sections will be loaded dynamically from the homepage sections API -->
    <div id="homepage-sections-container">
        <div class="loading">Loading...</div>
    </div>

    <!-- Footer loads here -->
    <div id="footer-placeholder"></div>

    <!-- Only ONE script tag -->
    <script src="/js/main.js"></script>
</body>
</html>
