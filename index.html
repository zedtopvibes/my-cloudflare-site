<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- ===== SEO META TAGS ===== -->
    <title>Zedtopvibes · Discover New Music, Playlists & Artists</title>
    <meta name="description" content="Zedtopvibes - Your ultimate destination for discovering new music, artists, playlists, albums and EPs. Stream and explore the best music from around the world.">
    <meta name="keywords" content="music, playlists, albums, artists, EPs, streaming, discover music, new releases, trending songs">
    <meta name="author" content="Zedtopvibes">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://zedtopvibes.com">
    <meta property="og:title" content="Zedtopvibes - Music Discovery">
    <meta property="og:description" content="Discover new music, artists, and playlists from around the world">
    <meta property="og:image" content="https://zedtopvibes.com/og-image.jpg">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://zedtopvibes.com">
    <meta property="twitter:title" content="Zedtopvibes - Music Discovery">
    <meta property="twitter:description" content="Discover new music, artists, and playlists from around the world">
    <meta property="twitter:image" content="https://zedtopvibes.com/og-image.jpg">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://zedtopvibes.com">
    
    <!-- Language -->
    <meta http-equiv="content-language" content="en-us">
    
    <!-- Favicon (add these later) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Header loads here -->
    <div id="header-placeholder"></div>

    <!-- ===== TRENDING NOW SECTION ===== -->
    <div class="section-header" id="trending">
        <h2 class="section-title">Trending Now</h2>
        <a href="#" class="see-all-btn" onclick="searchByGenre('trending'); return false;">See All</a>
    </div>
    <div class="corner">
        <div class="music-grid" id="trending-container"></div>
    </div>

    <!-- ===== LATEST RELEASES SECTION ===== -->
    <div class="section-header section-spacing" id="latest">
        <h2 class="section-title">Latest Releases</h2>
        <a href="#" class="see-all-btn" onclick="loadMore(2); return false;">See All</a>
    </div>
    <div class="corner">
        <div class="music-grid" id="latest-container"></div>
    </div>
    
    <!-- ===== PLAYLISTS SECTION ===== -->
    <div class="section-header section-spacing" id="playlists">
        <h2 class="section-title">Playlists</h2>
        <a href="/playlists.html" class="see-all-btn">See All</a>
    </div>
    <div class="corner">
        <div class="music-grid" id="playlists-container"></div>
    </div>
    
    <!-- ===== ALBUMS SECTION ===== -->
    <div class="section-header section-spacing" id="albums">
        <h2 class="section-title">Albums</h2>
        <a href="/albums.html" class="see-all-btn">See All</a>
    </div>
    <div class="corner">
        <div class="music-grid" id="albums-container"></div>
    </div>
    
    <!-- ===== EPS SECTION ===== -->
    <div class="section-header section-spacing" id="eps">
        <h2 class="section-title">EPs</h2>
        <a href="/eps.html" class="see-all-btn">See All</a>
    </div>
    <div class="corner">
        <div class="music-grid" id="eps-container"></div>
    </div>
    
    <!-- ===== ARTISTS SECTION ===== -->
    <div class="section-header section-spacing" id="artists">
        <h2 class="section-title">Artists</h2>
        <a href="/artists.html" class="see-all-btn">See All</a>
    </div>
    <div class="corner">
        <div class="music-grid" id="artists-container"></div>
    </div>
    
    <!-- ===== MUSIC GENRES SECTION ===== -->
    <div class="section-header section-spacing" id="genres">
        <h2 class="section-title">Music Genres</h2>
        <a href="#" class="see-all-btn" onclick="searchByGenre('all'); return false;">See All</a>
    </div>
    <div class="corner">
        <div class="music-grid" id="genres-container"></div>
    </div>

    <!-- Footer loads here -->
    <div id="footer-placeholder"></div>

    <!-- Only ONE script tag -->
    <script src="/js/main.js"></script>
</body>
</html>
