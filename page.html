<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Page - ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1e3c72;
            --primary-light: #2a4a8a;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-md: 8px;
            --radius-lg: 12px;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.6;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: white;
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }
        
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .header .meta {
            font-size: 0.85rem;
            color: var(--gray-600);
        }
        
        .content {
            background: white;
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }
        
        .content h1 {
            font-size: 1.8rem;
            margin-bottom: 16px;
            color: var(--gray-800);
        }
        
        .content h2 {
            font-size: 1.4rem;
            margin: 24px 0 12px;
            color: var(--gray-800);
        }
        
        .content h3 {
            font-size: 1.2rem;
            margin: 20px 0 10px;
            color: var(--gray-800);
        }
        
        .content p {
            margin-bottom: 16px;
            color: var(--gray-700);
        }
        
        .content ul, .content ol {
            margin: 16px 0 16px 32px;
        }
        
        .content li {
            margin-bottom: 8px;
        }
        
        .content a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .content a:hover {
            text-decoration: underline;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--gray-500);
        }
        
        .error {
            text-align: center;
            padding: 60px;
            color: #ef4444;
        }
        
        .error i {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: var(--primary);
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 640px) {
            .container {
                padding: 12px;
            }
            
            .content {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="pageContent">
            <div class="loading">
                <i class="fas fa-circle-notch fa-spin"></i>
                <div>Loading page...</div>
            </div>
        </div>
    </div>

    <script>
        // Get the page slug from the URL path
        const path = window.location.pathname;
        const slug = path.split('/').pop();
        
        async function loadPage() {
            const container = document.getElementById('pageContent');
            
            try {
                const response = await fetch(`/api/pages/${slug}`);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('Page not found');
                    }
                    throw new Error('Failed to load page');
                }
                
                const page = await response.json();
                
                // Update page title
                document.title = `${page.title} - ZEDTOPVIBES`;
                
                container.innerHTML = `
                    <div class="header">
                        <h1>${escapeHtml(page.title)}</h1>
                        <div class="meta">
                            <i class="fas fa-calendar-alt"></i> Updated: ${new Date(page.updated_at).toLocaleDateString()}
                        </div>
                    </div>
                    <div class="content">
                        ${page.content || '<p>No content yet.</p>'}
                        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error loading page:', error);
                container.innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-circle"></i>
                        <h2>Page Not Found</h2>
                        <p>The page you're looking for doesn't exist.</p>
                        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
                    </div>
                `;
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Load the page
        loadPage();
    </script>
</body>
</html>
