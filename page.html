<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Page - ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1e3c72;
            --primary-light: #2a4a8a;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-lg: 12px;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.5;
        }
        
        .page-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        
        .page-header {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px 32px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }
        
        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .page-meta {
            font-size: 0.85rem;
            color: var(--gray-600);
        }
        
        .page-content {
            background: white;
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
            margin-bottom: 30px;
        }
        
        .page-content h1 {
            font-size: 1.8rem;
            margin-bottom: 16px;
            color: var(--gray-800);
        }
        
        .page-content h2 {
            font-size: 1.4rem;
            margin: 24px 0 12px;
            color: var(--gray-800);
        }
        
        .page-content h3 {
            font-size: 1.2rem;
            margin: 20px 0 10px;
            color: var(--gray-800);
        }
        
        .page-content p {
            margin-bottom: 16px;
            color: var(--gray-700);
        }
        
        .page-content ul, .page-content ol {
            margin: 16px 0 16px 32px;
        }
        
        .page-content li {
            margin-bottom: 8px;
        }
        
        .page-content a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .page-content a:hover {
            text-decoration: underline;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: var(--primary);
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 640px) {
            .page-container {
                padding: 0 12px;
            }
            
            .page-content {
                padding: 20px;
            }
            
            .page-header {
                padding: 20px;
            }
            
            .page-header h1 {
                font-size: 1.5rem;
            }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray-500);
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    
    <div class="page-container">
        <div class="page-header">
            <h1 id="pageTitle"></h1>
            <div class="page-meta" id="pageMeta"></div>
        </div>
        <div class="page-content" id="pageContent">
            <div class="loading">
                <i class="fas fa-circle-notch fa-spin"></i>
                <div>Loading page...</div>
            </div>
        </div>
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
    
    <div id="footer-placeholder"></div>
    
    <script>
        // Get slug from URL
        const path = window.location.pathname;
        const slug = path.split('/').pop();
        
        // Load header and footer
        async function loadHeaderFooter() {
            try {
                const [header, footer] = await Promise.all([
                    fetch('/header.html').then(r => r.text()),
                    fetch('/footer.html').then(r => r.text())
                ]);
                document.getElementById('header-placeholder').innerHTML = header;
                document.getElementById('footer-placeholder').innerHTML = footer;
            } catch (error) {
                console.error('Error loading header/footer:', error);
            }
        }
        
        // Load page content
        async function loadPage() {
            try {
                const response = await fetch(`/api/pages/${slug}`);
                
                if (!response.ok) {
                    throw new Error('Page not found');
                }
                
                const page = await response.json();
                
                document.title = `${page.title} - ZEDTOPVIBES`;
                document.getElementById('pageTitle').textContent = page.title;
                document.getElementById('pageMeta').innerHTML = `<i class="fas fa-calendar-alt"></i> Updated: ${new Date(page.updated_at).toLocaleDateString()}`;
                document.getElementById('pageContent').innerHTML = page.content || '<p>No content yet.</p>';
                
            } catch (error) {
                document.getElementById('pageContent').innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <i class="fas fa-exclamation-circle" style="font-size: 3rem; color: #ef4444; margin-bottom: 16px;"></i>
                        <h2>Page Not Found</h2>
                        <p>The page you're looking for doesn't exist.</p>
                    </div>
                `;
            }
        }
        
        // Initialize
        loadHeaderFooter();
        loadPage();
    </script>
</body>
</html>
