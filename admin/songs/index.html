<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Songs - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/admin/shared/styles.css">
</head>
<body>
    <div class="admin-layout">
        <main class="admin-main">
            <div class="admin-container">
                <div id="admin-header" data-title="Songs" data-icon="music"></div>
                
                <div class="admin-content">
                    <div class="content-header">
                        <h2>
                            <i class="fas fa-music"></i> Songs Management
                            <button onclick="loadSongs()" class="btn btn-secondary btn-sm" title="Refresh">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                        </h2>
                    </div>
                    
                    <div class="search-section">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchInput" placeholder="Search songs by title or artist...">
                        </div>
                        <select id="genreFilter" class="filter-select">
                            <option value="">All Genres</option>
                        </select>
                        <select id="sortFilter" class="filter-select">
                            <option value="newest">Newest First</option>
                            <option value="oldest">Oldest First</option>
                            <option value="views">Most Views</option>
                            <option value="title">Title A-Z</option>
                        </select>
                    </div>

                    <div class="filter-tabs">
                        <button class="filter-tab active" data-status="all" onclick="filterByStatus('all')">All</button>
                        <button class="filter-tab" data-status="published" onclick="filterByStatus('published')">Published</button>
                        <button class="filter-tab" data-status="draft" onclick="filterByStatus('draft')">Drafts</button>
                        <a href="/admin/upload.html" class="filter-tab add-btn">
                            <i class="fas fa-plus-circle"></i> Add New Song
                        </a>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-music"></i></div>
                            <div class="stat-value" id="totalSongs">0</div>
                            <div class="stat-label">Total Songs</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-pencil-alt"></i></div>
                            <div class="stat-value" id="totalDrafts">0</div>
                            <div class="stat-label">Drafts</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-globe"></i></div>
                            <div class="stat-value" id="totalPublished">0</div>
                            <div class="stat-label">Published</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-eye"></i></div>
                            <div class="stat-value" id="totalViews">0</div>
                            <div class="stat-label">Total Views</div>
                        </div>
                    </div>

                    <div id="songsTableContainer">
                        <div class="skeleton-row"></div>
                        <div class="skeleton-row"></div>
                        <div class="skeleton-row"></div>
                    </div>

                    <div id="songsMobileGrid" class="songs-mobile-grid"></div>

                    <div class="pagination" id="pagination"></div>
                </div>
                
                <div id="admin-footer"></div>
            </div>
        </main>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3 id="confirmModalTitle" style="color: var(--primary-blue);">Confirm Action</h3>
            <p id="confirmModalMessage">Are you sure?</p>
            <div class="modal-actions">
                <button id="confirmModalCancel" class="btn btn-secondary">Cancel</button>
                <button id="confirmModalConfirm" class="btn btn-primary">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal edit-modal">
        <div class="modal-content">
            <h3>Edit Song</h3>
            <form id="editForm">
                <input type="hidden" id="editId">
                <input type="hidden" id="existingArtworkUrl">
                
                <div class="form-group">
                    <label>Song Artwork</label>
                    <div class="image-upload-area" onclick="document.getElementById('imageInput').click()">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 1.5rem; color: var(--primary-blue); margin-bottom: 8px; display: block;"></i>
                        <div style="font-size: 0.8rem;">Click to upload image</div>
                        <div style="font-size: 0.7rem; color: var(--gray);">PNG, JPG, WEBP (max 2MB)</div>
                    </div>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;">
                    <img id="imagePreview" class="image-preview" src="#" alt="Preview">
                    <a href="#" onclick="removeImage(event)" class="remove-image" style="display: none;">Remove image</a>
                </div>
                
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" id="editTitle" required>
                </div>
                
                <div class="form-group">
                    <label>Artists</label>
                    <div id="editArtistsContainer" style="display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; background: var(--light-gray); border-radius: 6px; min-height: 45px;"></div>
                    <div class="form-hint" style="font-size: 0.7rem; color: #666; margin-top: 4px;">Main artist shown in blue, featured artists in light blue</div>
                </div>
                
                <div class="form-group">
                    <label>Genre</label>
                    <input type="text" id="editGenre">
                </div>
                
                <div class="form-group">
                    <label>Duration (sec)</label>
                    <input type="number" id="editDuration">
                </div>
                
                <div class="form-group">
                    <label>BPM</label>
                    <input type="number" id="editBpm">
                </div>
                
                <div class="form-group">
                    <label>Release Date</label>
                    <input type="date" id="editReleaseDate">
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="editDescription" rows="2"></textarea>
                </div>
                
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="editExplicit"> Explicit
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="editFeatured"> Featured
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="editEditorPick"> Editor's Pick
                    </label>
                </div>
                
                <div class="modal-actions">
                    <button type="button" onclick="closeEditModal()" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/admin/shared/loader.js"></script>
    <script>
        // ========== SONGS PAGE SPECIFIC CODE ==========
        const API_BASE = '/api';
        let currentPage = 1;
        const itemsPerPage = 10;
        let allSongs = [];
        let filteredSongs = [];
        let currentDeleteId = null;
        let selectedImageFile = null;
        let currentEditingSong = null;
        let currentStatusFilter = 'all';

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showConfirmModal(options) {
            const modal = document.getElementById('confirmModal');
            const titleEl = document.getElementById('confirmModalTitle');
            const messageEl = document.getElementById('confirmModalMessage');
            const confirmBtn = document.getElementById('confirmModalConfirm');
            const cancelBtn = document.getElementById('confirmModalCancel');
            
            titleEl.textContent = options.title;
            messageEl.textContent = options.message;
            
            if (options.type === 'danger') {
                confirmBtn.className = 'btn btn-danger';
                titleEl.style.color = 'var(--error)';
            } else if (options.type === 'warning') {
                confirmBtn.className = 'btn btn-warning';
                titleEl.style.color = 'var(--warning)';
            } else {
                confirmBtn.className = 'btn btn-primary';
                titleEl.style.color = 'var(--primary-blue)';
            }
            
            window.confirmModalCallback = options.onConfirm;
            
            modal.style.display = 'flex';
            
            confirmBtn.onclick = () => {
                modal.style.display = 'none';
                if (window.confirmModalCallback) {
                    window.confirmModalCallback();
                    window.confirmModalCallback = null;
                }
            };
            
            cancelBtn.onclick = () => {
                modal.style.display = 'none';
                window.confirmModalCallback = null;
            };
            
            modal.onclick = (e) => {
                if (e.target === modal) {
                    modal.style.display = 'none';
                    window.confirmModalCallback = null;
                }
            };
        }

        function formatArtistsDisplay(song) {
            if (!song.artists || song.artists.length === 0) {
                return escapeHtml(song.artist || 'Unknown');
            }
            
            const primaryArtist = song.artists.find(a => a.is_primary === 1) || song.artists[0];
            const featuredArtists = song.artists.filter(a => a.is_primary === 0);
            
            let html = `<span class="artist-badge primary">${escapeHtml(primaryArtist.name)}</span>`;
            if (featuredArtists.length > 0) {
                html += featuredArtists.map(a => `<span class="artist-badge">${escapeHtml(a.name)}</span>`).join('');
            }
            return html;
        }

        function getArtistSearchString(song) {
            if (!song.artists || song.artists.length === 0) {
                return song.artist || '';
            }
            return song.artists.map(a => a.name).join(' ');
        }

        async function publishSong(id, title) {
            showConfirmModal({
                title: 'Publish Song',
                message: `Are you sure you want to publish "${title}"? It will become visible to the public.`,
                type: 'success',
                onConfirm: async () => {
                    try {
                        const response = await fetch(`${API_BASE}/admin/tracks/${id}/publish`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' }
                        });
                        
                        if (!response.ok) {
                            const error = await response.json();
                            throw new Error(error.error || 'Failed to publish');
                        }
                        
                        showToast(`"${title}" published!`, 'success');
                        loadSongs();
                    } catch (error) {
                        showToast(error.message, 'error');
                    }
                }
            });
        }

        async function unpublishSong(id, title) {
            showConfirmModal({
                title: 'Unpublish Song',
                message: `Are you sure you want to unpublish "${title}"? It will become a draft and hidden from public.`,
                type: 'warning',
                onConfirm: async () => {
                    try {
                        const response = await fetch(`${API_BASE}/admin/tracks/${id}/unpublish`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' }
                        });
                        
                        if (!response.ok) {
                            const error = await response.json();
                            throw new Error(error.error || 'Failed to unpublish');
                        }
                        
                        showToast(`"${title}" moved to drafts`, 'success');
                        loadSongs();
                    } catch (error) {
                        showToast(error.message, 'error');
                    }
                }
            });
        }

        window.filterByStatus = (status) => {
            currentStatusFilter = status;
            
            document.querySelectorAll('.filter-tab').forEach(tab => {
                if (tab.dataset.status === status) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });
            
            applyFilters();
        };

        async function loadSongs() {
            try {
                const response = await fetch(`${API_BASE}/admin/tracks`);
                if (!response.ok) throw new Error('Failed to load songs');
                
                allSongs = await response.json();
                
                const draftCount = allSongs.filter(s => s.status === 'draft').length;
                const publishedCount = allSongs.filter(s => s.status === 'published').length;
                const totalViews = allSongs.reduce((sum, song) => sum + (song.views || 0), 0);
                
                document.getElementById('totalSongs').textContent = allSongs.length;
                document.getElementById('totalDrafts').textContent = draftCount;
                document.getElementById('totalPublished').textContent = publishedCount;
                document.getElementById('totalViews').textContent = formatNumber(totalViews);
                
                populateGenreFilter();
                applyFilters();
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('songsTableContainer').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <h3>Error Loading Songs</h3>
                        <p>${error.message}</p>
                        <button onclick="loadSongs()" class="btn btn-primary">Try Again</button>
                    </div>
                `;
            }
        }

        function populateGenreFilter() {
            const genres = [...new Set(allSongs.map(song => song.genre).filter(g => g))];
            const select = document.getElementById('genreFilter');
            
            while (select.options.length > 1) {
                select.remove(1);
            }
            
            genres.sort().forEach(genre => {
                const option = document.createElement('option');
                option.value = genre;
                option.textContent = genre;
                select.appendChild(option);
            });
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const genre = document.getElementById('genreFilter').value;
            const sort = document.getElementById('sortFilter').value;
            
            filteredSongs = allSongs.filter(song => {
                if (currentStatusFilter !== 'all' && song.status !== currentStatusFilter) {
                    return false;
                }
                
                const artistSearch = getArtistSearchString(song).toLowerCase();
                const matchesSearch = song.title?.toLowerCase().includes(searchTerm) ||
                                     artistSearch.includes(searchTerm);
                const matchesGenre = !genre || song.genre === genre;
                return matchesSearch && matchesGenre;
            });
            
            filteredSongs.sort((a, b) => {
                switch(sort) {
                    case 'oldest':
                        return new Date(a.uploaded_at) - new Date(b.uploaded_at);
                    case 'views':
                        return (b.views || 0) - (a.views || 0);
                    case 'title':
                        return (a.title || '').localeCompare(b.title || '');
                    default:
                        return new Date(b.uploaded_at) - new Date(a.uploaded_at);
                }
            });
            
            currentPage = 1;
            renderSongs();
        }

        function renderSongs() {
            const tableContainer = document.getElementById('songsTableContainer');
            const mobileContainer = document.getElementById('songsMobileGrid');
            
            if (filteredSongs.length === 0) {
                const emptyHtml = `
                    <div class="empty-state">
                        <i class="fas fa-music"></i>
                        <h3>No Songs Found</h3>
                        <p>Try adjusting your filters or upload some songs</p>
                        <a href="/admin/upload.html" class="btn btn-primary">
                            <i class="fas fa-cloud-upload-alt"></i> Upload New Song
                        </a>
                    </div>
                `;
                tableContainer.innerHTML = emptyHtml;
                mobileContainer.innerHTML = '';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageSongs = filteredSongs.slice(start, end);
            
            renderDesktopTable(tableContainer, pageSongs);
            renderMobileCards(mobileContainer, pageSongs);
            renderPagination();
        }

        function renderDesktopTable(container, songs) {
            let html = `
                <div class="songs-table-container">
                    <table class="songs-table">
                        <thead>
                            <tr>
                                <th>Song</th>
                                <th>Artists</th>
                                <th>Genre</th>
                                <th>Views</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            songs.forEach(song => {
                const artistsDisplay = formatArtistsDisplay(song);
                const statusBadge = song.status === 'published' 
                    ? '<span class="status-badge published"><i class="fas fa-globe"></i> Published</span>'
                    : '<span class="status-badge draft"><i class="fas fa-pencil-alt"></i> Draft</span>';
                
                html += `
                    <tr>
                        <td>
                            <div class="song-info">
                                <div class="song-thumb">
                                    ${song.artwork_url ? `<img src="${song.artwork_url}" alt="${escapeHtml(song.title)}">` : '<i class="fas fa-music"></i>'}
                                </div>
                                <div class="song-details">
                                    <h4>${escapeHtml(song.title) || 'Untitled'}</h4>
                                    <span>${formatDuration(song.duration)}</span>
                                </div>
                            </div>
                        </td>
                        <td><div class="artist-list">${artistsDisplay}</div></td>
                        <td>${escapeHtml(song.genre) || '—'}</td>
                        <td><i class="fas fa-eye"></i> ${formatNumber(song.views)}</td>
                        <td>${statusBadge}</td>
                        <td>
                            <div class="action-buttons">
                                ${song.status === 'draft' 
                                    ? `<button class="action-btn" onclick="publishSong(${song.id}, '${escapeHtml(song.title)?.replace(/'/g, "\\'")}')" title="Publish"><i class="fas fa-cloud-upload-alt"></i></button>`
                                    : `<button class="action-btn" onclick="unpublishSong(${song.id}, '${escapeHtml(song.title)?.replace(/'/g, "\\'")}')" title="Unpublish"><i class="fas fa-eye-slash"></i></button>`
                                }
                                <button class="action-btn" onclick="editSong(${song.id})" title="Edit"><i class="fas fa-edit"></i></button>
                                <button class="action-btn" onclick="window.location.href='/admin/songs/profile.html?id=${song.id}'" title="Preview"><i class="fas fa-eye"></i></button>
                                <button class="action-btn delete" onclick="showDeleteModal(${song.id}, '${escapeHtml(song.title)?.replace(/'/g, "\\'")}')" title="Delete"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody> </table></div>';
            container.innerHTML = html;
        }

        function renderMobileCards(container, songs) {
            let html = '';
            
            songs.forEach(song => {
                const artistsDisplay = formatArtistsDisplay(song);
                const tags = [];
                if (song.explicit) tags.push('<span class="badge explicit">Explicit</span>');
                if (song.featured) tags.push('<span class="badge featured">Featured</span>');
                if (song.editor_pick) tags.push('<span class="badge editor">Editor</span>');
                
                const statusBadge = song.status === 'published' 
                    ? '<span class="status-badge published"><i class="fas fa-globe"></i> Published</span>'
                    : '<span class="status-badge draft"><i class="fas fa-pencil-alt"></i> Draft</span>';
                
                html += `
                    <div class="song-mobile-card">
                        <div class="song-mobile-header">
                            <div class="song-mobile-thumb">
                                ${song.artwork_url ? `<img src="${song.artwork_url}" alt="${escapeHtml(song.title)}">` : '<i class="fas fa-music"></i>'}
                            </div>
                            <div class="song-mobile-info">
                                <div class="song-mobile-title">${escapeHtml(song.title) || 'Untitled'} ${statusBadge}</div>
                                <div class="song-mobile-artist">${artistsDisplay}</div>
                            </div>
                        </div>
                        
                        <div class="song-mobile-details">
                            <div class="song-mobile-stat"><i class="fas fa-clock"></i> ${formatDuration(song.duration)}</div>
                            <div class="song-mobile-stat"><i class="fas fa-eye"></i> ${formatNumber(song.views)} views</div>
                        </div>
                        
                        ${tags.length > 0 ? `<div class="song-mobile-tags">${tags.join(' ')}</div>` : ''}
                        
                        <div class="song-mobile-actions">
                            ${song.status === 'draft' 
                                ? `<button class="action-btn" onclick="publishSong(${song.id}, '${escapeHtml(song.title)?.replace(/'/g, "\\'")}')" title="Publish"><i class="fas fa-cloud-upload-alt"></i></button>`
                                : `<button class="action-btn" onclick="unpublishSong(${song.id}, '${escapeHtml(song.title)?.replace(/'/g, "\\'")}')" title="Unpublish"><i class="fas fa-eye-slash"></i></button>`
                            }
                            <button class="action-btn" onclick="editSong(${song.id})" title="Edit"><i class="fas fa-edit"></i></button>
                            <button class="action-btn" onclick="window.location.href='/admin/songs/profile.html?id=${song.id}'" title="Preview"><i class="fas fa-eye"></i></button>
                            <button class="action-btn delete" onclick="showDeleteModal(${song.id}, '${escapeHtml(song.title)?.replace(/'/g, "\\'")}')" title="Delete"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredSongs.length / itemsPerPage);
            if (totalPages <= 1) {
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            document.getElementById('pagination').innerHTML = html;
        }

        window.goToPage = (page) => {
            currentPage = page;
            renderSongs();
        };

        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                showToast('Please select an image file', 'error');
                return;
            }
            
            if (file.size > 2 * 1024 * 1024) {
                showToast('Image must be less than 2MB', 'error');
                return;
            }
            
            selectedImageFile = file;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('imagePreview');
                preview.src = e.target.result;
                preview.classList.add('has-image');
                document.querySelector('.remove-image').style.display = 'inline-block';
            };
            reader.readAsDataURL(file);
        });

        window.removeImage = function(e) {
            e.preventDefault();
            selectedImageFile = null;
            document.getElementById('imageInput').value = '';
            document.getElementById('imagePreview').classList.remove('has-image');
            document.querySelector('.remove-image').style.display = 'none';
        };

        function displayArtistsInEditModal(song) {
            const container = document.getElementById('editArtistsContainer');
            if (!song.artists || song.artists.length === 0) {
                container.innerHTML = '<span style="color: #999;">No artists associated</span>';
                return;
            }
            
            let html = '';
            song.artists.forEach(artist => {
                const badgeClass = artist.is_primary === 1 ? 'primary' : '';
                html += `<span class="artist-badge ${badgeClass}" style="padding: 4px 10px; font-size: 0.75rem;">
                    ${escapeHtml(artist.name)} ${artist.is_primary === 1 ? '(Main)' : '(Featured)'}
                </span>`;
            });
            container.innerHTML = html;
        }

        window.editSong = (id) => {
            const song = allSongs.find(s => s.id === id);
            if (!song) return;
            
            currentEditingSong = song;
            
            document.getElementById('editId').value = song.id;
            document.getElementById('existingArtworkUrl').value = song.artwork_url || '';
            document.getElementById('editTitle').value = song.title || '';
            document.getElementById('editGenre').value = song.genre || '';
            document.getElementById('editDuration').value = song.duration || '';
            document.getElementById('editBpm').value = song.bpm || '';
            document.getElementById('editReleaseDate').value = song.release_date || '';
            document.getElementById('editDescription').value = song.description || '';
            document.getElementById('editExplicit').checked = song.explicit === 1 || song.explicit === true;
            document.getElementById('editFeatured').checked = song.featured === 1 || song.featured === true;
            document.getElementById('editEditorPick').checked = song.editor_pick === 1 || song.editor_pick === true;
            
            displayArtistsInEditModal(song);
            
            if (song.artwork_url) {
                document.getElementById('imagePreview').src = song.artwork_url;
                document.getElementById('imagePreview').classList.add('has-image');
                document.querySelector('.remove-image').style.display = 'inline-block';
            } else {
                document.getElementById('imagePreview').classList.remove('has-image');
                document.querySelector('.remove-image').style.display = 'none';
            }
            
            selectedImageFile = null;
            document.getElementById('imageInput').value = '';
            
            document.getElementById('editModal').style.display = 'flex';
        };

        window.closeEditModal = () => {
            document.getElementById('editModal').style.display = 'none';
            selectedImageFile = null;
            document.getElementById('imageInput').value = '';
            currentEditingSong = null;
        };

        function extractFilenameFromUrl(url) {
            if (!url) return null;
            const match = url.match(/\/api\/cover\/(.+)$/);
            return match ? match[1] : null;
        }

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('editId').value;
            const existingArtworkUrl = document.getElementById('existingArtworkUrl').value;
            
            if (selectedImageFile) {
                const imageFormData = new FormData();
                imageFormData.append('image', selectedImageFile);
                
                const existingFilename = extractFilenameFromUrl(existingArtworkUrl);
                if (existingFilename) {
                    imageFormData.append('existing_filename', existingFilename);
                }
                
                try {
                    const response = await fetch(`${API_BASE}/admin/tracks/${id}/image`, {
                        method: 'POST',
                        body: imageFormData
                    });
                    
                    if (response.ok) {
                        const result = await response.json();
                        if (result.artwork_url) {
                            document.getElementById('imagePreview').src = result.artwork_url;
                        }
                        showToast('Image updated successfully!', 'success');
                    } else {
                        showToast('Failed to update image', 'error');
                    }
                } catch (error) {
                    console.error('Error uploading image:', error);
                    showToast('Error uploading image', 'error');
                }
            }
            
            const updatedSong = {
                title: document.getElementById('editTitle').value,
                genre: document.getElementById('editGenre').value,
                duration: document.getElementById('editDuration').value ? parseInt(document.getElementById('editDuration').value) : null,
                bpm: document.getElementById('editBpm').value ? parseInt(document.getElementById('editBpm').value) : null,
                release_date: document.getElementById('editReleaseDate').value || null,
                description: document.getElementById('editDescription').value || null,
                explicit: document.getElementById('editExplicit').checked,
                featured: document.getElementById('editFeatured').checked,
                editor_pick: document.getElementById('editEditorPick').checked
            };
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Saving...';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/admin/tracks/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedSong)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                closeEditModal();
                await loadSongs();
                showToast('Song updated successfully!', 'success');
                
            } catch (error) {
                console.error('Error updating song:', error);
                showToast('Failed to update song: ' + error.message, 'error');
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });

        window.showDeleteModal = (id, title) => {
            showConfirmModal({
                title: 'Delete Song',
                message: `Are you sure you want to delete "${title}"? This will move it to trash.`,
                type: 'danger',
                onConfirm: async () => {
                    try {
                        const response = await fetch(`${API_BASE}/admin/tracks/${id}`, {
                            method: 'DELETE'
                        });
                        
                        if (!response.ok) {
                            const error = await response.json();
                            throw new Error(error.error || 'Delete failed');
                        }
                        
                        showToast('Song moved to trash!', 'success');
                        loadSongs();
                    } catch (error) {
                        showToast('Failed to delete song: ' + error.message, 'error');
                    }
                }
            });
        };

        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function formatDuration(seconds) {
            if (!seconds) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('genreFilter').addEventListener('change', applyFilters);
        document.getElementById('sortFilter').addEventListener('change', applyFilters);

        document.addEventListener('DOMContentLoaded', () => {
            loadSongs();
        });
    </script>
</body>
</html>
