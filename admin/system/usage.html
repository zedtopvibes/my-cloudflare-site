<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>System Usage - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/admin/shared/styles.css">
    <style>
        /* ========== SYSTEM USAGE PAGE SPECIFIC STYLES ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--light-gray);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(31, 111, 159, 0.15);
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 12px rgba(31, 111, 159, 0.1);
        }
        
        .stat-card .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--primary-blue);
        }
        
        .stat-card .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-blue);
        }
        
        .stat-card .stat-label {
            font-size: 0.75rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 5px;
        }
        
        .stat-card.primary-gradient {
            background: linear-gradient(135deg, #1f6f9f 0%, #2f8ed0 100%);
        }
        
        .stat-card.primary-gradient .stat-value,
        .stat-card.primary-gradient .stat-label,
        .stat-card.primary-gradient .stat-icon {
            color: white;
        }
        
        .info-card {
            background: var(--light-gray);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(31, 111, 159, 0.15);
        }
        
        .info-card h3 {
            margin-bottom: 15px;
            color: var(--primary-dark);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-card h3 i {
            color: var(--primary-blue);
        }
        
        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 24px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .progress-fill {
            background: var(--primary-blue);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .progress-fill.warning {
            background: #ffc107;
            color: #333;
        }
        
        .progress-fill.danger {
            background: #dc3545;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
        }
        
        .stats-row-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: white;
            border-radius: 8px;
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .stats-row-item .label {
            font-size: 0.7rem;
            color: var(--gray);
        }
        
        .stats-row-item .value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-blue);
        }
        
        .pricing-row {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .pricing-item {
            color: var(--gray);
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .pricing-item i {
            color: var(--primary-blue);
            width: 18px;
        }
        
        .pricing-item strong {
            color: var(--primary-dark);
            font-weight: 700;
        }
        
        .alert-success {
            background: #d4edda;
            border-left: 3px solid #28a745;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .alert-success i {
            color: #155724;
            font-size: 1rem;
        }
        
        .alert-success span {
            color: #155724;
            font-size: 0.85rem;
        }
        
        .alert-warning {
            background: #fff3cd;
            border-left: 3px solid #ffc107;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .alert-warning i {
            color: #856404;
            font-size: 1rem;
        }
        
        .alert-warning span {
            color: #856404;
            font-size: 0.85rem;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--gray);
        }
        
        .loading i {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--primary-blue);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        
        .empty-state i {
            font-size: 3rem;
            color: var(--primary-blue);
            margin-bottom: 15px;
            opacity: 0.3;
        }
        
        .refresh-btn {
            background: var(--light-gray);
            border: 1px solid #ddd;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 20px;
            transition: all 0.2s;
            color: var(--gray);
        }
        
        .refresh-btn:hover {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }
        
        .list-item {
            padding: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--gray);
            font-size: 0.85rem;
        }
        
        .list-item i {
            color: var(--primary-blue);
            width: 20px;
            font-size: 0.9rem;
        }
        
        @media (min-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        @media (max-width: 640px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .stat-card {
                padding: 12px;
            }
            .stat-card .stat-value {
                font-size: 1.2rem;
            }
            .stat-card .stat-icon {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <main class="admin-main">
            <div class="admin-container">
                <div id="admin-header" data-title="System Usage" data-icon="chart-line"></div>
                
                <div class="admin-content" id="usageContent">
                    <div class="loading">
                        <i class="fas fa-circle-notch fa-spin"></i>
                        <div>Loading usage statistics...</div>
                    </div>
                </div>
                
                <div id="admin-footer"></div>
            </div>
        </main>
    </div>

    <script src="/admin/shared/loader.js"></script>
    <script>
        async function loadUsageStats() {
            const container = document.getElementById('usageContent');
            container.innerHTML = '<div class="loading"><i class="fas fa-circle-notch fa-spin"></i> Loading usage statistics...</div>';
            
            try {
                const response = await fetch('/api/admin/usage-stats');
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error || 'Failed to load stats');
                }
                
                const r2 = result.data.r2;
                const d1 = result.data.d1;
                const totalGB = parseFloat(r2.total_gb);
                const freeLimit = 10;
                const percentUsed = Math.min(100, (totalGB / freeLimit) * 100);
                
                let progressClass = 'progress-fill';
                if (percentUsed > 90) progressClass += ' danger';
                else if (percentUsed > 75) progressClass += ' warning';
                
                const lastUpdated = new Date(result.data.timestamp).toLocaleString();
                
                // D1 stats
                const d1SizeGB = parseFloat(d1.database_size_gb || 0);
                const d1FreeLimit = 5;
                const d1PercentUsed = Math.min(100, (d1SizeGB / d1FreeLimit) * 100);
                
                let d1ProgressClass = 'progress-fill';
                if (d1PercentUsed > 90) d1ProgressClass += ' danger';
                else if (d1PercentUsed > 75) d1ProgressClass += ' warning';
                
                container.innerHTML = `
                    <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
                        <button class="refresh-btn" onclick="loadUsageStats()">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                    
                    <!-- R2 STATS SECTION -->
                    <div class="stats-grid">
                        <div class="stat-card primary-gradient">
                            <div class="stat-icon"><i class="fas fa-hdd"></i></div>
                            <div class="stat-value">${r2.total_gb} GB</div>
                            <div class="stat-label">R2 Storage Used</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-file"></i></div>
                            <div class="stat-value">${r2.total_objects}</div>
                            <div class="stat-label">Total Files</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                            <div class="stat-value">$${r2.estimated_monthly_cost}</div>
                            <div class="stat-label">Est. Monthly Cost</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-clock"></i></div>
                            <div class="stat-value">${lastUpdated}</div>
                            <div class="stat-label">Last Updated</div>
                        </div>
                    </div>
                    
                    <div class="info-card">
                        <h3><i class="fas fa-chart-simple"></i> R2 Free Tier Usage (10 GB Limit)</h3>
                        <div class="progress-bar">
                            <div class="${progressClass}" style="width: ${percentUsed}%;">
                                ${percentUsed > 15 ? `${percentUsed.toFixed(1)}%` : ''}
                            </div>
                        </div>
                        <div class="stats-row">
                            <div class="stats-row-item">
                                <div class="label">Used</div>
                                <div class="value">${r2.total_gb} GB</div>
                            </div>
                            <div class="stats-row-item">
                                <div class="label">Free Remaining</div>
                                <div class="value">${r2.remaining_free_gb} GB</div>
                            </div>
                            <div class="stats-row-item">
                                <div class="label">Free Limit</div>
                                <div class="value">10 GB</div>
                            </div>
                        </div>
                        ${r2.exceeded_free_tier ? `
                            <div class="alert-warning">
                                <i class="fas fa-exclamation-triangle"></i>
                                <span>You have exceeded the R2 free tier. Additional charges apply.</span>
                            </div>
                        ` : `
                            <div class="alert-success">
                                <i class="fas fa-check-circle"></i>
                                <span>You are within the R2 free tier. No charges apply.</span>
                            </div>
                        `}
                    </div>
                    
                    <div class="info-card">
                        <h3><i class="fas fa-info-circle"></i> R2 Pricing Information</h3>
                        <div class="stats-row">
                            <div class="stats-row-item">
                                <div class="label">Free Storage</div>
                                <div class="value">10 GB</div>
                            </div>
                            <div class="stats-row-item">
                                <div class="label">Class A Ops</div>
                                <div class="value">10M/month free</div>
                            </div>
                            <div class="stats-row-item">
                                <div class="label">Class B Ops</div>
                                <div class="value">10M/month free</div>
                            </div>
                        </div>
                        <div class="pricing-row">
                            <span class="pricing-item">
                                <i class="fas fa-tag"></i> Overage Storage: <strong>$0.015 per GB/month</strong>
                            </span>
                            <span class="pricing-item">
                                <i class="fas fa-tag"></i> Class A Overage: <strong>$0.01 per million</strong>
                            </span>
                            <span class="pricing-item">
                                <i class="fas fa-tag"></i> Class B Overage: <strong>$0.01 per million</strong>
                            </span>
                        </div>
                    </div>
                    
                    <!-- D1 STATS SECTION -->
                    <div class="info-card">
                        <h3><i class="fas fa-database"></i> D1 Database Statistics</h3>
                        ${d1.metrics_available ? `
                            <div class="stats-row">
                                <div class="stats-row-item">
                                    <div class="label">Database Size</div>
                                    <div class="value">${d1.database_size_gb} GB</div>
                                </div>
                                <div class="stats-row-item">
                                    <div class="label">Free Remaining</div>
                                    <div class="value">${d1.remaining_free_gb} GB</div>
                                </div>
                                <div class="stats-row-item">
                                    <div class="label">Free Limit</div>
                                    <div class="value">5 GB</div>
                                </div>
                            </div>
                            <div class="progress-bar">
                                <div class="${d1ProgressClass}" style="width: ${d1PercentUsed}%;">
                                    ${d1PercentUsed > 15 ? `${d1PercentUsed.toFixed(1)}%` : ''}
                                </div>
                            </div>
                            <div class="stats-row" style="margin-top: 15px;">
                                <div class="stats-row-item">
                                    <div class="label">Total Queries</div>
                                    <div class="value">${d1.query_count.toLocaleString()}</div>
                                </div>
                                <div class="stats-row-item">
                                    <div class="label">Rows Read</div>
                                    <div class="value">${d1.rows_read.toLocaleString()}</div>
                                </div>
                                <div class="stats-row-item">
                                    <div class="label">Rows Written</div>
                                    <div class="value">${d1.rows_written.toLocaleString()}</div>
                                </div>
                            </div>
                            ${d1.exceeded_free_tier ? `
                                <div class="alert-warning">
                                    <i class="fas fa-exclamation-triangle"></i>
                                    <span>You have exceeded the D1 free tier (5 GB). Additional charges apply ($0.75/GB).</span>
                                </div>
                            ` : `
                                <div class="alert-success">
                                    <i class="fas fa-check-circle"></i>
                                    <span>You are within the D1 free tier (5 GB). No charges apply.</span>
                                </div>
                            `}
                            <div class="pricing-row" style="margin-top: 12px;">
                                <span class="pricing-item">
                                    <i class="fas fa-tag"></i> D1 Overage: <strong>$0.75 per GB/month</strong>
                                </span>
                                <span class="pricing-item">
                                    <i class="fas fa-tag"></i> Query charges: <strong>First 5 billion free</strong>
                                </span>
                            </div>
                        ` : `
                            <div class="alert-warning">
                                <i class="fas fa-info-circle"></i>
                                <span>D1 Metrics API not available. Add "D1 Read" permission to your API token.</span>
                            </div>
                            <div class="list-item">
                                <i class="fas fa-database"></i>
                                <span>Database: ${d1.database_name}</span>
                            </div>
                            <div class="list-item">
                                <i class="fas fa-id-card"></i>
                                <span>Database ID: ${d1.database_id}</span>
                            </div>
                        `}
                    </div>
                    
                    <!-- ABOUT SECTION -->
                    <div class="info-card">
                        <h3><i class="fas fa-question-circle"></i> About This Page</h3>
                        <div class="list-item">
                            <i class="fas fa-check-circle"></i>
                            <span>R2 usage is fetched directly from Cloudflare API</span>
                        </div>
                        <div class="list-item">
                            <i class="fas fa-check-circle"></i>
                            <span>D1 metrics include database size and query statistics</span>
                        </div>
                        <div class="list-item">
                            <i class="fas fa-check-circle"></i>
                            <span>Updates every time you refresh the page</span>
                        </div>
                        <div class="list-item">
                            <i class="fas fa-chart-line"></i>
                            <span>Costs are estimated based on current Cloudflare pricing</span>
                        </div>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error loading usage stats:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle" style="color: #ef4444;"></i>
                        <h3>Failed to Load Usage Stats</h3>
                        <p style="margin: 12px 0;">${error.message}</p>
                        <button onclick="loadUsageStats()" class="btn btn-primary" style="margin-top: 16px;">
                            <i class="fas fa-sync-alt"></i> Try Again
                        </button>
                    </div>
                `;
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadUsageStats();
        });
    </script>
</body>
</html>
