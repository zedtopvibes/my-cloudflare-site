<!-- HEADING: Trash -->
<div class="admin-content">
    <div class="content-header">
        <h2>
            <i class="fas fa-trash-alt"></i> Recycle Bin
            <button onclick="loadData()" class="btn btn-secondary btn-sm" title="Refresh">
                <i class="fas fa-sync-alt"></i>
            </button>
        </h2>
    </div>
    
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card trash-gradient">
            <div class="stat-icon"><i class="fas fa-trash-alt"></i></div>
            <div class="stat-value" id="totalDeleted">0</div>
            <div class="stat-label">Total Deleted</div>
        </div>
        <div class="stat-card" onclick="filterByType('tracks')">
            <div class="stat-icon"><i class="fas fa-music"></i></div>
            <div class="stat-value" id="deletedTracks">0</div>
            <div class="stat-label">Songs</div>
        </div>
        <div class="stat-card" onclick="filterByType('albums')">
            <div class="stat-icon"><i class="fas fa-compact-disc"></i></div>
            <div class="stat-value" id="deletedAlbums">0</div>
            <div class="stat-label">Albums</div>
        </div>
        <div class="stat-card" onclick="filterByType('eps')">
            <div class="stat-icon"><i class="fas fa-play-circle"></i></div>
            <div class="stat-value" id="deletedEPs">0</div>
            <div class="stat-label">EPs</div>
        </div>
        <div class="stat-card" onclick="filterByType('artists')">
            <div class="stat-icon"><i class="fas fa-microphone"></i></div>
            <div class="stat-value" id="deletedArtists">0</div>
            <div class="stat-label">Artists</div>
        </div>
        <div class="stat-card" onclick="filterByType('playlists')">
            <div class="stat-icon"><i class="fas fa-list"></i></div>
            <div class="stat-value" id="deletedPlaylists">0</div>
            <div class="stat-label">Playlists</div>
        </div>
    </div>
    
    <div class="filter-tabs">
        <button class="filter-tab active" data-type="all" onclick="filterByType('all')">All Items</button>
        <button class="filter-tab" data-type="tracks" onclick="filterByType('tracks')"><i class="fas fa-music"></i> Songs</button>
        <button class="filter-tab" data-type="albums" onclick="filterByType('albums')"><i class="fas fa-compact-disc"></i> Albums</button>
        <button class="filter-tab" data-type="eps" onclick="filterByType('eps')"><i class="fas fa-play-circle"></i> EPs</button>
        <button class="filter-tab" data-type="artists" onclick="filterByType('artists')"><i class="fas fa-microphone"></i> Artists</button>
        <button class="filter-tab" data-type="playlists" onclick="filterByType('playlists')"><i class="fas fa-list"></i> Playlists</button>
    </div>
    
    <div id="itemsContainer">
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
    </div>
</div>

<script>
    let currentFilter = 'all';
    let pendingDelete = null;
    
    function checkAuth() {
        const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
        const loginTime = localStorage.getItem('admin_login_time');
        
        if (!isLoggedIn || !loginTime) {
            window.location.href = '/admin/login.html';
            return false;
        }
        
        const hoursSince = (Date.now() - parseInt(loginTime)) / (1000 * 60 * 60);
        if (hoursSince > 24) {
            localStorage.clear();
            window.location.href = '/admin/login.html';
            return false;
        }
        return true;
    }
    
    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i><span>${message}</span>`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function closeModal() {
        pendingDelete = null;
        document.getElementById('deleteModal').classList.remove('active');
    }
    
    function confirmDelete(type, id, name) {
        pendingDelete = { type, id, name };
        document.getElementById('deleteModal').classList.add('active');
    }
    
    async function permanentDelete() {
        if (!pendingDelete) return;
        
        try {
            const response = await fetch(`/api/admin/trash/${pendingDelete.type}/${pendingDelete.id}`, {
                method: 'DELETE'
            });
            
            if (response.ok) {
                showToast(`"${pendingDelete.name}" permanently deleted`, 'success');
                closeModal();
                loadData();
            } else {
                const error = await response.json();
                throw new Error(error.error || 'Failed to delete');
            }
        } catch (error) {
            showToast('Error deleting item: ' + error.message, 'error');
            closeModal();
        }
    }
    
    async function restoreItem(type, id, name) {
        try {
            const response = await fetch(`/api/admin/${type}/${id}/restore`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            
            if (response.ok) {
                showToast(`"${name}" restored successfully!`, 'success');
                loadData();
            } else {
                const error = await response.json();
                throw new Error(error.error || 'Failed to restore');
            }
        } catch (error) {
            showToast('Error restoring item: ' + error.message, 'error');
        }
    }
    
    function filterByType(type) {
        currentFilter = type;
        
        document.querySelectorAll('.filter-tab').forEach(btn => {
            if (btn.dataset.type === type) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        loadData();
    }
    
    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleString('en-GB', {
            day: '2-digit',
            month: 'short',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    }
    
    function getTypeIcon(type) {
        const icons = {
            tracks: 'fa-music',
            albums: 'fa-compact-disc',
            eps: 'fa-play-circle',
            artists: 'fa-microphone',
            playlists: 'fa-list'
        };
        return icons[type] || 'fa-file';
    }
    
    function getTypeName(type) {
        const names = {
            tracks: 'Song',
            albums: 'Album',
            eps: 'EP',
            artists: 'Artist',
            playlists: 'Playlist'
        };
        return names[type] || type;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    
    function renderItemCard(item, type) {
        const typeName = getTypeName(type);
        const typeIcon = getTypeIcon(type);
        const deletedDate = formatDate(item.deleted_at);
        const itemName = item.title || item.name || 'Untitled';
        
        let metaInfo = [];
        
        switch(type) {
            case 'tracks':
                if (item.artist_name) metaInfo.push(`<i class="fas fa-user"></i> ${escapeHtml(item.artist_name)}`);
                if (item.duration) {
                    const minutes = Math.floor(item.duration / 60);
                    const seconds = (item.duration % 60).toString().padStart(2, '0');
                    metaInfo.push(`<i class="fas fa-clock"></i> ${minutes}:${seconds}`);
                }
                break;
            case 'albums':
            case 'eps':
                if (item.artist_name) metaInfo.push(`<i class="fas fa-user"></i> ${escapeHtml(item.artist_name)}`);
                if (item.release_date) metaInfo.push(`<i class="fas fa-calendar"></i> ${new Date(item.release_date).getFullYear()}`);
                break;
            case 'artists':
                if (item.country) metaInfo.push(`<i class="fas fa-map-marker-alt"></i> ${escapeHtml(item.country)}`);
                break;
            case 'playlists':
                metaInfo.push(item.is_public ? '<i class="fas fa-globe"></i> Public' : '<i class="fas fa-lock"></i> Private');
                break;
        }
        
        return `
            <div class="item-card">
                <div class="item-info">
                    <h4>
                        <i class="fas ${typeIcon}" style="color: var(--primary-blue);"></i>
                        ${escapeHtml(itemName)}
                    </h4>
                    <div class="item-meta">
                        <span><i class="fas fa-tag"></i> ${typeName}</span>
                        ${metaInfo.map(info => `<span>${info}</span>`).join('')}
                        <span class="deleted-date"><i class="fas fa-trash-alt"></i> Deleted: ${deletedDate}</span>
                    </div>
                </div>
                <div class="item-actions">
                    <button class="btn btn-restore" onclick="restoreItem('${type}', ${item.id}, '${escapeHtml(itemName).replace(/'/g, "\\'")}')">
                        <i class="fas fa-undo-alt"></i> Restore
                    </button>
                    <button class="btn btn-delete" onclick="confirmDelete('${type}', ${item.id}, '${escapeHtml(itemName).replace(/'/g, "\\'")}')">
                        <i class="fas fa-trash-alt"></i> Delete Permanently
                    </button>
                </div>
            </div>
        `;
    }
    
    async function loadData() {
        const container = document.getElementById('itemsContainer');
        container.innerHTML = '<div class="skeleton-row"></div><div class="skeleton-row"></div><div class="skeleton-row"></div>';
        
        try {
            let url = '/api/admin/trash';
            if (currentFilter !== 'all') {
                url = `/api/admin/trash/${currentFilter}`;
            }
            
            const response = await fetch(url);
            const data = await response.json();
            
            // Update stats
            if (currentFilter === 'all') {
                const total = (data.tracks?.length || 0) + (data.albums?.length || 0) + 
                             (data.eps?.length || 0) + (data.artists?.length || 0) + 
                             (data.playlists?.length || 0);
                
                document.getElementById('totalDeleted').textContent = total;
                document.getElementById('deletedTracks').textContent = data.tracks?.length || 0;
                document.getElementById('deletedAlbums').textContent = data.albums?.length || 0;
                document.getElementById('deletedEPs').textContent = data.eps?.length || 0;
                document.getElementById('deletedArtists').textContent = data.artists?.length || 0;
                document.getElementById('deletedPlaylists').textContent = data.playlists?.length || 0;
            }
            
            // Display items
            let items = [];
            let hasItems = false;
            
            if (currentFilter === 'all') {
                const types = ['tracks', 'albums', 'eps', 'artists', 'playlists'];
                for (const type of types) {
                    const typeItems = data[type];
                    if (Array.isArray(typeItems) && typeItems.length > 0) {
                        hasItems = true;
                        typeItems.forEach(item => {
                            items.push(renderItemCard(item, type));
                        });
                    }
                }
            } else {
                if (Array.isArray(data) && data.length > 0) {
                    hasItems = true;
                    data.forEach(item => {
                        items.push(renderItemCard(item, currentFilter));
                    });
                }
            }
            
            if (!hasItems) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-trash-alt"></i>
                        <h3>No Deleted Items</h3>
                        <p>Deleted items will appear here</p>
                    </div>
                `;
            } else {
                container.innerHTML = `<div class="items-grid">${items.join('')}</div>`;
            }
            
        } catch (error) {
            console.error('Error loading trash:', error);
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>Error Loading Deleted Items</h3>
                    <p>${error.message}</p>
                    <button onclick="loadData()" class="btn btn-primary" style="margin-top: 15px;">Try Again</button>
                </div>
            `;
        }
    }
    
    // Set up modal confirmation
    document.getElementById('confirmDeleteBtn').addEventListener('click', permanentDelete);
    
    // Close modal when clicking outside
    window.onclick = function(event) {
        const modal = document.getElementById('deleteModal');
        if (event.target === modal) {
            closeModal();
        }
    };
    
    // Load data on page load
    document.addEventListener('DOMContentLoaded', function() {
        if (checkAuth()) {
            loadData();
        }
    });
</script>
