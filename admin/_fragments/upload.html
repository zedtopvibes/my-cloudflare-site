<!-- HEADING: Upload Song -->
<div class="admin-content">
    <div class="upload-form-container">
        <form id="uploadForm" enctype="multipart/form-data">
            <div class="upload-grid">
                <!-- Left Column -->
                <div class="form-section">
                    <div class="section-header">
                        <h3><i class="fas fa-info-circle"></i> Basic Information</h3>
                        <button type="button" class="settings-btn" onclick="showSettingsModal()">
                            <i class="fas fa-cog"></i>
                        </button>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-heading"></i> Song Title *</label>
                        <input type="text" id="title" placeholder="e.g. Midnight Waves">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-star"></i> Main Artist *</label>
                        <div style="position: relative;">
                            <input type="text" id="mainArtistInput" placeholder="Type main artist name..." autocomplete="off">
                            <div id="mainArtistSuggestions" class="suggestions-container"></div>
                        </div>
                        <div id="selectedMainArtistBadge" class="selected-badge" style="display: none;">
                            <i class="fas fa-check-circle"></i> <span id="selectedMainArtistName"></span>
                            <button type="button" onclick="clearMainArtistSelection()"><i class="fas fa-times"></i></button>
                        </div>
                        <div class="form-hint">
                            <a href="#" onclick="showModal('artistModal')"><i class="fas fa-plus-circle"></i> Add New Artist</a>
                        </div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-users"></i> Featured Artists (Optional)</label>
                        <div style="position: relative;">
                            <input type="text" id="featuredArtistInput" placeholder="Type featured artist name..." autocomplete="off">
                            <div id="featuredArtistSuggestions" class="suggestions-container"></div>
                        </div>
                        <div id="featuredArtistsContainer" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;"></div>
                        <div class="form-hint">
                            <a href="#" onclick="showModal('artistModal')"><i class="fas fa-plus-circle"></i> Add New Artist</a>
                        </div>
                    </div>

                    <div id="albumSection">
                        <div class="form-group">
                            <label><i class="fas fa-compact-disc"></i> Album (Optional)</label>
                            <div style="position: relative;">
                                <input type="text" id="albumSearchInput" placeholder="Search or type album name..." autocomplete="off">
                                <div id="albumSuggestions" class="suggestions-container"></div>
                            </div>
                            <div id="selectedAlbumBadge" class="selected-badge" style="display: none;">
                                <i class="fas fa-check-circle"></i> <span id="selectedAlbumName"></span>
                                <span id="selectedAlbumId" style="display: none;"></span>
                                <button type="button" onclick="clearAlbumSelection()"><i class="fas fa-times"></i></button>
                            </div>
                            <div id="trackNumberContainer" class="track-number-container" style="display: none;">
                                <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px;">
                                    <i class="fas fa-hashtag"></i> Track Number
                                </label>
                                <input type="number" id="trackNumber" min="1" value="1">
                                <div class="form-hint">Position of this track in the album</div>
                            </div>
                            <div class="form-hint">
                                <a href="#" onclick="showModal('albumModal')"><i class="fas fa-plus-circle"></i> Create New Album</a>
                            </div>
                        </div>
                    </div>

                    <div id="playlistSection">
                        <div class="form-group">
                            <label><i class="fas fa-list"></i> Add to Playlists (Optional)</label>
                            <div style="position: relative;">
                                <input type="text" id="playlistSearch" placeholder="Search playlists..." autocomplete="off">
                                <div id="playlistSuggestions" class="suggestions-container"></div>
                            </div>
                            <div id="selectedPlaylistsContainer" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;"></div>
                            <div class="form-hint">
                                <a href="#" onclick="showModal('playlistModal')"><i class="fas fa-plus-circle"></i> Create New Playlist</a>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-tag"></i> Genre</label>
                            <input type="text
