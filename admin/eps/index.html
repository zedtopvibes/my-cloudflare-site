<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EPs - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #ff5722;
            --primary-light: #ff7a44;
            --primary-soft: #fff0e8;
            --secondary: #ff9800;
            --success: #10b981;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.5;
        }
        
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .admin-header {
            background: white;
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .header-top h1 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--gray-800);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-top h1 i {
            color: var(--primary);
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--gray-100);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.9rem;
        }
        
        .logout-btn {
            background: none;
            border: none;
            color: var(--gray-600);
            cursor: pointer;
            font-size: 1rem;
        }
        
        .admin-tabs {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        
        .tab-btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--gray-600);
            cursor: pointer;
            white-space: nowrap;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .tab-btn:hover {
            background: var(--gray-100);
            color: var(--primary);
        }
        
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        
        .admin-content {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }
        
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .content-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--gray-700);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .search-section {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            padding: 5px 12px;
            border: 1px solid var(--gray-200);
            min-width: 250px;
        }
        
        .search-box i {
            color: var(--gray-400);
            margin-right: 8px;
        }
        
        .search-box input {
            border: none;
            background: transparent;
            padding: 8px 0;
            width: 100%;
            outline: none;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-light);
        }
        
        .btn-secondary {
            background: var(--gray-100);
            color: var(--gray-700);
            border: 1px solid var(--gray-200);
        }
        
        /* Compact List View */
        .eps-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }
        
        .ep-list-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
        }
        
        .ep-list-item:hover {
            background: var(--primary-soft);
            border-color: var(--primary);
            transform: translateX(4px);
        }
        
        .ep-list-cover {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            margin-right: 16px;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .ep-list-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .ep-list-info {
            flex: 1;
            min-width: 0;
        }
        
        .ep-list-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--gray-800);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .ep-list-artist {
            font-size: 0.85rem;
            color: var(--primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .ep-list-stats {
            display: flex;
            gap: 20px;
            margin-right: 20px;
            flex-shrink: 0;
        }
        
        .ep-list-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--gray-600);
        }
        
        .ep-list-stat i {
            color: var(--primary);
            font-size: 0.8rem;
        }
        
        .ep-list-featured {
            background: rgba(255, 193, 7, 0.2);
            color: #92400e;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 10px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .ep-badge {
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 10px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-500);
        }
        
        .empty-state i {
            font-size: 4rem;
            color: var(--gray-300);
            margin-bottom: 16px;
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
        }
        
        .page-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm);
            background: white;
            cursor: pointer;
        }
        
        .page-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray-500);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .ep-list-item {
                flex-wrap: wrap;
            }
            
            .ep-list-stats {
                width: 100%;
                margin-left: 96px; /* 80px image + 16px margin */
                margin-top: 8px;
                gap: 15px;
            }
            
            .ep-list-featured,
            .ep-badge {
                margin-left: 96px;
                margin-top: 8px;
            }
        }
        
        @media (max-width: 640px) {
            .content-header {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-section {
                flex-direction: column;
            }
            
            .search-box {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="header-top">
                <h1><i class="fas fa-compact-disc"></i> EPs</h1>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span>Admin</span>
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
            
            <div class="admin-tabs">
                <a href="/admin/" class="tab-btn"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="/admin/upload" class="tab-btn"><i class="fas fa-cloud-upload-alt"></i> Upload</a>
                <a href="/admin/songs" class="tab-btn"><i class="fas fa-music"></i> Songs</a>
                <a href="/admin/albums/index.html" class="tab-btn"><i class="fas fa-compact-disc"></i> Albums</a>
                <a href="/admin/eps/index.html" class="tab-btn active"><i class="fas fa-microphone"></i> EPs</a>
                <a href="/admin/artists/index.html" class="tab-btn"><i class="fas fa-microphone"></i> Artists</a>
                <a href="/admin/playlists/index.html" class="tab-btn"><i class="fas fa-list"></i> Playlists</a>
            </div>
        </div>
        
        <div class="admin-content">
            <div class="content-header">
                <h2>
                    <i class="fas fa-compact-disc"></i> All EPs
                    <button onclick="loadEPs()" class="btn btn-secondary" style="margin-left: 8px;">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </h2>
                <div class="search-section">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search EPs by title or artist..." onkeyup="searchEPs()">
                    </div>
                    <a href="/admin/eps/edit.html" class="btn btn-primary">
                        <i class="fas fa-plus-circle"></i> New EP
                    </a>
                </div>
            </div>

            <!-- EPs List (Compact View) -->
            <div id="epsList" class="eps-list">
                <div class="loading">
                    <i class="fas fa-circle-notch fa-spin"></i>
                    <div>Loading EPs...</div>
                </div>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let allEPs = [];
        let currentPage = 1;
        const itemsPerPage = 15;

        function logout() {
            if (confirm('Logout?')) {
                localStorage.clear();
                window.location.href = '/admin/login.html';
            }
        }

        function checkAuth() {
            const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
            const loginTime = localStorage.getItem('admin_login_time');
            
            if (!isLoggedIn || !loginTime) {
                window.location.href = '/admin/login.html';
                return false;
            }
            
            const hoursSince = (Date.now() - parseInt(loginTime)) / (1000 * 60 * 60);
            if (hoursSince > 24) {
                localStorage.clear();
                window.location.href = '/admin/login.html';
                return false;
            }
            return true;
        }

        // Helper function to get artist display name (handles both new and old structure)
        function getArtistDisplayName(ep) {
            // New structure: artist_name field
            if (ep.artist_name) return ep.artist_name;
            // Old structure: artist field
            if (ep.artist) return ep.artist;
            return 'Unknown Artist';
        }

        async function loadEPs() {
            if (!checkAuth()) return;
            
            const startTime = performance.now();
            
            try {
                const res = await fetch(`${API_BASE}/eps`);
                if (!res.ok) throw new Error('Failed to load EPs');
                
                allEPs = await res.json();
                
                const endTime = performance.now();
                console.log(`EPs loaded in ${((endTime - startTime)/1000).toFixed(2)}s`);
                
                renderEPs();
                
            } catch (error) {
                document.getElementById('epsList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle" style="color: #ef4444;"></i>
                        <h3>Failed to Load EPs</h3>
                        <p style="margin: 12px 0;">${error.message}</p>
                        <button onclick="loadEPs()" class="btn btn-primary">Try Again</button>
                    </div>
                `;
            }
        }

        function renderEPs() {
            const container = document.getElementById('epsList');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = allEPs.filter(ep => {
                const artistName = getArtistDisplayName(ep);
                return ep.title.toLowerCase().includes(searchTerm) ||
                       artistName.toLowerCase().includes(searchTerm);
            });
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-compact-disc"></i>
                        <h3>No EPs found</h3>
                        <p>${searchTerm ? 'Try a different search' : 'Create your first EP'}</p>
                        <a href="/admin/eps/edit.html" class="btn btn-primary" style="margin-top: 16px;">
                            <i class="fas fa-plus-circle"></i> New EP
                        </a>
                    </div>
                `;
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            // Pagination
            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageEPs = filtered.slice(start, end);
            
            container.innerHTML = pageEPs.map(ep => {
                const artistName = getArtistDisplayName(ep);
                return `
                    <a href="/admin/eps/profile.html?id=${ep.id}" class="ep-list-item">
                        <div class="ep-list-cover">
                            ${ep.cover_url 
                                ? `<img src="${ep.cover_url}" alt="${escapeHtml(ep.title)}" loading="lazy">`
                                : `<i class="fas fa-compact-disc"></i>`
                            }
                        </div>
                        <div class="ep-list-info">
                            <div class="ep-list-title">${escapeHtml(ep.title)} <span class="ep-badge">EP</span></div>
                            <div class="ep-list-artist">${escapeHtml(artistName)}</div>
                        </div>
                        <div class="ep-list-stats">
                            <div class="ep-list-stat">
                                <i class="fas fa-music"></i> ${ep.track_count || 0}
                            </div>
                            <div class="ep-list-stat">
                                <i class="fas fa-headphones"></i> ${formatNumber(ep.plays || 0)}
                            </div>
                        </div>
                        ${ep.is_featured ? '<span class="ep-list-featured">Featured</span>' : ''}
                    </a>
                `;
            }).join('');
            
            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            if (totalPages <= 1) {
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            document.getElementById('pagination').innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            renderEPs();
        }

        function searchEPs() {
            currentPage = 1;
            renderEPs();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        // Initialize
        if (checkAuth()) {
            loadEPs();
        }
    </script>
</body>
</html>
