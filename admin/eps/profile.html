<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EP Profile - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #ff5722;
            --primary-light: #ff7a44;
            --primary-soft: #fff0e8;
            --secondary: #ff9800;
            --success: #10b981;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.5;
        }
        
        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: white;
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--gray-200);
        }
        
        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--gray-800);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header h1 i {
            color: var(--primary);
        }
        
        .back-btn {
            padding: 6px 14px;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            color: var(--gray-700);
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--gray-200);
        }
        
        .back-btn:hover {
            background: var(--gray-200);
        }
        
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .badge.featured {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fbbf24;
        }
        
        /* Artist badge styles */
        .artist-badge {
            display: inline-block;
            background: #e3f2fd;
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            margin: 2px;
            white-space: nowrap;
        }
        
        .artist-badge.primary {
            background: var(--primary);
            color: white;
        }
        
        .artist-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
        }
        
        /* Profile Card */
        .profile-card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid var(--gray-200);
        }
        
        /* Cover */
        .ep-cover-large {
            height: 200px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 5rem;
            position: relative;
        }
        
        .ep-cover-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .ep-cover-large .default-cover {
            opacity: 0.8;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        /* EP Info */
        .ep-info {
            padding: 24px;
            border-bottom: 1px solid var(--gray-200);
        }
        
        .ep-name {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 8px;
        }
        
        .ep-artist {
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .ep-creator {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--gray-500);
            font-size: 0.9rem;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .ep-description {
            color: var(--gray-600);
            font-size: 0.95rem;
            line-height: 1.6;
            max-width: 80%;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-bottom: 1px solid var(--gray-200);
        }
        
        .stat-card {
            padding: 20px;
            text-align: center;
            border-right: 1px solid var(--gray-200);
        }
        
        .stat-card:last-child {
            border-right: none;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--gray-500);
            text-transform: uppercase;
        }
        
        /* Tracks Section */
        .tracks-section {
            padding: 24px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--gray-700);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-header h2 i {
            color: var(--primary);
        }
        
        .track-count {
            background: var(--gray-100);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--gray-600);
        }
        
        .tracks-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .track-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
            transition: all 0.2s;
        }
        
        .track-item:hover {
            background: var(--primary-soft);
            border-color: var(--primary);
        }
        
        .track-number {
            width: 30px;
            height: 30px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary);
            margin-right: 12px;
            border: 1px solid var(--gray-200);
        }
        
        .track-info {
            flex: 1;
        }
        
        .track-title {
            font-weight: 500;
            color: var(--gray-800);
            margin-bottom: 2px;
        }
        
        .track-artist {
            font-size: 0.8rem;
            color: var(--gray-500);
        }
        
        .track-stats {
            display: flex;
            gap: 16px;
            margin-right: 16px;
        }
        
        .track-stat {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            color: var(--gray-500);
        }
        
        .track-stat i {
            color: var(--primary);
            font-size: 0.75rem;
        }
        
        .remove-track {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            background: var(--gray-200);
            color: var(--gray-500);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .remove-track:hover {
            background: #ef4444;
            color: white;
        }
        
        .empty-tracks {
            text-align: center;
            padding: 40px;
            color: var(--gray-500);
            background: var(--gray-50);
            border-radius: var(--radius-md);
            border: 1px dashed var(--gray-300);
        }
        
        .empty-tracks i {
            font-size: 3rem;
            color: var(--gray-300);
            margin-bottom: 12px;
        }
        
        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            padding: 20px 24px 24px 24px;
            border-top: 1px solid var(--gray-200);
        }
        
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-light);
        }
        
        .btn-secondary {
            background: var(--gray-100);
            color: var(--gray-700);
            border: 1px solid var(--gray-200);
        }
        
        .btn-secondary:hover {
            background: var(--gray-200);
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--gray-500);
        }
        
        .loading i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 16px;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            z-index: 2000;
            animation: slideIn 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        
        .toast.success { background: var(--success); }
        .toast.error { background: #ef4444; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .track-item {
                flex-wrap: wrap;
            }
            
            .track-stats {
                width: 100%;
                margin-left: 42px;
                margin-top: 8px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="header">
            <h1>
                <i class="fas fa-compact-disc"></i>
                EP Details
            </h1>
            <a href="/admin/eps/index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                Back to EPs
            </a>
        </div>
        
        <div class="profile-card" id="profileContent">
            <div class="loading">
                <i class="fas fa-circle-notch fa-spin"></i>
                <div>Loading EP...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        
        // Helper function to get artist display name from track
        function getTrackArtistDisplay(track) {
            if (!track.artists || track.artists.length === 0) {
                return escapeHtml(track.artist || 'Unknown Artist');
            }
            
            const primaryArtist = track.artists.find(a => a.is_primary === 1) || track.artists[0];
            const featuredArtists = track.artists.filter(a => a.is_primary === 0);
            
            let html = `<span class="artist-badge primary">${escapeHtml(primaryArtist.name)}</span>`;
            if (featuredArtists.length > 0) {
                html += featuredArtists.map(a => `<span class="artist-badge">${escapeHtml(a.name)}</span>`).join('');
            }
            return html;
        }
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function loadEP() {
            const urlParams = new URLSearchParams(window.location.search);
            const epId = urlParams.get('id');
            
            if (!epId) {
                window.location.href = '/admin/eps/index.html';
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/eps/${epId}`);
                if (!res.ok) throw new Error('EP not found');
                
                const ep = await res.json();
                
                const epArtist = ep.artist_name || ep.artist || 'Unknown Artist';
                const tracks = ep.tracks || [];
                
                const totalPlays = tracks.reduce((sum, t) => sum + (t.plays || 0), 0);
                const totalDuration = tracks.reduce((sum, t) => sum + (t.duration || 0), 0);
                
                const formatDuration = (seconds) => {
                    if (!seconds) return '0:00';
                    const mins = Math.floor(seconds / 60);
                    const secs = seconds % 60;
                    return `${mins}:${secs.toString().padStart(2, '0')}`;
                };
                
                const releaseDate = ep.release_date 
                    ? new Date(ep.release_date).toLocaleDateString('en-US', { 
                        year: 'numeric', 
                        month: 'short', 
                        day: 'numeric' 
                      })
                    : 'Unknown';
                
                document.getElementById('profileContent').innerHTML = `
                    <div class="ep-cover-large">
                        ${ep.cover_url 
                            ? `<img src="${ep.cover_url}" alt="${escapeHtml(ep.title)}">`
                            : `<div class="default-cover">🎵</div>`
                        }
                    </div>
                    
                    <div class="ep-info">
                        <h1 class="ep-name">${escapeHtml(ep.title)} <span class="badge featured" style="background: var(--primary); color: white; margin-left: 8px; font-size: 0.7rem;">EP</span></h1>
                        <div class="ep-artist">${escapeHtml(epArtist)}</div>
                        <div class="ep-creator">
                            <i class="fas fa-calendar"></i>
                            Released: ${releaseDate}
                            ${ep.is_featured ? '<span class="badge featured" style="margin-left: 10px;">Featured</span>' : ''}
                        </div>
                        ${ep.description ? `
                            <div class="ep-description">${escapeHtml(ep.description)}</div>
                        ` : ''}
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value">${tracks.length}</div>
                            <div class="stat-label">Tracks</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${formatNumber(ep.plays || 0)}</div>
                            <div class="stat-label">Plays</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${formatNumber(ep.views || 0)}</div>
                            <div class="stat-label">Views</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${formatDuration(totalDuration)}</div>
                            <div class="stat-label">Duration</div>
                        </div>
                    </div>
                    
                    <div class="tracks-section">
                        <div class="section-header">
                            <h2>
                                <i class="fas fa-music"></i>
                                Tracks in this EP
                            </h2>
                            <span class="track-count">${tracks.length} tracks</span>
                        </div>
                        
                        ${tracks.length > 0 ? `
                            <div class="tracks-list" id="tracksList">
                                ${tracks.map((track, index) => `
                                    <div class="track-item" data-track-id="${track.id}">
                                        <div class="track-number">${index + 1}</div>
                                        <div class="track-info">
                                            <div class="track-title">${escapeHtml(track.title)}</div>
                                            <div class="track-artist">${getTrackArtistDisplay(track)}</div>
                                        </div>
                                        <div class="track-stats">
                                            <span class="track-stat"><i class="fas fa-headphones"></i> ${formatNumber(track.plays || 0)}</span>
                                            <span class="track-stat"><i class="fas fa-clock"></i> ${formatDuration(track.duration)}</span>
                                        </div>
                                        <button class="remove-track" onclick="removeTrack(${ep.id}, ${track.id}, this)" title="Remove from EP">
                                            <i class="fas fa-times"></i>
                                        </button>
                                    </div>
                                `).join('')}
                            </div>
                        ` : `
                            <div class="empty-tracks">
                                <i class="fas fa-music"></i>
                                <p>No tracks in this EP yet</p>
                                <button class="btn btn-primary" style="margin-top: 16px;" onclick="addTracks(${ep.id})">
                                    <i class="fas fa-plus-circle"></i> Add Tracks
                                </button>
                            </div>
                        `}
                    </div>
                    
                    <div class="action-buttons">
                        <button class="btn btn-secondary" onclick="addTracks(${ep.id})">
                            <i class="fas fa-plus-circle"></i> Add Tracks
                        </button>
                        <a href="/admin/eps/edit.html?id=${ep.id}" class="btn btn-primary">
                            <i class="fas fa-edit"></i> Edit EP
                        </a>
                        <button class="btn btn-danger" onclick="deleteEP(${ep.id})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                `;
                
            } catch (error) {
                document.getElementById('profileContent').innerHTML = `
                    <div style="text-align: center; padding: 60px;">
                        <i class="fas fa-exclamation-circle" style="font-size: 3rem; color: #ef4444; margin-bottom: 16px;"></i>
                        <h3>Failed to Load EP</h3>
                        <p style="color: #6b7280; margin: 12px 0;">${error.message}</p>
                        <a href="/admin/eps/index.html" class="btn btn-primary" style="margin-top: 16px;">Back to EPs</a>
                    </div>
                `;
            }
        }
        
        async function removeTrack(epId, trackId, button) {
            if (!confirm('Remove this track from the EP?')) return;
            
            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            try {
                const res = await fetch(`${API_BASE}/admin/eps/${epId}/tracks/${trackId}`, {
                    method: 'DELETE'
                });
                
                if (!res.ok) {
                    const error = await res.json();
                    throw new Error(error.error || 'Failed to remove track');
                }
                
                const trackItem = button.closest('.track-item');
                trackItem.style.animation = 'fadeOut 0.3s';
                setTimeout(() => {
                    trackItem.remove();
                    
                    const trackItems = document.querySelectorAll('.track-item');
                    trackItems.forEach((item, index) => {
                        item.querySelector('.track-number').textContent = index + 1;
                    });
                    
                    const trackCount = document.querySelectorAll('.track-item').length;
                    const trackCountSpan = document.querySelector('.track-count');
                    if (trackCountSpan) trackCountSpan.textContent = trackCount + ' tracks';
                    
                    const tracksStat = document.querySelector('.stat-card:first-child .stat-value');
                    if (tracksStat) tracksStat.textContent = trackCount;
                    
                    if (trackCount === 0) {
                        location.reload();
                    }
                    
                    showToast('Track removed from EP', 'success');
                }, 300);
                
            } catch (error) {
                showToast(error.message, 'error');
                button.disabled = false;
                button.innerHTML = '<i class="fas fa-times"></i>';
            }
        }
        
        function addTracks(epId) {
            window.location.href = `/admin/eps/add-tracks.html?id=${epId}`;
        }
        
        async function deleteEP(id) {
            // First check if EP has tracks
            const trackCountElement = document.querySelector('.track-count');
            let trackCount = 0;
            if (trackCountElement) {
                trackCount = parseInt(trackCountElement.textContent) || 0;
            } else {
                trackCount = document.querySelectorAll('.track-item').length;
            }
            
            if (trackCount > 0) {
                showToast(`❌ Cannot delete EP with ${trackCount} track(s). Remove all tracks first.`, 'error');
                return;
            }
            
            if (!confirm('⚠️ Are you sure you want to delete this EP? This action cannot be undone.')) return;
            
            try {
                const res = await fetch(`${API_BASE}/admin/eps/${id}`, {
                    method: 'DELETE'
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.error || 'Failed to delete');
                }
                
                showToast('✅ EP deleted successfully', 'success');
                setTimeout(() => {
                    window.location.href = '/admin/eps/index.html';
                }, 1500);
                
            } catch (error) {
                showToast(`❌ ${error.message}`, 'error');
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        // Add animation styles
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                from { opacity: 1; transform: translateX(0); }
                to { opacity: 0; transform: translateX(-10px); }
            }
        `;
        document.head.appendChild(style);
        
        // Check authentication
        function checkAuth() {
            const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
            const loginTime = localStorage.getItem('admin_login_time');
            
            if (!isLoggedIn || !loginTime) {
                window.location.href = '/admin/login.html';
                return false;
            }
            
            const hoursSince = (Date.now() - parseInt(loginTime)) / (1000 * 60 * 60);
            if (hoursSince > 24) {
                localStorage.clear();
                window.location.href = '/admin/login.html';
                return false;
            }
            return true;
        }
        
        // Initialize
        if (checkAuth()) {
            loadEP();
        }
    </script>
</body>
</html>
