<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Tracks - EP | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #ff5722;
            --primary-light: #ff7a44;
            --primary-soft: #fff0e8;
            --secondary: #ff9800;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.5;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--gray-200);
        }
        
        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--gray-800);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header h1 i {
            color: var(--primary);
        }
        
        .back-btn {
            padding: 6px 14px;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            color: var(--gray-700);
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--gray-200);
        }
        
        .back-btn:hover {
            background: var(--gray-200);
        }
        
        /* Main Content */
        .content-card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid var(--gray-200);
        }
        
        /* EP Header */
        .ep-header {
            padding: 20px;
            background: linear-gradient(135deg, var(--primary-soft), white);
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .ep-cover-small {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
        }
        
        .ep-cover-small img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius-md);
        }
        
        .ep-details h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 4px;
        }
        
        .ep-artist {
            font-size: 0.95rem;
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .ep-stats {
            display: flex;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--gray-500);
        }
        
        .ep-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* Stats Badges */
        .stats-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: var(--gray-100);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--gray-700);
            margin-right: 8px;
            margin-bottom: 8px;
        }
        
        .stats-badge i {
            color: var(--primary);
        }
        
        .stats-badge.available i {
            color: var(--success);
        }
        
        .stats-badge.album i {
            color: var(--warning);
        }
        
        /* Artist badges */
        .artist-badge {
            display: inline-block;
            background: #e3f2fd;
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            margin: 2px;
            white-space: nowrap;
        }
        
        .artist-badge.primary {
            background: var(--primary);
            color: white;
        }
        
        .artist-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
        }
        
        /* Search Section */
        .search-section {
            padding: 20px;
            border-bottom: 1px solid var(--gray-200);
            background: white;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            padding: 8px 16px;
            border: 1px solid var(--gray-200);
            width: 100%;
        }
        
        .search-box i {
            color: var(--gray-400);
            margin-right: 10px;
        }
        
        .search-box input {
            border: none;
            background: transparent;
            padding: 8px 0;
            width: 100%;
            outline: none;
            font-size: 0.95rem;
        }
        
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 6px 14px;
            background: var(--gray-100);
            border: 1px solid var(--gray-200);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--gray-600);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover {
            background: var(--primary-soft);
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* Tracks Grid */
        .tracks-container {
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .track-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
            margin-bottom: 8px;
            transition: all 0.2s;
        }
        
        .track-item:not(.disabled):hover {
            background: var(--primary-soft);
            border-color: var(--primary);
            cursor: pointer;
        }
        
        .track-item.selected {
            background: var(--primary-soft);
            border-color: var(--primary);
            border-width: 2px;
        }
        
        .track-item.disabled {
            opacity: 0.6;
            background: var(--gray-100);
            cursor: not-allowed;
        }
        
        .track-item.disabled:hover {
            background: var(--gray-100);
            border-color: var(--gray-200);
        }
        
        .track-checkbox {
            margin-right: 12px;
        }
        
        .track-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .track-checkbox input:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        .track-cover {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .track-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius-sm);
        }
        
        .track-info {
            flex: 1;
            min-width: 0;
        }
        
        .track-title {
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .track-artist {
            font-size: 0.8rem;
            color: var(--gray-500);
        }
        
        .track-meta {
            display: flex;
            gap: 16px;
            margin-right: 12px;
            font-size: 0.8rem;
            color: var(--gray-500);
            flex-shrink: 0;
        }
        
        .track-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .track-meta i {
            color: var(--primary);
            font-size: 0.7rem;
        }
        
        .track-badge {
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 12px;
            white-space: nowrap;
            margin-left: 8px;
            font-weight: 500;
        }
        
        .track-badge.in-this-ep {
            background: var(--gray-300);
            color: var(--gray-700);
        }
        
        .track-badge.in-other-ep {
            background: var(--primary-soft);
            color: var(--primary);
        }
        
        .track-badge.in-album {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fbbf24;
        }
        
        .track-badge.available {
            background: var(--success);
            color: white;
        }
        
        /* Selection Bar */
        .selection-bar {
            padding: 16px 20px;
            background: var(--gray-100);
            border-top: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .selected-count {
            font-weight: 500;
            color: var(--gray-700);
        }
        
        .selected-count span {
            color: var(--primary);
            font-weight: 700;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: var(--primary-light);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: var(--gray-200);
            color: var(--gray-700);
        }
        
        .btn-secondary:hover {
            background: var(--gray-300);
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--gray-500);
        }
        
        .loading i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 16px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-500);
        }
        
        .empty-state i {
            font-size: 4rem;
            color: var(--gray-300);
            margin-bottom: 16px;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            z-index: 2000;
            animation: slideIn 0.3s;
        }
        
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.warning { background: var(--warning); }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .ep-header {
                flex-direction: column;
                text-align: center;
            }
            
            .track-item {
                flex-wrap: wrap;
            }
            
            .track-meta {
                width: 100%;
                margin-left: 58px;
                margin-top: 8px;
            }
            
            .track-badge {
                margin-left: 58px;
                margin-top: 4px;
            }
            
            .selection-bar {
                flex-direction: column;
                gap: 12px;
            }
            
            .action-buttons {
                width: 100%;
            }
            
            .btn {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-music"></i>
                Add Tracks to EP
            </h1>
            <a href="/admin/eps/index.html" class="back-btn" id="backBtn">
                <i class="fas fa-arrow-left"></i>
                Back to EPs
            </a>
        </div>
        
        <div class="content-card" id="contentCard">
            <div class="loading">
                <i class="fas fa-circle-notch fa-spin"></i>
                <div>Loading tracks...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let epId = null;
        let ep = null;
        let allTracks = [];
        let allEPs = [];
        let allAlbums = [];
        let epTrackIds = new Set();
        let tracksInOtherEPs = new Map(); // track_id -> {epId, epTitle}
        let tracksInAlbums = new Map(); // track_id -> {albumId, albumTitle}
        let selectedTracks = new Set();
        let currentFilter = 'all';

        // Helper function to format artists display
        function formatArtistsDisplay(track) {
            if (!track.artists || track.artists.length === 0) {
                return escapeHtml(track.artist || 'Unknown Artist');
            }
            
            const primaryArtist = track.artists.find(a => a.is_primary === 1) || track.artists[0];
            const featuredArtists = track.artists.filter(a => a.is_primary === 0);
            
            let html = `<span class="artist-badge primary">${escapeHtml(primaryArtist.name)}</span>`;
            if (featuredArtists.length > 0) {
                html += featuredArtists.map(a => `<span class="artist-badge">${escapeHtml(a.name)}</span>`).join('');
            }
            return html;
        }

        // Helper function to get artist names for search
        function getArtistSearchString(track) {
            if (!track.artists || track.artists.length === 0) {
                return track.artist || '';
            }
            return track.artists.map(a => a.name).join(' ');
        }

        async function loadPage() {
            const urlParams = new URLSearchParams(window.location.search);
            epId = urlParams.get('id');
            
            if (!epId) {
                window.location.href = '/admin/eps/index.html';
                return;
            }
            
            try {
                // Load EP details, all tracks, all EPs, and all albums in parallel
                const [epRes, tracksRes, epsRes, albumsRes] = await Promise.all([
                    fetch(`${API_BASE}/eps/${epId}`),
                    fetch(`${API_BASE}/tracks`),
                    fetch(`${API_BASE}/eps`),
                    fetch(`${API_BASE}/albums`)
                ]);
                
                if (!epRes.ok) throw new Error('EP not found');
                
                ep = await epRes.json();
                allTracks = await tracksRes.json();
                allEPs = await epsRes.json();
                allAlbums = await albumsRes.json();
                
                // Get IDs of tracks already in THIS EP
                epTrackIds = new Set((ep.tracks || []).map(t => t.id));
                
                // Build map of tracks in OTHER EPs
                tracksInOtherEPs.clear();
                for (const otherEP of allEPs) {
                    if (otherEP.id == epId) continue; // Skip current EP
                    
                    if (otherEP.tracks && otherEP.tracks.length > 0) {
                        for (const track of otherEP.tracks) {
                            tracksInOtherEPs.set(track.id, {
                                epId: otherEP.id,
                                epTitle: otherEP.title
                            });
                        }
                    }
                }
                
                // Build map of tracks in Albums
                tracksInAlbums.clear();
                for (const album of allAlbums) {
                    if (album.tracks && album.tracks.length > 0) {
                        for (const track of album.tracks) {
                            tracksInAlbums.set(track.id, {
                                albumId: album.id,
                                albumTitle: album.title
                            });
                        }
                    }
                }
                
                renderPage();
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('contentCard').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle" style="color: #ef4444;"></i>
                        <h3>Failed to Load</h3>
                        <p style="margin: 12px 0;">${error.message}</p>
                        <button onclick="loadPage()" class="btn btn-primary">Try Again</button>
                    </div>
                `;
            }
        }

        function renderPage() {
            // Calculate stats
            const availableCount = allTracks.filter(t => 
                !epTrackIds.has(t.id) && !tracksInOtherEPs.has(t.id) && !tracksInAlbums.has(t.id)
            ).length;
            
            const inThisEPCount = epTrackIds.size;
            const inOtherEPsCount = tracksInOtherEPs.size;
            const inAlbumsCount = tracksInAlbums.size;
            
            // Apply search and filter
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            
            // First filter by search
            let filteredTracks = allTracks.filter(track => {
                const artistSearch = getArtistSearchString(track).toLowerCase();
                return track.title.toLowerCase().includes(searchTerm) ||
                       artistSearch.includes(searchTerm);
            });
            
            // Then apply category filter
            if (currentFilter === 'available') {
                filteredTracks = filteredTracks.filter(t => 
                    !epTrackIds.has(t.id) && !tracksInOtherEPs.has(t.id) && !tracksInAlbums.has(t.id)
                );
            } else if (currentFilter === 'in-this-ep') {
                filteredTracks = filteredTracks.filter(t => epTrackIds.has(t.id));
            } else if (currentFilter === 'in-other-eps') {
                filteredTracks = filteredTracks.filter(t => tracksInOtherEPs.has(t.id));
            } else if (currentFilter === 'in-albums') {
                filteredTracks = filteredTracks.filter(t => tracksInAlbums.has(t.id));
            }

            const contentCard = document.getElementById('contentCard');
            
            // Get EP artist name
            const epArtist = ep.artist_name || ep.artist || 'Unknown Artist';
            
            contentCard.innerHTML = `
                <div class="ep-header">
                    <div class="ep-cover-small">
                        ${ep.cover_url 
                            ? `<img src="${ep.cover_url}" alt="${escapeHtml(ep.title)}">`
                            : '🎵'
                        }
                    </div>
                    <div class="ep-details">
                        <h2>${escapeHtml(ep.title)} <span style="font-size: 0.8rem; background: var(--primary); color: white; padding: 2px 8px; border-radius: 20px; margin-left: 8px;">EP</span></h2>
                        <div class="ep-artist">${escapeHtml(epArtist)}</div>
                        <div class="ep-stats">
                            <span><i class="fas fa-music"></i> ${ep.tracks?.length || 0} tracks</span>
                            <span><i class="fas fa-headphones"></i> ${formatNumber(ep.plays || 0)} plays</span>
                        </div>
                    </div>
                </div>
                
                <div class="search-section">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search tracks by title or artist..." value="${escapeHtml(searchTerm)}">
                    </div>
                    
                    <div style="display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0;">
                        <span class="stats-badge available">
                            <i class="fas fa-check-circle"></i>
                            ${availableCount} Available
                        </span>
                        <span class="stats-badge">
                            <i class="fas fa-music"></i>
                            ${inThisEPCount} In this EP
                        </span>
                        <span class="stats-badge">
                            <i class="fas fa-lock"></i>
                            ${inOtherEPsCount} In other EPs
                        </span>
                        <span class="stats-badge album">
                            <i class="fas fa-compact-disc"></i>
                            ${inAlbumsCount} In Albums
                        </span>
                    </div>
                    
                    <div class="filter-bar">
                        <button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All</button>
                        <button class="filter-btn ${currentFilter === 'available' ? 'active' : ''}" onclick="setFilter('available')">Available</button>
                        <button class="filter-btn ${currentFilter === 'in-this-ep' ? 'active' : ''}" onclick="setFilter('in-this-ep')">In This EP</button>
                        <button class="filter-btn ${currentFilter === 'in-other-eps' ? 'active' : ''}" onclick="setFilter('in-other-eps')">In Other EPs</button>
                        <button class="filter-btn ${currentFilter === 'in-albums' ? 'active' : ''}" onclick="setFilter('in-albums')">In Albums</button>
                    </div>
                </div>
                
                <div class="tracks-container">
                    ${filteredTracks.length > 0 
                        ? filteredTracks.map(track => {
                            const isInThisEP = epTrackIds.has(track.id);
                            const inOtherEP = tracksInOtherEPs.get(track.id);
                            const inAlbum = tracksInAlbums.get(track.id);
                            const isDisabled = isInThisEP || inOtherEP || inAlbum;
                            const isSelected = selectedTracks.has(track.id);
                            const artistsDisplay = formatArtistsDisplay(track);
                            
                            // Determine badge text and style
                            let badgeHtml = '';
                            if (isInThisEP) {
                                badgeHtml = '<span class="track-badge in-this-ep">✓ Already in this EP</span>';
                            } else if (inOtherEP) {
                                badgeHtml = `<span class="track-badge in-other-ep">🎤 In EP: "${escapeHtml(inOtherEP.epTitle)}"</span>`;
                            } else if (inAlbum) {
                                badgeHtml = `<span class="track-badge in-album">💿 In Album: "${escapeHtml(inAlbum.albumTitle)}"</span>`;
                            } else {
                                badgeHtml = '<span class="track-badge available">✓ Available</span>';
                            }
                            
                            return `
                            <div class="track-item ${isSelected ? 'selected' : ''} ${isDisabled ? 'disabled' : ''}" 
                                 ${!isDisabled ? `onclick="toggleTrack(${track.id}, event)"` : ''}>
                                <div class="track-checkbox" onclick="event.stopPropagation()">
                                    <input type="checkbox" 
                                           ${isSelected ? 'checked' : ''} 
                                           ${isDisabled ? 'disabled' : ''}
                                           onchange="toggleTrack(${track.id})">
                                </div>
                                <div class="track-cover">
                                    ${track.artwork_url 
                                        ? `<img src="${track.artwork_url}" alt="">`
                                        : '<i class="fas fa-music"></i>'
                                    }
                                </div>
                                <div class="track-info">
                                    <div class="track-title">${escapeHtml(track.title)}</div>
                                    <div class="track-artist">${artistsDisplay}</div>
                                </div>
                                <div class="track-meta">
                                    <span><i class="fas fa-headphones"></i> ${formatNumber(track.plays || 0)}</span>
                                    <span><i class="fas fa-clock"></i> ${formatDuration(track.duration)}</span>
                                </div>
                                ${badgeHtml}
                            </div>
                        `}).join('')
                        : `
                            <div class="empty-state">
                                <i class="fas fa-music"></i>
                                <h3>No tracks found</h3>
                                <p>Try a different search or filter</p>
                            </div>
                        `
                    }
                </div>
                
                <div class="selection-bar">
                    <div class="selected-count">
                        <span>${selectedTracks.size}</span> track${selectedTracks.size !== 1 ? 's' : ''} selected
                    </div>
                    <div class="action-buttons">
                        <button class="btn btn-secondary" onclick="clearSelection()">
                            Clear
                        </button>
                        <button class="btn btn-primary" onclick="addSelectedTracks()" ${selectedTracks.size === 0 ? 'disabled' : ''}>
                            <i class="fas fa-plus-circle"></i> Add to EP
                        </button>
                    </div>
                </div>
            `;

            // Add search listener
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                const newSearchInput = searchInput.cloneNode(true);
                searchInput.parentNode.replaceChild(newSearchInput, searchInput);
                
                newSearchInput.addEventListener('input', debounce(() => {
                    renderPage();
                }, 300));
            }
        }

        function toggleTrack(trackId, event) {
            if (selectedTracks.has(trackId)) {
                selectedTracks.delete(trackId);
            } else {
                // Check if track is available (not in this EP, not in other EPs, not in albums)
                if (!epTrackIds.has(trackId) && !tracksInOtherEPs.has(trackId) && !tracksInAlbums.has(trackId)) {
                    selectedTracks.add(trackId);
                } else {
                    showToast('❌ This track cannot be added to an EP', 'warning');
                }
            }
            renderPage();
        }

        function setFilter(filter) {
            currentFilter = filter;
            renderPage();
        }

        function clearSelection() {
            selectedTracks.clear();
            renderPage();
        }

        async function addSelectedTracks() {
            if (selectedTracks.size === 0) return;

            const addButtons = document.querySelectorAll('.btn-primary');
            addButtons.forEach(btn => btn.disabled = true);

            let successCount = 0;
            let errorCount = 0;
            let conflictMessages = [];

            for (const trackId of selectedTracks) {
                try {
                    const res = await fetch(`${API_BASE}/admin/eps/${epId}/tracks`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ track_id: trackId })
                    });

                    const data = await res.json();
                    
                    if (res.ok) {
                        successCount++;
                        epTrackIds.add(trackId);
                    } else {
                        errorCount++;
                        if (data.error) conflictMessages.push(data.error);
                        console.error('Failed to add track:', data.error);
                    }
                } catch (error) {
                    console.error('Error adding track:', error);
                    errorCount++;
                    conflictMessages.push(error.message);
                }
            }

            selectedTracks.clear();

            if (errorCount === 0) {
                showToast(`✅ Successfully added ${successCount} track${successCount !== 1 ? 's' : ''}!`, 'success');
            } else if (successCount > 0) {
                showToast(`⚠️ Added ${successCount} tracks (${errorCount} failed)`, 'warning');
                if (conflictMessages.length > 0) {
                    setTimeout(() => {
                        alert(conflictMessages.join('\n'));
                    }, 500);
                }
            } else {
                showToast(`❌ Failed to add tracks. ${conflictMessages[0] || 'Unknown error'}`, 'error');
            }

            // Reload page to show updated EP
            setTimeout(() => {
                window.location.href = `/admin/eps/profile.html?id=${epId}`;
            }, 1500);
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function formatDuration(seconds) {
            if (!seconds) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Update back button to return to profile
        document.getElementById('backBtn').href = `/admin/eps/profile.html?id=${epId}`;

        // Check authentication
        function checkAuth() {
            const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
            const loginTime = localStorage.getItem('admin_login_time');
            
            if (!isLoggedIn || !loginTime) {
                window.location.href = '/admin/login.html';
                return false;
            }
            
            const hoursSince = (Date.now() - parseInt(loginTime)) / (1000 * 60 * 60);
            if (hoursSince > 24) {
                localStorage.clear();
                window.location.href = '/admin/login.html';
                return false;
            }
            return true;
        }

        // Initialize
        if (checkAuth()) {
            loadPage();
        }
    </script>
</body>
</html>
