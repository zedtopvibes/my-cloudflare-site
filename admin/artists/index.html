<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Artists - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-blue: #1f6f9f;
            --primary-light: #2f8ed0;
            --primary-dark: #1f4c73;
            --gray: #666;
            --light-gray: #f0f2f5;
            --white: #ffffff;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --success: #28a745;
            --error: #dc3545;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--light-gray);
            min-height: 100vh;
        }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px;
        }
        
        .admin-header {
            background: var(--white);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .header-top h1 {
            color: var(--primary-blue);
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--light-gray);
            padding: 8px 15px;
            border-radius: 30px;
        }
        
        .admin-tabs {
            display: flex;
            gap: 5px;
            overflow-x: auto;
        }
        
        .tab-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--gray);
            cursor: pointer;
            white-space: nowrap;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .tab-btn.active {
            background: var(--primary-blue);
            color: white;
        }
        
        .admin-content {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
        }
        
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background: var(--light-gray);
            border-radius: 8px;
            padding: 5px 12px;
            border: 1px solid #ddd;
            min-width: 250px;
        }
        
        .search-box i {
            color: var(--primary-blue);
            margin-right: 8px;
        }
        
        .search-box input {
            border: none;
            background: transparent;
            padding: 8px 0;
            width: 100%;
            outline: none;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        
        .btn-primary {
            background: var(--primary-blue);
            color: white;
        }
        
        /* Ultra Compact Artist List */
        .artists-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .artist-row {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: var(--white);
            border: 1px solid #eee;
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        
        .artist-row:hover {
            border-color: var(--primary-blue);
            box-shadow: 0 2px 8px rgba(31, 111, 159, 0.1);
            transform: translateX(2px);
        }
        
        .artist-avatar {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-light));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
            margin-right: 12px;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .artist-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .artist-row-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 0;
        }
        
        .artist-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--primary-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 150px;
        }
        
        .artist-badges {
            display: flex;
            gap: 4px;
        }
        
        .badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.55rem;
            font-weight: 600;
        }
        
        .badge.featured {
            background: rgba(255, 193, 7, 0.15);
            color: #856404;
            border: 1px solid #ffc107;
        }
        
        .badge.legend {
            background: rgba(40, 167, 69, 0.15);
            color: #155724;
            border: 1px solid #28a745;
        }
        
        .artist-stats {
            display: flex;
            gap: 15px;
            font-size: 0.75rem;
            color: var(--gray);
        }
        
        .artist-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .artist-stats i {
            color: var(--primary-blue);
            width: 14px;
        }
        
        .artist-country {
            font-size: 0.75rem;
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 20px;
        }
        
        .page-btn {
            width: 32px;
            height: 32px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
        }
        
        .page-btn.active {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }
        
        @media (max-width: 768px) {
            .artist-row-info {
                flex-wrap: wrap;
                gap: 8px;
            }
            .artist-stats {
                flex-wrap: wrap;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="header-top">
                <h1><i class="fas fa-microphone"></i> Artists</h1>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span>Admin</span>
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
            
            <div class="admin-tabs">
                <a href="/admin/" class="tab-btn"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="/admin/upload" class="tab-btn"><i class="fas fa-cloud-upload-alt"></i> Upload</a>
                <a href="/admin/songs" class="tab-btn"><i class="fas fa-music"></i> Songs</a>
                <a href="/admin/albums" class="tab-btn"><i class="fas fa-compact-disc"></i> Albums</a>
                <a href="/admin/artists/index.html" class="tab-btn active"><i class="fas fa-microphone"></i> Artists</a>
                <a href="/admin/playlists" class="tab-btn"><i class="fas fa-list"></i> Playlists</a>
            </div>
        </div>
        
        <div class="admin-content">
            <div class="content-header">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search artists..." onkeyup="searchArtists()">
                </div>
                <a href="/admin/artists/edit.html" class="btn btn-primary">
                    <i class="fas fa-plus-circle"></i> Add Artist
                </a>
            </div>

            <!-- Artists List -->
            <div id="artistsList" class="artists-list">
                <!-- Loading skeletons -->
                <div class="artist-row" style="background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); animation: loading 1.5s infinite; height: 56px;"></div>
                <div class="artist-row" style="background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); animation: loading 1.5s infinite; height: 56px;"></div>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let allArtists = [];
        let allTracks = [];
        let currentPage = 1;
        const itemsPerPage = 20;

        function logout() {
            if (confirm('Are you sure?')) {
                localStorage.clear();
                window.location.href = '/admin/login.html';
            }
        }

        function checkAuth() {
            const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
            if (!isLoggedIn) window.location.href = '/admin/login.html';
            return isLoggedIn;
        }

        async function loadArtists() {
            if (!checkAuth()) return;
            
            try {
                const [artistsRes, tracksRes] = await Promise.all([
                    fetch(`${API_BASE}/admin/artists`),
                    fetch(`${API_BASE}/tracks`)
                ]);
                
                allArtists = await artistsRes.json();
                allTracks = await tracksRes.json();
                
                renderArtists();
            } catch (error) {
                console.error('Failed to load artists');
            }
        }

        function renderArtists() {
            const container = document.getElementById('artistsList');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = allArtists.filter(a => 
                a.name.toLowerCase().includes(searchTerm) ||
                (a.country && a.country.toLowerCase().includes(searchTerm))
            );
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px;">No artists found</div>';
                return;
            }
            
            // Pagination
            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageArtists = filtered.slice(start, end);
            
            container.innerHTML = pageArtists.map(artist => {
                const trackCount = allTracks.filter(t => t.artist === artist.name).length;
                const totalPlays = allTracks
                    .filter(t => t.artist === artist.name)
                    .reduce((sum, t) => sum + (t.plays || 0), 0);
                
                return `
                <a href="/admin/artists/profile.html?id=${artist.id}" class="artist-row">
                    <div class="artist-avatar">
                        ${artist.image_url 
                            ? `<img src="${artist.image_url}" alt="${artist.name}">`
                            : `<i class="fas fa-user"></i>`
                        }
                    </div>
                    <div class="artist-row-info">
                        <span class="artist-name">${escapeHtml(artist.name)}</span>
                        <div class="artist-badges">
                            ${artist.is_featured ? '<span class="badge featured">F</span>' : ''}
                            ${artist.is_zambian_legend ? '<span class="badge legend">L</span>' : ''}
                        </div>
                        <div class="artist-stats">
                            <span><i class="fas fa-music"></i> ${trackCount}</span>
                            <span><i class="fas fa-headphones"></i> ${formatNumber(totalPlays)}</span>
                        </div>
                        ${artist.country ? `
                            <div class="artist-country">
                                <i class="fas fa-map-marker-alt"></i> ${artist.country}
                            </div>
                        ` : ''}
                    </div>
                </a>
            `}).join('');
            
            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            if (totalPages <= 1) {
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            document.getElementById('pagination').innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            renderArtists();
        }

        function searchArtists() {
            currentPage = 1;
            renderArtists();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (checkAuth()) loadArtists();
        });
    </script>
</body>
</html>
