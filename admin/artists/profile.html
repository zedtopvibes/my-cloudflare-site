<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Profile - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1e3c72;
            --primary-light: #2a4a8a;
            --primary-soft: #e8f0fe;
            --secondary: #00b4d8;
            --accent: #f59e0b;
            --success: #10b981;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.5;
        }
        
        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        .header {
            background: white;
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--gray-200);
        }
        
        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--gray-800);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header h1 i {
            color: var(--primary);
            font-size: 1.3rem;
        }
        
        .back-btn {
            padding: 6px 14px;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            color: var(--gray-700);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--gray-200);
        }
        
        .back-btn:hover {
            background: var(--gray-200);
        }
        
        /* Profile Card */
        .profile-card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid var(--gray-200);
        }
        
        /* Cover Area */
        .profile-cover {
            height: 100px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            position: relative;
        }
        
        /* Artist Header */
        .artist-header {
            display: flex;
            align-items: flex-end;
            gap: 20px;
            padding: 0 24px 16px 24px;
            margin-top: -55px;
        }
        
        .artist-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: white;
            padding: 4px;
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 10;
        }
        
        .artist-avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            overflow: hidden;
        }
        
        .artist-avatar-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .artist-title {
            flex: 1;
            margin-bottom: 10px;
        }
        
        .artist-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 4px;
        }
        
        .artist-slug {
            color: var(--gray-500);
            font-size: 0.8rem;
            font-family: monospace;
            margin-bottom: 8px;
        }
        
        .badge-group {
            display: flex;
            gap: 8px;
        }
        
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .badge.featured {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fbbf24;
        }
        
        .badge.legend {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }
        
        /* Stats Grid - 3x2 with no gaps */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, auto);
            border-top: 1px solid var(--gray-200);
            border-bottom: 1px solid var(--gray-200);
        }
        
        .stat-card {
            background: var(--gray-50);
            padding: 16px 12px;
            text-align: center;
            border-right: 1px solid var(--gray-200);
            border-bottom: 1px solid var(--gray-200);
            transition: background 0.2s;
        }
        
        .stat-card:nth-child(3n) {
            border-right: none;
        }
        
        .stat-card:nth-child(n+4) {
            border-bottom: none;
        }
        
        .stat-card:hover {
            background: white;
        }
        
        .stat-icon {
            width: 36px;
            height: 36px;
            background: var(--primary-soft);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            color: var(--primary);
            font-size: 1.1rem;
        }
        
        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--gray-800);
            line-height: 1.2;
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 0.7rem;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.03em;
            font-weight: 500;
        }
        
        /* Info Row - Country and Joined Date */
        .info-row {
            display: flex;
            gap: 20px;
            padding: 16px 24px;
            background: white;
            border-bottom: 1px solid var(--gray-200);
        }
        
        .info-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: var(--gray-100);
            border-radius: 30px;
            border: 1px solid var(--gray-200);
            font-size: 0.85rem;
        }
        
        .info-chip i {
            color: var(--primary);
            font-size: 0.9rem;
        }
        
        .info-chip span {
            font-weight: 500;
            color: var(--gray-700);
        }
        
        /* Bio Section */
        .bio-section {
            padding: 16px 24px;
            border-bottom: 1px solid var(--gray-200);
        }
        
        .bio-label {
            font-size: 0.7rem;
            color: var(--gray-500);
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        
        .bio-text {
            font-size: 0.9rem;
            color: var(--gray-700);
            line-height: 1.5;
        }
        
        /* Content Sections */
        .content-sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 20px 24px;
        }
        
        .content-section {
            background: var(--gray-50);
            border-radius: var(--radius-md);
            padding: 16px;
            border: 1px solid var(--gray-200);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .section-header h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--gray-700);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .section-header h3 i {
            color: var(--primary);
            font-size: 0.9rem;
        }
        
        .section-count {
            background: white;
            padding: 2px 8px;
            border-radius: 16px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--primary);
            border: 1px solid var(--gray-200);
        }
        
        .content-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .content-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: white;
            border-radius: var(--radius-sm);
            border: 1px solid var(--gray-200);
            font-size: 0.8rem;
        }
        
        .content-item-title {
            font-weight: 500;
            color: var(--gray-700);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }
        
        .content-item-meta {
            font-size: 0.7rem;
            color: var(--gray-500);
            background: var(--gray-100);
            padding: 2px 6px;
            border-radius: 12px;
        }
        
        .more-link {
            text-align: center;
            margin-top: 8px;
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            padding: 4px;
        }
        
        .empty-state {
            text-align: center;
            color: var(--gray-400);
            font-size: 0.8rem;
            padding: 16px;
            background: white;
            border-radius: var(--radius-sm);
            border: 1px dashed var(--gray-300);
        }
        
        /* Action Buttons */
        .action-buttons {
            padding: 0 24px 20px 24px;
            display: flex;
            justify-content: flex-end;
        }
        
        .btn {
            padding: 8px 20px;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-light);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray-500);
        }
        
        /* Responsive */
        @media (max-width: 640px) {
            .admin-container { padding: 12px; }
            
            .artist-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
                margin-top: -40px;
            }
            
            .artist-avatar {
                width: 100px;
                height: 100px;
            }
            
            .artist-name {
                font-size: 1.5rem;
            }
            
            .badge-group {
                justify-content: center;
            }
            
            .info-row {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .content-sections {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .stat-card:nth-child(3n) {
                border-right: 1px solid var(--gray-200);
            }
            
            .stat-card:nth-child(even) {
                border-right: none;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="header">
            <h1>
                <i class="fas fa-microphone-alt"></i>
                Artist Profile
            </h1>
            <a href="/admin/artists/index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                Back
            </a>
        </div>
        
        <div class="profile-card" id="profileContent">
            <div class="loading">
                <i class="fas fa-circle-notch fa-spin"></i>
                <div>Loading...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        
        // Helper function to check if track belongs to artist (using track_artists)
        function trackBelongsToArtist(track, artistId) {
            if (!track.artists || track.artists.length === 0) {
                // Fallback for old data structure
                return false;
            }
            return track.artists.some(a => a.id === artistId);
        }
        
        async function loadArtistProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const artistId = urlParams.get('id');
            
            if (!artistId) {
                window.location.href = '/admin/artists/index.html';
                return;
            }
            
            try {
                // Fetch artist data
                let artist = null;
                
                try {
                    const res = await fetch(`${API_BASE}/admin/artists/${artistId}`);
                    if (res.ok) artist = await res.json();
                } catch (e) {}
                
                if (!artist) {
                    const allRes = await fetch(`${API_BASE}/admin/artists`);
                    if (allRes.ok) {
                        const allArtists = await allRes.json();
                        artist = allArtists.find(a => a.id == artistId);
                    }
                }
                
                if (!artist) throw new Error('Artist not found');
                
                // Fetch tracks, albums, EPs
                const [tracksRes, albumsRes, epsRes] = await Promise.all([
                    fetch(`${API_BASE}/tracks`).catch(() => ({ ok: false })),
                    fetch(`${API_BASE}/albums`).catch(() => ({ ok: false })),
                    fetch(`${API_BASE}/eps`).catch(() => ({ ok: false }))
                ]);
                
                const allTracks = tracksRes.ok ? await tracksRes.json() : [];
                const allAlbums = albumsRes.ok ? await albumsRes.json() : [];
                const allEps = epsRes.ok ? await epsRes.json() : [];
                
                // Filter tracks that belong to this artist via track_artists
                const artistTracks = allTracks.filter(t => trackBelongsToArtist(t, artist.id));
                
                // Filter albums where artist_id matches
                const artistAlbums = allAlbums.filter(a => a.artist_id === artist.id);
                
                // Filter EPs where artist_id matches
                const artistEps = allEps.filter(e => e.artist_id === artist.id);
                
                // Calculate stats
                const totalPlays = artistTracks.reduce((sum, t) => sum + (t.plays || 0), 0);
                const totalDownloads = artistTracks.reduce((sum, t) => sum + (t.downloads || 0), 0);
                const totalViews = artistTracks.reduce((sum, t) => sum + (t.views || 0), 0);
                
                // Format join date
                const joinDate = artist.created_at 
                    ? new Date(artist.created_at).toLocaleDateString('en-US', { 
                        year: 'numeric', 
                        month: 'short', 
                        day: 'numeric' 
                      })
                    : 'Unknown';
                
                // Count primary and featured tracks
                const primaryTracks = artistTracks.filter(t => {
                    if (!t.artists) return false;
                    return t.artists.some(a => a.id === artist.id && a.is_primary === 1);
                });
                const featuredTracks = artistTracks.filter(t => {
                    if (!t.artists) return false;
                    return t.artists.some(a => a.id === artist.id && a.is_primary === 0);
                });
                
                document.getElementById('profileContent').innerHTML = `
                    <div class="profile-cover"></div>
                    
                    <div class="artist-header">
                        <div class="artist-avatar">
                            <div class="artist-avatar-inner">
                                ${artist.image_url 
                                    ? `<img src="${artist.image_url}" alt="${escapeHtml(artist.name)}">`
                                    : '<i class="fas fa-user"></i>'
                                }
                            </div>
                        </div>
                        <div class="artist-title">
                            <h1 class="artist-name">${escapeHtml(artist.name)}</h1>
                            <div class="artist-slug">${artist.slug || ''}</div>
                            <div class="badge-group">
                                ${artist.is_featured ? '<span class="badge featured"><i class="fas fa-star" style="margin-right: 4px;"></i>Featured</span>' : ''}
                                ${artist.is_zambian_legend ? '<span class="badge legend"><i class="fas fa-crown" style="margin-right: 4px;"></i>Legend</span>' : ''}
                            </div>
                        </div>
                    </div>
                    
                    <!-- Stats Grid - 3x2 with no gaps -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-headphones"></i></div>
                            <div class="stat-value">${formatNumber(totalPlays)}</div>
                            <div class="stat-label">Plays</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-download"></i></div>
                            <div class="stat-value">${formatNumber(totalDownloads)}</div>
                            <div class="stat-label">Downloads</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-eye"></i></div>
                            <div class="stat-value">${formatNumber(totalViews)}</div>
                            <div class="stat-label">Views</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-music"></i></div>
                            <div class="stat-value">${artistTracks.length}</div>
                            <div class="stat-label">Total Songs</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-star"></i></div>
                            <div class="stat-value">${primaryTracks.length}</div>
                            <div class="stat-label">As Main Artist</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-user-friends"></i></div>
                            <div class="stat-value">${featuredTracks.length}</div>
                            <div class="stat-label">As Featured</div>
                        </div>
                    </div>
                    
                    <!-- Info Row - Country and Join Date -->
                    <div class="info-row">
                        ${artist.country ? `
                            <div class="info-chip">
                                <i class="fas fa-map-marker-alt"></i>
                                <span>${escapeHtml(artist.country)}</span>
                            </div>
                        ` : ''}
                        <div class="info-chip">
                            <i class="fas fa-calendar-alt"></i>
                            <span>Joined ${joinDate}</span>
                        </div>
                    </div>
                    
                    ${artist.bio ? `
                        <div class="bio-section">
                            <div class="bio-label">Biography</div>
                            <div class="bio-text">${escapeHtml(artist.bio)}</div>
                        </div>
                    ` : ''}
                    
                    <div class="content-sections">
                        <div class="content-section">
                            <div class="section-header">
                                <h3><i class="fas fa-music"></i> Songs</h3>
                                <span class="section-count">${artistTracks.length}</span>
                            </div>
                            <div class="content-list">
                                ${artistTracks.slice(0, 5).map(t => `
                                    <div class="content-item">
                                        <span class="content-item-title" title="${escapeHtml(t.title)}">${escapeHtml(t.title)}</span>
                                        <span class="content-item-meta">${formatNumber(t.plays || 0)}</span>
                                    </div>
                                `).join('')}
                                ${artistTracks.length === 0 ? '<div class="empty-state">No songs yet</div>' : ''}
                                ${artistTracks.length > 5 ? '<div class="more-link">+' + (artistTracks.length - 5) + ' more</div>' : ''}
                            </div>
                        </div>
                        
                        <div class="content-section">
                            <div class="section-header">
                                <h3><i class="fas fa-compact-disc"></i> Albums</h3>
                                <span class="section-count">${artistAlbums.length}</span>
                            </div>
                            <div class="content-list">
                                ${artistAlbums.slice(0, 5).map(a => `
                                    <div class="content-item">
                                        <span class="content-item-title" title="${escapeHtml(a.title)}">${escapeHtml(a.title)}</span>
                                        <span class="content-item-meta">${a.release_date ? new Date(a.release_date).getFullYear() : '—'}</span>
                                    </div>
                                `).join('')}
                                ${artistAlbums.length === 0 ? '<div class="empty-state">No albums yet</div>' : ''}
                                ${artistAlbums.length > 5 ? '<div class="more-link">+' + (artistAlbums.length - 5) + ' more</div>' : ''}
                            </div>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <a href="/admin/artists/edit.html?id=${artist.id}" class="btn btn-primary">
                            <i class="fas fa-edit"></i> Edit Profile
                        </a>
                    </div>
                `;
                
            } catch (error) {
                document.getElementById('profileContent').innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <i class="fas fa-exclamation-circle" style="font-size: 2.5rem; color: #ef4444; margin-bottom: 12px;"></i>
                        <h3 style="color: #374151;">Failed to Load Profile</h3>
                        <p style="color: #6b7280; margin: 12px 0;">${error.message}</p>
                        <a href="/admin/artists/index.html" class="btn btn-primary">Back</a>
                    </div>
                `;
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatNumber(num) {
            if (!num || isNaN(num)) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        // Auth check
        function checkAuth() {
            const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
            const loginTime = localStorage.getItem('admin_login_time');
            
            if (!isLoggedIn || !loginTime) {
                window.location.href = '/admin/login.html';
                return false;
            }
            
            const hoursSince = (Date.now() - parseInt(loginTime)) / (1000 * 60 * 60);
            if (hoursSince > 24) {
                localStorage.clear();
                window.location.href = '/admin/login.html';
                return false;
            }
            return true;
        }
        
        // Initialize
        if (checkAuth()) {
            loadArtistProfile();
        }
    </script>
</body>
</html>
