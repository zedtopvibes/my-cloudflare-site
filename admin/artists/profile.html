<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Profile - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-blue: #1f6f9f;
            --primary-light: #2f8ed0;
            --primary-dark: #1f4c73;
            --gray: #666;
            --light-gray: #f0f2f5;
            --white: #ffffff;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --error: #dc3545;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--light-gray);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            background: var(--white);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: var(--primary-blue);
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .back-btn {
            padding: 8px 16px;
            background: var(--light-gray);
            border: none;
            border-radius: 6px;
            color: #333;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
        }
        
        .back-btn:hover {
            background: #e0e0e0;
        }
        
        .profile-card {
            background: var(--white);
            border-radius: 12px;
            padding: 30px;
            box-shadow: var(--shadow);
        }
        
        .profile-header {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-light));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-title {
            flex: 1;
        }
        
        .profile-title h2 {
            font-size: 2rem;
            color: var(--primary-dark);
            margin-bottom: 5px;
        }
        
        .profile-slug {
            color: var(--gray);
            font-size: 0.9rem;
            font-family: monospace;
            margin-bottom: 10px;
        }
        
        .profile-badges {
            display: flex;
            gap: 10px;
        }
        
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .badge.featured {
            background: rgba(255, 193, 7, 0.15);
            color: #856404;
            border: 1px solid #ffc107;
        }
        
        .badge.legend {
            background: rgba(40, 167, 69, 0.15);
            color: #155724;
            border: 1px solid #28a745;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--light-gray);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-blue);
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: var(--gray);
            font-size: 0.85rem;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .info-item {
            padding: 15px;
            background: var(--light-gray);
            border-radius: 8px;
        }
        
        .info-label {
            font-size: 0.75rem;
            color: var(--gray);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .info-value {
            font-weight: 600;
            color: var(--primary-dark);
            word-break: break-word;
        }
        
        .content-sections {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        
        .content-section {
            background: var(--light-gray);
            border-radius: 8px;
            padding: 15px;
        }
        
        .content-section h3 {
            font-size: 1rem;
            color: var(--primary-dark);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 8px;
            border-bottom: 2px solid #ddd;
        }
        
        .content-section h3 i {
            color: var(--primary-blue);
        }
        
        .content-list {
            max-height: 250px;
            overflow-y: auto;
        }
        
        .content-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
            font-size: 0.85rem;
        }
        
        .content-item:last-child {
            border-bottom: none;
        }
        
        .content-item-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }
        
        .content-item-meta {
            color: var(--gray);
            font-size: 0.75rem;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--primary-blue);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-light);
        }
        
        .btn-secondary {
            background: var(--light-gray);
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--gray);
        }
        
        .loading i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--primary-blue);
            opacity: 0.5;
        }
        
        .error-container {
            text-align: center;
            padding: 40px;
            color: var(--error);
        }
        
        .error-container i {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        .more-link {
            text-align: center;
            padding: 8px;
            color: var(--primary-blue);
            font-size: 0.8rem;
            cursor: pointer;
        }
        
        .more-link:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            
            .profile-badges {
                justify-content: center;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
            }
            
            .content-sections {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-microphone"></i> Artist Profile</h1>
            <a href="/admin/artists/index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Artists</a>
        </div>
        
        <div class="profile-card" id="profileContent">
            <div class="loading">
                <i class="fas fa-circle-notch fa-spin"></i>
                <div>Loading artist profile...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        
        async function loadArtistProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const artistId = urlParams.get('id');
            
            if (!artistId) {
                window.location.href = '/admin/artists/index.html';
                return;
            }
            
            console.log('Loading artist ID:', artistId);
            
            try {
                // Fetch artist data
                let artist = null;
                
                // Try direct endpoint first
                try {
                    const artistRes = await fetch(`${API_BASE}/admin/artists/${artistId}`);
                    if (artistRes.ok) {
                        artist = await artistRes.json();
                        console.log('Artist from direct endpoint:', artist);
                    }
                } catch (e) {
                    console.log('Direct endpoint failed:', e);
                }
                
                // If direct fails, get all artists
                if (!artist) {
                    console.log('Trying all artists endpoint');
                    const allRes = await fetch(`${API_BASE}/admin/artists`);
                    if (allRes.ok) {
                        const allArtists = await allRes.json();
                        artist = allArtists.find(a => a.id == artistId);
                        console.log('Artist from all artists:', artist);
                    }
                }
                
                if (!artist) {
                    throw new Error('Artist not found');
                }
                
                // Fetch tracks and albums
                console.log('Fetching tracks and albums...');
                const [tracksRes, albumsRes] = await Promise.all([
                    fetch(`${API_BASE}/tracks`).catch(() => ({ ok: false })),
                    fetch(`${API_BASE}/albums`).catch(() => ({ ok: false }))
                ]);
                
                const allTracks = tracksRes.ok ? await tracksRes.json() : [];
                const allAlbums = albumsRes.ok ? await albumsRes.json() : [];
                
                console.log(`Found ${allTracks.length} tracks, ${allAlbums.length} albums`);
                
                // Filter artist's content
                const artistTracks = allTracks.filter(t => t.artist === artist.name);
                const artistAlbums = allAlbums.filter(a => a.artist === artist.name);
                
                console.log(`Artist has ${artistTracks.length} tracks, ${artistAlbums.length} albums`);
                
                // Calculate stats
                const totalPlays = artistTracks.reduce((sum, t) => sum + (t.plays || 0), 0);
                const totalDownloads = artistTracks.reduce((sum, t) => sum + (t.downloads || 0), 0);
                const totalViews = artistTracks.reduce((sum, t) => sum + (t.views || 0), 0);
                
                // Render profile
                document.getElementById('profileContent').innerHTML = `
                    <div class="profile-header">
                        <div class="profile-image">
                            ${artist.image_url 
                                ? `<img src="${artist.image_url}" alt="${escapeHtml(artist.name)}">`
                                : `<i class="fas fa-user"></i>`
                            }
                        </div>
                        <div class="profile-title">
                            <h2>${escapeHtml(artist.name) || 'Unknown'}</h2>
                            <div class="profile-slug">${artist.slug || ''}</div>
                            <div class="profile-badges">
                                ${artist.is_featured ? '<span class="badge featured">Featured Artist</span>' : ''}
                                ${artist.is_zambian_legend ? '<span class="badge legend">Zambian Legend</span>' : ''}
                            </div>
                        </div>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value">${formatNumber(totalPlays)}</div>
                            <div class="stat-label">Total Plays</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${formatNumber(totalDownloads)}</div>
                            <div class="stat-label">Downloads</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${formatNumber(totalViews)}</div>
                            <div class="stat-label">Views</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${artistTracks.length}</div>
                            <div class="stat-label">Songs</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${artistAlbums.length}</div>
                            <div class="stat-label">Albums</div>
                        </div>
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">Country</div>
                            <div class="info-value">${artist.country || '—'}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Artist ID</div>
                            <div class="info-value">#${artist.id}</div>
                        </div>
                        ${artist.bio ? `
                            <div class="info-item" style="grid-column: span 2;">
                                <div class="info-label">Biography</div>
                                <div class="info-value">${escapeHtml(artist.bio)}</div>
                            </div>
                        ` : ''}
                    </div>
                    
                    <div class="content-sections">
                        <div class="content-section">
                            <h3><i class="fas fa-music"></i> Songs (${artistTracks.length})</h3>
                            <div class="content-list">
                                ${artistTracks.length > 0 
                                    ? artistTracks.slice(0, 5).map(t => `
                                        <div class="content-item">
                                            <span class="content-item-title" title="${escapeHtml(t.title)}">${escapeHtml(t.title)}</span>
                                            <span class="content-item-meta">${formatNumber(t.plays || 0)} plays</span>
                                        </div>
                                    `).join('') 
                                    : '<div style="color: #999; padding: 10px 0; text-align: center;">No songs yet</div>'
                                }
                                ${artistTracks.length > 5 ? `
                                    <div class="more-link" onclick="showAllTracks(${artist.id})">
                                        + ${artistTracks.length - 5} more songs
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                        
                        <div class="content-section">
                            <h3><i class="fas fa-compact-disc"></i> Albums (${artistAlbums.length})</h3>
                            <div class="content-list">
                                ${artistAlbums.length > 0
                                    ? artistAlbums.slice(0, 5).map(a => `
                                        <div class="content-item">
                                            <span class="content-item-title" title="${escapeHtml(a.title)}">${escapeHtml(a.title)}</span>
                                            <span class="content-item-meta">${a.release_date ? new Date(a.release_date).getFullYear() : '—'}</span>
                                        </div>
                                    `).join('')
                                    : '<div style="color: #999; padding: 10px 0; text-align: center;">No albums yet</div>'
                                }
                                ${artistAlbums.length > 5 ? `
                                    <div class="more-link" onclick="showAllAlbums(${artist.id})">
                                        + ${artistAlbums.length - 5} more albums
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <a href="/admin/artists/edit.html?id=${artist.id}" class="btn btn-primary">
                            <i class="fas fa-edit"></i> Edit Profile
                        </a>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('profileContent').innerHTML = `
                    <div class="error-container">
                        <i class="fas fa-exclamation-circle"></i>
                        <h3>Failed to load artist profile</h3>
                        <p style="color: #666; margin: 15px 0;">${error.message}</p>
                        <a href="/admin/artists/index.html" class="btn btn-secondary" style="margin-top: 15px;">
                            <i class="fas fa-arrow-left"></i> Back to Artists
                        </a>
                    </div>
                `;
            }
        }
        
        function showAllTracks(artistId) {
            // This could open a modal or navigate to tracks page filtered by artist
            window.location.href = `/admin/songs?artist=${artistId}`;
        }
        
        function showAllAlbums(artistId) {
            window.location.href = `/admin/albums?artist=${artistId}`;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatNumber(num) {
            if (!num || isNaN(num)) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        // Check authentication
        function checkAuth() {
            const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
            const loginTime = localStorage.getItem('admin_login_time');
            
            if (!isLoggedIn || !loginTime) {
                window.location.href = '/admin/login.html';
                return false;
            }
            
            const hoursSince = (Date.now() - parseInt(loginTime)) / (1000 * 60 * 60);
            if (hoursSince > 24) {
                localStorage.clear();
                window.location.href = '/admin/login.html';
                return false;
            }
            return true;
        }
        
        // Initialize
        if (checkAuth()) {
            loadArtistProfile();
        }
    </script>
</body>
</html>
