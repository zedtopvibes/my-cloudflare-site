<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Profile - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-blue: #1f6f9f;
            --primary-light: #2f8ed0;
            --primary-dark: #1f4c73;
            --gray: #666;
            --light-gray: #f0f2f5;
            --white: #ffffff;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--light-gray);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            background: var(--white);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: var(--primary-blue);
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .back-btn {
            padding: 8px 16px;
            background: var(--light-gray);
            border: none;
            border-radius: 6px;
            color: #333;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .profile-card {
            background: var(--white);
            border-radius: 12px;
            padding: 30px;
            box-shadow: var(--shadow);
        }
        
        .profile-header {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-light));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-title {
            flex: 1;
        }
        
        .profile-title h2 {
            font-size: 2rem;
            color: var(--primary-dark);
            margin-bottom: 5px;
        }
        
        .profile-slug {
            color: var(--gray);
            font-size: 0.9rem;
            font-family: monospace;
            margin-bottom: 10px;
        }
        
        .profile-badges {
            display: flex;
            gap: 10px;
        }
        
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .badge.featured {
            background: rgba(255, 193, 7, 0.15);
            color: #856404;
            border: 1px solid #ffc107;
        }
        
        .badge.legend {
            background: rgba(40, 167, 69, 0.15);
            color: #155724;
            border: 1px solid #28a745;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--light-gray);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-blue);
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: var(--gray);
            font-size: 0.85rem;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .info-item {
            padding: 15px;
            background: var(--light-gray);
            border-radius: 8px;
        }
        
        .info-label {
            font-size: 0.75rem;
            color: var(--gray);
            margin-bottom: 5px;
        }
        
        .info-value {
            font-weight: 600;
            color: var(--primary-dark);
        }
        
        .content-sections {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        
        .content-section {
            background: var(--light-gray);
            border-radius: 8px;
            padding: 15px;
        }
        
        .content-section h3 {
            font-size: 1rem;
            color: var(--primary-dark);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .content-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .content-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
            font-size: 0.85rem;
        }
        
        .content-item:last-child {
            border-bottom: none;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 30px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--primary-blue);
            color: white;
        }
        
        .btn-secondary {
            background: var(--light-gray);
            color: #333;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-microphone"></i> Artist Profile</h1>
            <a href="/admin/artists/index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Artists</a>
        </div>
        
        <div class="profile-card" id="profileContent">
            <div class="loading">Loading artist profile...</div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        
        async function loadArtistProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const artistId = urlParams.get('id');
            
            if (!artistId) {
                window.location.href = '/admin/artists/index.html';
                return;
            }
            
            try {
                // Fetch all data
                const [artistRes, tracksRes, albumsRes, playlistsRes] = await Promise.all([
                    fetch(`${API_BASE}/admin/artists/${artistId}`),
                    fetch(`${API_BASE}/tracks`),
                    fetch(`${API_BASE}/albums`),
                    fetch(`${API_BASE}/playlists`)
                ]);
                
                const artist = await artistRes.json();
                const allTracks = await tracksRes.json();
                const allAlbums = await albumsRes.json();
                const allPlaylists = await playlistsRes.json();
                
                // Filter content
                const artistTracks = allTracks.filter(t => t.artist === artist.name);
                const artistAlbums = allAlbums.filter(a => a.artist === artist.name);
                
                // Calculate stats
                const totalPlays = artistTracks.reduce((sum, t) => sum + (t.plays || 0), 0);
                const totalDownloads = artistTracks.reduce((sum, t) => sum + (t.downloads || 0), 0);
                const totalViews = artistTracks.reduce((sum, t) => sum + (t.views || 0), 0);
                
                // Render profile
                document.getElementById('profileContent').innerHTML = `
                    <div class="profile-header">
                        <div class="profile-image">
                            ${artist.image_url 
                                ? `<img src="${artist.image_url}" alt="${artist.name}">`
                                : `<i class="fas fa-user"></i>`
                            }
                        </div>
                        <div class="profile-title">
                            <h2>${escapeHtml(artist.name)}</h2>
                            <div class="profile-slug">${artist.slug || ''}</div>
                            <div class="profile-badges">
                                ${artist.is_featured ? '<span class="badge featured">Featured Artist</span>' : ''}
                                ${artist.is_zambian_legend ? '<span class="badge legend">Zambian Legend</span>' : ''}
                            </div>
                        </div>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value">${formatNumber(totalPlays)}</div>
                            <div class="stat-label">Total Plays</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${formatNumber(totalDownloads)}</div>
                            <div class="stat-label">Downloads</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${formatNumber(totalViews)}</div>
                            <div class="stat-label">Views</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${artistTracks.length}</div>
                            <div class="stat-label">Songs</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${artistAlbums.length}</div>
                            <div class="stat-label">Albums</div>
                        </div>
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">Country</div>
                            <div class="info-value">${artist.country || '—'}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Artist ID</div>
                            <div class="info-value">#${artist.id}</div>
                        </div>
                        ${artist.bio ? `
                            <div class="info-item" style="grid-column: span 2;">
                                <div class="info-label">Bio</div>
                                <div class="info-value">${escapeHtml(artist.bio)}</div>
                            </div>
                        ` : ''}
                    </div>
                    
                    <div class="content-sections">
                        <div class="content-section">
                            <h3><i class="fas fa-music"></i> Songs (${artistTracks.length})</h3>
                            <div class="content-list">
                                ${artistTracks.length > 0 
                                    ? artistTracks.slice(0, 5).map(t => `
                                        <div class="content-item">
                                            <span>${escapeHtml(t.title)}</span>
                                            <span>${formatNumber(t.plays || 0)} plays</span>
                                        </div>
                                    `).join('') 
                                    : '<div style="color: #999; padding: 10px 0;">No songs yet</div>'
                                }
                                ${artistTracks.length > 5 ? `<div style="text-align: center; padding: 5px; color: var(--primary-blue);">+${artistTracks.length - 5} more</div>` : ''}
                            </div>
                        </div>
                        
                        <div class="content-section">
                            <h3><i class="fas fa-compact-disc"></i> Albums (${artistAlbums.length})</h3>
                            <div class="content-list">
                                ${artistAlbums.length > 0
                                    ? artistAlbums.slice(0, 5).map(a => `
                                        <div class="content-item">
                                            <span>${escapeHtml(a.title)}</span>
                                            <span>${a.release_date ? new Date(a.release_date).getFullYear() : '—'}</span>
                                        </div>
                                    `).join('')
                                    : '<div style="color: #999; padding: 10px 0;">No albums yet</div>'
                                }
                                ${artistAlbums.length > 5 ? `<div style="text-align: center; padding: 5px; color: var(--primary-blue);">+${artistAlbums.length - 5} more</div>` : ''}
                            </div>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <a href="/admin/artists/edit.html?id=${artist.id}" class="btn btn-primary">
                            <i class="fas fa-edit"></i> Edit Profile
                        </a>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('profileContent').innerHTML = `
                    <div style="text-align: center; padding: 40px; color: var(--error);">
                        <i class="fas fa-exclamation-circle" style="font-size: 3rem; margin-bottom: 15px;"></i>
                        <h3>Failed to load artist profile</h3>
                        <p style="margin-top: 20px;"><a href="/admin/artists/index.html" class="btn btn-secondary">Back to Artists</a></p>
                    </div>
                `;
            }
        }
        
        function escapeHtml(text) {
            if (!text) return text;
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        // Check auth
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = '/admin/login.html';
        } else {
            loadArtistProfile();
        }
    </script>
</body>
</html>
