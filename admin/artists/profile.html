<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Profile - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-blue: #1f6f9f;
            --primary-light: #2f8ed0;
            --primary-dark: #1f4c73;
            --gray: #666;
            --light-gray: #f0f2f5;
            --white: #ffffff;
            --shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--light-gray);
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            background: var(--white);
            border-radius: 10px;
            padding: 12px 18px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: var(--primary-blue);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .back-btn {
            padding: 6px 14px;
            background: var(--light-gray);
            border-radius: 6px;
            color: #333;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
        }
        
        .profile-card {
            background: var(--white);
            border-radius: 10px;
            padding: 20px;
            box-shadow: var(--shadow);
        }
        
        /* Compact Header */
        .profile-header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .profile-image {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-light));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-title {
            flex: 1;
        }
        
        .profile-title h2 {
            font-size: 1.4rem;
            color: var(--primary-dark);
            margin-bottom: 2px;
        }
        
        .profile-slug {
            color: var(--gray);
            font-size: 0.75rem;
            font-family: monospace;
            margin-bottom: 5px;
        }
        
        .profile-badges {
            display: flex;
            gap: 6px;
        }
        
        .badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        
        .badge.featured {
            background: rgba(255, 193, 7, 0.15);
            color: #856404;
            border: 1px solid #ffc107;
        }
        
        .badge.legend {
            background: rgba(40, 167, 69, 0.15);
            color: #155724;
            border: 1px solid #28a745;
        }
        
        /* Compact Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: var(--light-gray);
            border-radius: 6px;
            padding: 10px 5px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-blue);
            line-height: 1.2;
        }
        
        .stat-label {
            color: var(--gray);
            font-size: 0.6rem;
            text-transform: uppercase;
        }
        
        /* Compact Info */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .info-item {
            padding: 8px 12px;
            background: var(--light-gray);
            border-radius: 6px;
        }
        
        .info-label {
            font-size: 0.6rem;
            color: var(--gray);
            margin-bottom: 2px;
            text-transform: uppercase;
        }
        
        .info-value {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--primary-dark);
            word-break: break-word;
        }
        
        /* Compact Content Sections */
        .content-sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .content-section {
            background: var(--light-gray);
            border-radius: 6px;
            padding: 12px;
        }
        
        .content-section h3 {
            font-size: 0.9rem;
            color: var(--primary-dark);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .content-section h3 i {
            color: var(--primary-blue);
            font-size: 0.8rem;
        }
        
        .content-list {
            max-height: 120px;
            overflow-y: auto;
            font-size: 0.8rem;
        }
        
        .content-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #ddd;
        }
        
        .content-item:last-child {
            border-bottom: none;
        }
        
        .content-item-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }
        
        .content-item-meta {
            color: var(--gray);
            font-size: 0.7rem;
        }
        
        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: var(--primary-blue);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-light);
        }
        
        .more-link {
            text-align: center;
            padding: 4px;
            color: var(--primary-blue);
            font-size: 0.7rem;
            cursor: pointer;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .stats-grid .stat-card:last-child {
                grid-column: span 3;
            }
            
            .content-sections {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 480px) {
            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-microphone"></i> Artist Profile</h1>
            <a href="/admin/artists/index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
        
        <div class="profile-card" id="profileContent">
            <div class="loading">
                <i class="fas fa-circle-notch fa-spin"></i>
                <div>Loading...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        
        async function loadArtistProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const artistId = urlParams.get('id');
            
            if (!artistId) {
                window.location.href = '/admin/artists/index.html';
                return;
            }
            
            try {
                // Fetch artist data
                let artist = null;
                
                // Try direct endpoint
                try {
                    const res = await fetch(`${API_BASE}/admin/artists/${artistId}`);
                    if (res.ok) artist = await res.json();
                } catch (e) {}
                
                // If direct fails, try all artists
                if (!artist) {
                    const allRes = await fetch(`${API_BASE}/admin/artists`);
                    if (allRes.ok) {
                        const allArtists = await allRes.json();
                        artist = allArtists.find(a => a.id == artistId);
                    }
                }
                
                if (!artist) throw new Error('Artist not found');
                
                // Fetch tracks and albums
                const [tracksRes, albumsRes] = await Promise.all([
                    fetch(`${API_BASE}/tracks`).catch(() => ({ ok: false })),
                    fetch(`${API_BASE}/albums`).catch(() => ({ ok: false }))
                ]);
                
                const allTracks = tracksRes.ok ? await tracksRes.json() : [];
                const allAlbums = albumsRes.ok ? await albumsRes.json() : [];
                
                // Filter artist's content
                const artistTracks = allTracks.filter(t => t.artist === artist.name);
                const artistAlbums = allAlbums.filter(a => a.artist === artist.name);
                
                // Calculate stats
                const totalPlays = artistTracks.reduce((sum, t) => sum + (t.plays || 0), 0);
                const totalDownloads = artistTracks.reduce((sum, t) => sum + (t.downloads || 0), 0);
                const totalViews = artistTracks.reduce((sum, t) => sum + (t.views || 0), 0);
                
                document.getElementById('profileContent').innerHTML = `
                    <div class="profile-header">
                        <div class="profile-image">
                            ${artist.image_url 
                                ? `<img src="${artist.image_url}" alt="${escapeHtml(artist.name)}">`
                                : '<i class="fas fa-user"></i>'
                            }
                        </div>
                        <div class="profile-title">
                            <h2>${escapeHtml(artist.name)}</h2>
                            <div class="profile-slug">${artist.slug || ''}</div>
                            <div class="profile-badges">
                                ${artist.is_featured ? '<span class="badge featured">Featured</span>' : ''}
                                ${artist.is_zambian_legend ? '<span class="badge legend">Legend</span>' : ''}
                            </div>
                        </div>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value">${formatNumber(totalPlays)}</div>
                            <div class="stat-label">Plays</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${formatNumber(totalDownloads)}</div>
                            <div class="stat-label">Downloads</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${formatNumber(totalViews)}</div>
                            <div class="stat-label">Views</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${artistTracks.length}</div>
                            <div class="stat-label">Songs</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${artistAlbums.length}</div>
                            <div class="stat-label">Albums</div>
                        </div>
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">Country</div>
                            <div class="info-value">${artist.country || '—'}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Artist ID</div>
                            <div class="info-value">#${artist.id}</div>
                        </div>
                        ${artist.bio ? `
                            <div class="info-item" style="grid-column: span 2;">
                                <div class="info-label">Bio</div>
                                <div class="info-value">${escapeHtml(artist.bio)}</div>
                            </div>
                        ` : ''}
                    </div>
                    
                    <div class="content-sections">
                        <div class="content-section">
                            <h3><i class="fas fa-music"></i> Songs (${artistTracks.length})</h3>
                            <div class="content-list">
                                ${artistTracks.slice(0, 4).map(t => `
                                    <div class="content-item">
                                        <span class="content-item-title" title="${escapeHtml(t.title)}">${escapeHtml(t.title)}</span>
                                        <span class="content-item-meta">${formatNumber(t.plays || 0)}</span>
                                    </div>
                                `).join('')}
                                ${artistTracks.length > 4 ? 
                                    `<div class="more-link">+${artistTracks.length - 4} more</div>` : 
                                    artistTracks.length === 0 ? '<div style="color: #999;">No songs</div>' : ''
                                }
                            </div>
                        </div>
                        
                        <div class="content-section">
                            <h3><i class="fas fa-compact-disc"></i> Albums (${artistAlbums.length})</h3>
                            <div class="content-list">
                                ${artistAlbums.slice(0, 4).map(a => `
                                    <div class="content-item">
                                        <span class="content-item-title" title="${escapeHtml(a.title)}">${escapeHtml(a.title)}</span>
                                        <span class="content-item-meta">${a.release_date ? new Date(a.release_date).getFullYear() : '—'}</span>
                                    </div>
                                `).join('')}
                                ${artistAlbums.length > 4 ? 
                                    `<div class="more-link">+${artistAlbums.length - 4} more</div>` : 
                                    artistAlbums.length === 0 ? '<div style="color: #999;">No albums</div>' : ''
                                }
                            </div>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <a href="/admin/artists/edit.html?id=${artist.id}" class="btn btn-primary">
                            <i class="fas fa-edit"></i> Edit
                        </a>
                    </div>
                `;
                
            } catch (error) {
                document.getElementById('profileContent').innerHTML = `
                    <div style="text-align: center; padding: 30px; color: #dc3545;">
                        <i class="fas fa-exclamation-circle" style="font-size: 2rem;"></i>
                        <p style="margin-top: 10px;">Failed to load profile</p>
                        <a href="/admin/artists/index.html" class="btn btn-primary" style="margin-top: 15px;">Back</a>
                    </div>
                `;
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatNumber(num) {
            if (!num || isNaN(num)) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        // Auth check
        if (localStorage.getItem('admin_logged_in') === 'true') {
            loadArtistProfile();
        } else {
            window.location.href = '/admin/login.html';
        }
    </script>
</body>
</html>
