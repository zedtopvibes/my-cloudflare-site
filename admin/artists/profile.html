<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Profile - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1e3c72;
            --primary-light: #2a4a8a;
            --primary-soft: #e8f0fe;
            --secondary: #00b4d8;
            --accent: #f59e0b;
            --success: #10b981;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.5;
        }
        
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        
        /* Header */
        .header {
            background: white;
            border-radius: var(--radius-lg);
            padding: 16px 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--gray-200);
        }
        
        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--gray-800);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header h1 i {
            color: var(--primary);
            font-size: 1.5rem;
        }
        
        .back-btn {
            padding: 8px 16px;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            color: var(--gray-700);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            border: 1px solid var(--gray-200);
        }
        
        .back-btn:hover {
            background: var(--gray-200);
            color: var(--gray-900);
        }
        
        /* Profile Card */
        .profile-card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid var(--gray-200);
        }
        
        /* Cover Area */
        .profile-cover {
            height: 120px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            position: relative;
        }
        
        /* Artist Header */
        .artist-header {
            display: flex;
            align-items: flex-end;
            gap: 24px;
            padding: 0 32px 20px 32px;
            margin-top: -50px;
        }
        
        .artist-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: white;
            padding: 4px;
            box-shadow: var(--shadow-lg);
        }
        
        .artist-avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            overflow: hidden;
        }
        
        .artist-avatar-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .artist-title {
            flex: 1;
            margin-bottom: 8px;
        }
        
        .artist-name {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }
        
        .artist-slug {
            color: var(--gray-500);
            font-size: 0.875rem;
            font-family: monospace;
            margin-bottom: 8px;
        }
        
        .badge-group {
            display: flex;
            gap: 8px;
        }
        
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        
        .badge.featured {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fbbf24;
        }
        
        .badge.legend {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            padding: 24px 32px;
            background: var(--gray-50);
            border-top: 1px solid var(--gray-200);
            border-bottom: 1px solid var(--gray-200);
        }
        
        .stat-card {
            background: white;
            border-radius: var(--radius-md);
            padding: 16px 12px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .stat-icon {
            width: 40px;
            height: 40px;
            background: var(--primary-soft);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            color: var(--primary);
            font-size: 1.25rem;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-800);
            line-height: 1.2;
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.03em;
            font-weight: 500;
        }
        
        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 24px 32px;
            background: white;
        }
        
        .info-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: var(--gray-50);
            border-radius: var(--radius-md);
            border: 1px solid var(--gray-200);
        }
        
        .info-icon {
            width: 40px;
            height: 40px;
            background: var(--primary-soft);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        
        .info-content {
            flex: 1;
        }
        
        .info-label {
            font-size: 0.7rem;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin-bottom: 2px;
        }
        
        .info-value {
            font-weight: 600;
            color: var(--gray-800);
            font-size: 0.95rem;
            word-break: break-word;
        }
        
        /* Content Sections */
        .content-sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 0 32px 32px 32px;
        }
        
        .content-section {
            background: var(--gray-50);
            border-radius: var(--radius-lg);
            padding: 20px;
            border: 1px solid var(--gray-200);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .section-header h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-700);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-header h3 i {
            color: var(--primary);
            font-size: 1rem;
        }
        
        .section-count {
            background: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary);
            border: 1px solid var(--gray-200);
        }
        
        .content-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .content-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: white;
            border-radius: var(--radius-sm);
            border: 1px solid var(--gray-200);
            transition: all 0.2s;
        }
        
        .content-item:hover {
            border-color: var(--primary);
            background: var(--primary-soft);
        }
        
        .content-item-title {
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--gray-700);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }
        
        .content-item-meta {
            font-size: 0.75rem;
            color: var(--gray-500);
            background: var(--gray-100);
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 500;
        }
        
        .more-link {
            text-align: center;
            margin-top: 12px;
            color: var(--primary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            padding: 6px;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }
        
        .more-link:hover {
            background: var(--primary-soft);
            color: var(--primary-light);
        }
        
        .empty-state {
            text-align: center;
            color: var(--gray-400);
            font-size: 0.875rem;
            padding: 20px;
            background: white;
            border-radius: var(--radius-sm);
            border: 1px dashed var(--gray-300);
        }
        
        /* Action Buttons */
        .action-buttons {
            padding: 0 32px 32px 32px;
            display: flex;
            justify-content: flex-end;
        }
        
        .btn {
            padding: 10px 24px;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }
        
        .btn-primary:hover {
            background: var(--primary-light);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--gray-500);
        }
        
        .loading i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 16px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .admin-container { padding: 16px; }
            
            .artist-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 0 20px 20px 20px;
                margin-top: -40px;
            }
            
            .artist-avatar {
                width: 100px;
                height: 100px;
            }
            
            .artist-name {
                font-size: 1.5rem;
            }
            
            .badge-group {
                justify-content: center;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                padding: 20px;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
                padding: 20px;
            }
            
            .content-sections {
                grid-template-columns: 1fr;
                padding: 0 20px 20px 20px;
            }
            
            .action-buttons {
                padding: 0 20px 20px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="header">
            <h1>
                <i class="fas fa-microphone-alt"></i>
                Artist Profile
            </h1>
            <a href="/admin/artists/index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                Back to Artists
            </a>
        </div>
        
        <div class="profile-card" id="profileContent">
            <div class="loading">
                <i class="fas fa-circle-notch fa-spin"></i>
                <div>Loading artist profile...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        
        async function loadArtistProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const artistId = urlParams.get('id');
            
            if (!artistId) {
                window.location.href = '/admin/artists/index.html';
                return;
            }
            
            try {
                // Fetch artist data
                let artist = null;
                
                try {
                    const res = await fetch(`${API_BASE}/admin/artists/${artistId}`);
                    if (res.ok) artist = await res.json();
                } catch (e) {}
                
                if (!artist) {
                    const allRes = await fetch(`${API_BASE}/admin/artists`);
                    if (allRes.ok) {
                        const allArtists = await allRes.json();
                        artist = allArtists.find(a => a.id == artistId);
                    }
                }
                
                if (!artist) throw new Error('Artist not found');
                
                // Fetch tracks and albums
                const [tracksRes, albumsRes] = await Promise.all([
                    fetch(`${API_BASE}/tracks`).catch(() => ({ ok: false })),
                    fetch(`${API_BASE}/albums`).catch(() => ({ ok: false }))
                ]);
                
                const allTracks = tracksRes.ok ? await tracksRes.json() : [];
                const allAlbums = albumsRes.ok ? await albumsRes.json() : [];
                
                // Filter content
                const artistTracks = allTracks.filter(t => t.artist === artist.name);
                const artistAlbums = allAlbums.filter(a => a.artist === artist.name);
                
                // Calculate stats
                const totalPlays = artistTracks.reduce((sum, t) => sum + (t.plays || 0), 0);
                const totalDownloads = artistTracks.reduce((sum, t) => sum + (t.downloads || 0), 0);
                const totalViews = artistTracks.reduce((sum, t) => sum + (t.views || 0), 0);
                
                document.getElementById('profileContent').innerHTML = `
                    <div class="profile-cover"></div>
                    
                    <div class="artist-header">
                        <div class="artist-avatar">
                            <div class="artist-avatar-inner">
                                ${artist.image_url 
                                    ? `<img src="${artist.image_url}" alt="${escapeHtml(artist.name)}">`
                                    : '<i class="fas fa-user"></i>'
                                }
                            </div>
                        </div>
                        <div class="artist-title">
                            <h1 class="artist-name">${escapeHtml(artist.name)}</h1>
                            <div class="artist-slug">${artist.slug || ''}</div>
                            <div class="badge-group">
                                ${artist.is_featured ? '<span class="badge featured"><i class="fas fa-star" style="margin-right: 4px;"></i>Featured</span>' : ''}
                                ${artist.is_zambian_legend ? '<span class="badge legend"><i class="fas fa-crown" style="margin-right: 4px;"></i>Zambian Legend</span>' : ''}
                            </div>
                        </div>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-headphones"></i></div>
                            <div class="stat-value">${formatNumber(totalPlays)}</div>
                            <div class="stat-label">Total Plays</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-download"></i></div>
                            <div class="stat-value">${formatNumber(totalDownloads)}</div>
                            <div class="stat-label">Downloads</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-eye"></i></div>
                            <div class="stat-value">${formatNumber(totalViews)}</div>
                            <div class="stat-label">Views</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-music"></i></div>
                            <div class="stat-value">${artistTracks.length}</div>
                            <div class="stat-label">Songs</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-compact-disc"></i></div>
                            <div class="stat-value">${artistAlbums.length}</div>
                            <div class="stat-label">Albums</div>
                        </div>
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
                            <div class="info-content">
                                <div class="info-label">Country</div>
                                <div class="info-value">${artist.country || 'Not specified'}</div>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-icon"><i class="fas fa-hashtag"></i></div>
                            <div class="info-content">
                                <div class="info-label">Artist ID</div>
                                <div class="info-value">#${artist.id}</div>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-icon"><i class="fas fa-calendar"></i></div>
                            <div class="info-content">
                                <div class="info-label">Member Since</div>
                                <div class="info-value">${artist.created_at ? new Date(artist.created_at).toLocaleDateString() : '—'}</div>
                            </div>
                        </div>
                        ${artist.bio ? `
                            <div class="info-item" style="grid-column: span 3;">
                                <div class="info-icon"><i class="fas fa-align-left"></i></div>
                                <div class="info-content">
                                    <div class="info-label">Biography</div>
                                    <div class="info-value">${escapeHtml(artist.bio)}</div>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                    
                    <div class="content-sections">
                        <div class="content-section">
                            <div class="section-header">
                                <h3><i class="fas fa-music"></i> Songs</h3>
                                <span class="section-count">${artistTracks.length}</span>
                            </div>
                            <div class="content-list">
                                ${artistTracks.slice(0, 5).map(t => `
                                    <div class="content-item">
                                        <span class="content-item-title" title="${escapeHtml(t.title)}">${escapeHtml(t.title)}</span>
                                        <span class="content-item-meta">${formatNumber(t.plays || 0)} plays</span>
                                    </div>
                                `).join('')}
                                ${artistTracks.length === 0 ? '<div class="empty-state">No songs yet</div>' : ''}
                                ${artistTracks.length > 5 ? '<div class="more-link">View all ' + artistTracks.length + ' songs →</div>' : ''}
                            </div>
                        </div>
                        
                        <div class="content-section">
                            <div class="section-header">
                                <h3><i class="fas fa-compact-disc"></i> Albums</h3>
                                <span class="section-count">${artistAlbums.length}</span>
                            </div>
                            <div class="content-list">
                                ${artistAlbums.slice(0, 5).map(a => `
                                    <div class="content-item">
                                        <span class="content-item-title" title="${escapeHtml(a.title)}">${escapeHtml(a.title)}</span>
                                        <span class="content-item-meta">${a.release_date ? new Date(a.release_date).getFullYear() : '—'}</span>
                                    </div>
                                `).join('')}
                                ${artistAlbums.length === 0 ? '<div class="empty-state">No albums yet</div>' : ''}
                                ${artistAlbums.length > 5 ? '<div class="more-link">View all ' + artistAlbums.length + ' albums →</div>' : ''}
                            </div>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <a href="/admin/artists/edit.html?id=${artist.id}" class="btn btn-primary">
                            <i class="fas fa-edit"></i>
                            Edit Profile
                        </a>
                    </div>
                `;
                
            } catch (error) {
                document.getElementById('profileContent').innerHTML = `
                    <div style="text-align: center; padding: 60px;">
                        <i class="fas fa-exclamation-circle" style="font-size: 3rem; color: #ef4444; margin-bottom: 16px;"></i>
                        <h3 style="color: #374151; margin-bottom: 8px;">Failed to Load Profile</h3>
                        <p style="color: #6b7280; margin-bottom: 24px;">${error.message}</p>
                        <a href="/admin/artists/index.html" class="btn btn-primary">Back to Artists</a>
                    </div>
                `;
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatNumber(num) {
            if (!num || isNaN(num)) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        // Auth check
        if (localStorage.getItem('admin_logged_in') === 'true') {
            loadArtistProfile();
        } else {
            window.location.href = '/admin/login.html';
        }
    </script>
</body>
</html>
