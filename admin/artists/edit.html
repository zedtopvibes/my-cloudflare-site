<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Artist - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-blue: #1f6f9f;
            --primary-light: #2f8ed0;
            --primary-dark: #1f4c73;
            --light-gray: #f0f2f5;
            --white: #ffffff;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --success: #28a745;
            --error: #dc3545;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--light-gray);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: var(--primary-blue);
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .back-btn {
            padding: 8px 16px;
            background: var(--light-gray);
            border: none;
            border-radius: 6px;
            color: #333;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
        }
        
        .form-container {
            background: var(--white);
            border-radius: 12px;
            padding: 30px;
            box-shadow: var(--shadow);
        }
        
        .image-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .current-image {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-light));
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            overflow: hidden;
            border: 3px solid var(--light-gray);
        }
        
        .current-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .image-upload {
            display: inline-block;
            position: relative;
        }
        
        .image-upload-btn {
            background: var(--primary-blue);
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .image-upload input {
            display: none;
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 100px;
            margin-top: 10px;
            border-radius: 6px;
            display: none;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #333;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: 'Montserrat', sans-serif;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-blue);
        }
        
        .checkbox-group {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        
        .stats-section {
            background: var(--light-gray);
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
        }
        
        .stat-item {
            background: white;
            padding: 10px;
            border-radius: 6px;
        }
        
        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-blue);
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--gray);
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 30px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-primary {
            background: var(--primary-blue);
            color: white;
        }
        
        .btn-secondary {
            background: var(--light-gray);
            color: #333;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            z-index: 2000;
            animation: slideIn 0.3s;
        }
        
        .toast.success { background: var(--success); }
        .toast.error { background: var(--error); }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-microphone"></i> <span id="pageTitle">Add New Artist</span></h1>
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Artists</a>
        </div>
        
        <div class="form-container">
            <form id="artistForm">
                <input type="hidden" id="artistId">
                
                <div class="image-section">
                    <div class="current-image" id="currentImage">
                        <i class="fas fa-user"></i>
                    </div>
                    
                    <div class="image-upload">
                        <button type="button" class="image-upload-btn" onclick="document.getElementById('imageInput').click()">
                            <i class="fas fa-camera"></i> Change Photo
                        </button>
                        <input type="file" id="imageInput" accept="image/*" onchange="previewImage(this)">
                    </div>
                    
                    <img id="preview" class="preview-image" src="#" alt="Preview">
                </div>
                
                <div class="form-group">
                    <label>Artist Name *</label>
                    <input type="text" id="artistName" required>
                </div>
                
                <div class="form-group">
                    <label>Country</label>
                    <input type="text" id="artistCountry" placeholder="e.g. Zambia">
                </div>
                
                <div class="form-group">
                    <label>Bio</label>
                    <textarea id="artistBio" rows="4" placeholder="Artist biography..."></textarea>
                </div>
                
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="artistFeatured"> Featured Artist
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="artistLegend"> Zambian Legend
                    </label>
                </div>
                
                <!-- Stats (only shown for existing artists) -->
                <div id="statsSection" class="stats-section" style="display: none;">
                    <div class="stat-item">
                        <div class="stat-value" id="trackCount">0</div>
                        <div class="stat-label">Tracks</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="playCount">0</div>
                        <div class="stat-label">Plays</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="albumCount">0</div>
                        <div class="stat-label">Albums</div>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Save Artist</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentPhotoFile = null;
        let allTracks = [];
        let allAlbums = [];

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                currentPhotoFile = input.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function loadArtist(id) {
            try {
                // Load artist
                const artistRes = await fetch(`${API_BASE}/admin/artists/${id}`);
                const artist = await artistRes.json();
                
                // Load tracks for stats
                const tracksRes = await fetch(`${API_BASE}/tracks`);
                allTracks = await tracksRes.json();
                
                // Load albums for stats
                const albumsRes = await fetch(`${API_BASE}/albums`);
                allAlbums = await albumsRes.json();
                
                // Fill form
                document.getElementById('pageTitle').textContent = 'Edit Artist';
                document.getElementById('artistId').value = artist.id;
                document.getElementById('artistName').value = artist.name;
                document.getElementById('artistCountry').value = artist.country || '';
                document.getElementById('artistBio').value = artist.bio || '';
                document.getElementById('artistFeatured').checked = artist.is_featured === 1;
                document.getElementById('artistLegend').checked = artist.is_zambian_legend === 1;
                
                // Show current image
                if (artist.image_url) {
                    document.getElementById('currentImage').innerHTML = `<img src="${artist.image_url}" alt="${artist.name}">`;
                }
                
                // Show stats
                const artistTracks = allTracks.filter(t => t.artist === artist.name);
                const artistAlbums = allAlbums.filter(a => a.artist === artist.name);
                const totalPlays = artistTracks.reduce((sum, t) => sum + (t.plays || 0), 0);
                
                document.getElementById('trackCount').textContent = artistTracks.length;
                document.getElementById('playCount').textContent = formatNumber(totalPlays);
                document.getElementById('albumCount').textContent = artistAlbums.length;
                document.getElementById('statsSection').style.display = 'grid';
                
            } catch (error) {
                showToast('Failed to load artist', 'error');
            }
        }

        document.getElementById('artistForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('artistId').value;
            const isEditing = !!id;
            
            const artistData = {
                name: document.getElementById('artistName').value,
                country: document.getElementById('artistCountry').value || null,
                bio: document.getElementById('artistBio').value || null,
                is_featured: document.getElementById('artistFeatured').checked,
                is_zambian_legend: document.getElementById('artistLegend').checked
            };
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';
            
            try {
                let response;
                
                if (isEditing) {
                    response = await fetch(`${API_BASE}/admin/artists/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(artistData)
                    });
                } else {
                    response = await fetch(`${API_BASE}/admin/artists`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(artistData)
                    });
                }
                
                if (!response.ok) throw new Error();
                
                const result = await response.json();
                const artistId = result.id || id;
                
                // Upload photo if selected
                if (currentPhotoFile) {
                    const photoData = new FormData();
                    photoData.append('photo', currentPhotoFile);
                    
                    const photoRes = await fetch(`${API_BASE}/admin/artists/${artistId}/photo`, {
                        method: 'POST',
                        body: photoData
                    });
                    
                    if (!photoRes.ok) {
                        showToast('Artist saved but photo upload failed', 'error');
                    }
                }
                
                showToast(`Artist ${isEditing ? 'updated' : 'created'} successfully!`, 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
                
            } catch (error) {
                showToast('Failed to save artist', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Save Artist';
            }
        });

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        // Load artist if editing
        const urlParams = new URLSearchParams(window.location.search);
        const artistId = urlParams.get('id');
        
        if (artistId) {
            loadArtist(artistId);
        }
    </script>
</body>
</html>
