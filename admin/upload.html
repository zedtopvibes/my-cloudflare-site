<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Upload Song - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            /* Blue/ocean theme from frontend */
            --primary-blue: #1f6f9f;
            --primary-light: #2f8ed0;
            --primary-lighter: #70c8ff;
            --primary-dark: #1f4c73;
            --deep-bg: #0b0f1c;
            --dark: #1a1a1a;
            --gray: #666;
            --light-gray: #f0f2f5;
            --white: #ffffff;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
        }
        
        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--light-gray);
            min-height: 100vh;
            line-height: 1.5;
            color: #333;
        }
        
        .admin-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px;
        }
        
        .admin-header {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .header-top h1 {
            color: var(--primary-blue);
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .header-top h1 span {
            color: #666;
            font-size: 0.9rem;
            font-weight: 400;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--light-gray);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            margin-left: auto;
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .user-info i {
            color: var(--primary-blue);
        }
        
        .user-info span {
            font-weight: 600;
        }
        
        .logout-btn {
            color: #666;
            transition: color 0.3s;
            padding: 8px;
            text-decoration: none;
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
        }
        
        .logout-btn:hover {
            color: var(--primary-blue);
        }
        
        .admin-tabs {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding: 5px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .admin-tabs::-webkit-scrollbar {
            display: none;
        }
        
        .tab-btn {
            padding: 10px 15px;
            background: transparent;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        
        .tab-btn i {
            font-size: 1rem;
        }
        
        .tab-btn:hover {
            background: #f0f0f0;
            color: var(--primary-blue);
        }
        
        .tab-btn.active {
            background: var(--primary-blue);
            color: white;
        }
        
        .admin-content {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(31, 111, 159, 0.1);
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .coming-soon-container {
            text-align: center;
            padding: 40px 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .coming-soon-icon {
            font-size: 5rem;
            color: var(--primary-blue);
            margin-bottom: 25px;
            opacity: 0.8;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .coming-soon-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-lighter));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .coming-soon-text {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        
        .btn-primary {
            background: var(--primary-blue);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(31, 111, 159, 0.3);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid rgba(31, 111, 159, 0.15);
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        /* Decorative waves */
        .wave-decoration {
            position: relative;
            margin-top: 30px;
            height: 40px;
            overflow: hidden;
        }
        
        .wave {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 20px,
                rgba(31, 111, 159, 0.1) 20px,
                rgba(31, 111, 159, 0.1) 40px
            );
            animation: wave-move 10s linear infinite;
        }
        
        @keyframes wave-move {
            0% { background-position: 0 0; }
            100% { background-position: 80px 0; }
        }
        
        @media (min-width: 768px) {
            .admin-container {
                padding: 20px;
            }
            
            .admin-header {
                padding: 20px 25px;
            }
            
            .header-top h1 {
                font-size: 1.5rem;
            }
            
            .coming-soon-icon {
                font-size: 6rem;
            }
            
            .coming-soon-title {
                font-size: 2.5rem;
            }
        }
        
        @media (max-width: 480px) {
            .admin-header {
                padding: 12px;
            }
            
            .header-top h1 {
                font-size: 1.1rem;
            }
            
            .user-info {
                padding: 5px 10px;
                font-size: 0.8rem;
            }
            
            .tab-btn {
                padding: 8px 12px;
                font-size: 0.8rem;
            }
            
            .coming-soon-title {
                font-size: 1.8rem;
            }
            
            .coming-soon-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Header -->
        <div class="admin-header">
            <div class="header-top">
                <h1>
                    <i class="fas fa-cog"></i> 
                    Upload Song
                </h1>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span>Admin</span>
                    <button class="logout-btn" title="Logout" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
            
            <!-- Navigation Tabs -->
            <div class="admin-tabs">
                <a href="index.html" class="tab-btn"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="upload.html" class="tab-btn active"><i class="fas fa-cloud-upload-alt"></i> Upload</a>
                <a href="songs.html" class="tab-btn"><i class="fas fa-music"></i> Songs</a>
                <a href="albums.html" class="tab-btn"><i class="fas fa-compact-disc"></i> Albums</a>
                <a href="artists.html" class="tab-btn"><i class="fas fa-microphone"></i> Artists</a>
                <a href="playlists.html" class="tab-btn"><i class="fas fa-list"></i> Playlists</a>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="admin-content">
            <div class="coming-soon-container">
                <div class="coming-soon-icon">
                    <i class="fas fa-cloud-upload-alt"></i>
                </div>
                
                <h2 class="coming-soon-title">Upload Feature Coming Soon</h2>
                
                <p class="coming-soon-text">
                    You'll be able to upload MP3 files with metadata, album art, and more.
                </p>
                
                <a href="index.html" class="btn btn-primary">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </a>
                
                <div class="wave-decoration">
                    <div class="wave"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.clear();
                window.location.href = '/';
            }
        }

        // Check authentication
        document.addEventListener('DOMContentLoaded', function() {
            const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
            const loginTime = localStorage.getItem('admin_login_time');
            
            if (!isLoggedIn || !loginTime) {
                window.location.href = '/';
                return false;
            }
            
            const hoursSince = (Date.now() - parseInt(loginTime)) / (1000 * 60 * 60);
            if (hoursSince > 24) {
                localStorage.clear();
                window.location.href = '/';
                return false;
            }
        });
    </script>
</body>
</html>
