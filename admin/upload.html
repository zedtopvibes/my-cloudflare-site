<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Upload Song - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            /* Blue/ocean theme from frontend */
            --primary-blue: #1f6f9f;
            --primary-light: #2f8ed0;
            --primary-lighter: #70c8ff;
            --primary-dark: #1f4c73;
            --deep-bg: #0b0f1c;
            --dark: #1a1a1a;
            --gray: #666;
            --light-gray: #f0f2f5;
            --white: #ffffff;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --success: #28a745;
            --error: #dc3545;
            --warning: #ffc107;
        }
        
        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--light-gray);
            min-height: 100vh;
            line-height: 1.5;
            color: #333;
        }
        
        .admin-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px;
        }
        
        .admin-header {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .header-top h1 {
            color: var(--primary-blue);
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .header-top h1 span {
            color: #666;
            font-size: 0.9rem;
            font-weight: 400;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--light-gray);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            margin-left: auto;
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .user-info i {
            color: var(--primary-blue);
        }
        
        .user-info span {
            font-weight: 600;
        }
        
        .logout-btn {
            color: #666;
            transition: color 0.3s;
            padding: 8px;
            text-decoration: none;
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
        }
        
        .logout-btn:hover {
            color: var(--primary-blue);
        }
        
        /* Navigation Tabs - FIXED FOR CONSISTENCY WITH DASHBOARD */
        .admin-tabs {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding: 5px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .admin-tabs::-webkit-scrollbar {
            display: none;
        }
        
        .tab-btn {
            padding: 10px 15px !important;
            background: transparent;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem !important;
            font-weight: 600 !important;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
            line-height: 1;
            height: 40px !important;
            min-height: 40px !important;
            max-height: 40px !important;
            box-sizing: border-box;
        }
        
        .tab-btn i {
            font-size: 1rem !important;
            width: 16px;
        }
        
        .tab-btn:hover {
            background: #f0f0f0;
            color: var(--primary-blue);
        }
        
        .tab-btn.active {
            background: var(--primary-blue);
            color: white;
            font-weight: 600 !important;
            height: 40px !important;
            min-height: 40px !important;
            max-height: 40px !important;
            padding: 10px 15px !important;
        }
        
        /* Upload Form Styles */
        .upload-form-container {
            background: var(--white);
            border-radius: 12px;
            padding: 25px;
            width: 100%;
        }
        
        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        
        /* File Upload Area */
        .file-upload-section {
            grid-column: 1 / -1;
            margin-bottom: 10px;
        }
        
        .upload-area {
            border: 2px dashed rgba(31, 111, 159, 0.3);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(31, 111, 159, 0.02);
        }
        
        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary-blue);
            background: rgba(31, 111, 159, 0.05);
        }
        
        .upload-icon {
            font-size: 3rem;
            color: var(--primary-blue);
            margin-bottom: 15px;
        }
        
        .upload-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .upload-hint {
            font-size: 0.85rem;
            color: #999;
        }
        
        .file-info {
            background: var(--light-gray);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .file-icon {
            font-size: 2rem;
            color: var(--primary-blue);
        }
        
        .file-details {
            flex: 1;
        }
        
        .file-name {
            font-weight: 600;
            margin-bottom: 5px;
            word-break: break-all;
        }
        
        .file-size {
            font-size: 0.85rem;
            color: #666;
        }
        
        .remove-file {
            color: #999;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .remove-file:hover {
            color: var(--error);
            background: rgba(220, 53, 69, 0.1);
        }
        
        /* Form Groups */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }
        
        .form-group label i {
            color: var(--primary-blue);
            margin-right: 5px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(31, 111, 159, 0.1);
        }
        
        .form-group input.error,
        .form-group select.error,
        .form-group textarea.error {
            border-color: var(--error);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .form-hint {
            font-size: 0.8rem;
            color: #999;
            margin-top: 4px;
        }
        
        /* Checkbox Group */
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 5px;
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.95rem;
        }
        
        .checkbox-label input[type="checkbox"] {
            width: auto;
            margin-right: 5px;
        }
        
        /* Artwork Preview */
        .artwork-preview {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            background: var(--light-gray);
            border: 2px dashed #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .artwork-preview.has-image {
            border: 2px solid var(--primary-blue);
        }
        
        .artwork-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .artwork-preview .remove-image {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.5);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .artwork-preview:hover .remove-image {
            opacity: 1;
        }
        
        /* Progress Bar */
        .upload-progress {
            margin: 20px 0;
            display: none;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--light-gray);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--primary-blue);
            width: 0%;
            transition: width 0.3s;
            border-radius: 4px;
        }
        
        .progress-text {
            text-align: right;
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }
        
        /* Action Buttons */
        .form-actions {
            grid-column: 1 / -1;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        
        .btn-primary {
            background: var(--primary-blue);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(31, 111, 159, 0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid rgba(31, 111, 159, 0.15);
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        /* Status Messages */
        .status-message {
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0 0;
            display: none;
            align-items: center;
            gap: 10px;
            grid-column: 1 / -1;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: flex;
        }
        
        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: flex;
        }
        
        .status-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: flex;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .upload-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .form-actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
            
            .admin-container {
                padding: 10px;
            }
            
            .upload-form-container {
                padding: 15px;
            }
        }
        
        @media (max-width: 480px) {
            .admin-header {
                padding: 12px;
            }
            
            .header-top h1 {
                font-size: 1.1rem;
            }
            
            .user-info {
                padding: 5px 10px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Header -->
        <div class="admin-header">
            <div class="header-top">
                <h1>
                    <i class="fas fa-cloud-upload-alt"></i> 
                    Upload Song
                </h1>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span>Admin</span>
                    <button class="logout-btn" title="Logout" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
            
            <!-- Navigation Tabs -->
            <div class="admin-tabs">
                <a href="index.html" class="tab-btn"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="upload.html" class="tab-btn active"><i class="fas fa-cloud-upload-alt"></i> Upload</a>
                <a href="songs.html" class="tab-btn"><i class="fas fa-music"></i> Songs</a>
                <a href="albums.html" class="tab-btn"><i class="fas fa-compact-disc"></i> Albums</a>
                <a href="artists.html" class="tab-btn"><i class="fas fa-microphone"></i> Artists</a>
                <a href="playlists.html" class="tab-btn"><i class="fas fa-list"></i> Playlists</a>
            </div>
        </div>
        
        <!-- Main Content - Upload Form -->
        <div class="admin-content">
            <div class="upload-form-container">
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="upload-grid">
                        <!-- File Upload Section -->
                        <div class="file-upload-section">
                            <div id="uploadArea" class="upload-area">
                                <div class="upload-icon">
                                    <i class="fas fa-cloud-upload-alt"></i>
                                </div>
                                <div class="upload-text">Click or drag MP3 to upload</div>
                                <div class="upload-hint">MP3 files only, max 25MB</div>
                            </div>
                            <input type="file" id="fileInput" accept="audio/mpeg" style="display: none;">
                            
                            <!-- Selected File Info (hidden initially) -->
                            <div id="fileInfo" class="file-info" style="display: none;">
                                <div class="file-icon">
                                    <i class="fas fa-music"></i>
                                </div>
                                <div class="file-details">
                                    <div id="fileName" class="file-name"></div>
                                    <div id="fileSize" class="file-size"></div>
                                </div>
                                <div class="remove-file" onclick="clearSelectedFile()">
                                    <i class="fas fa-times"></i>
                                </div>
                            </div>
                        </div>

                        <!-- Basic Info - Left Column -->
                        <div class="form-section">
                            <h3 style="margin-bottom: 20px; color: var(--primary-blue);">
                                <i class="fas fa-info-circle"></i> Basic Information
                            </h3>
                            
                            <div class="form-group">
                                <label><i class="fas fa-heading"></i> Song Title *</label>
                                <input type="text" id="title" placeholder="e.g. Midnight Waves" required>
                            </div>
                            
                            <div class="form-group">
                                <label><i class="fas fa-user"></i> Artist *</label>
                                <select id="artistSelect" required>
                                    <option value="">Select Artist</option>
                                    <!-- Artists will be loaded here -->
                                </select>
                                <div class="form-hint">
                                    <a href="#" onclick="showNewArtistModal()" style="color: var(--primary-blue);">
                                        <i class="fas fa-plus-circle"></i> Add New Artist
                                    </a>
                                </div>
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label><i class="fas fa-tag"></i> Genre</label>
                                    <input type="text" id="genre" placeholder="e.g. Hip-Hop" list="genres">
                                    <datalist id="genres">
                                        <option value="Hip-Hop">
                                        <option value="Zam-Pop">
                                        <option value="Electronic">
                                        <option value="Lofi">
                                        <option value="Ambient">
                                        <option value="Synthwave">
                                    </datalist>
                                </div>
                                
                                <div class="form-group">
                                    <label><i class="fas fa-calendar"></i> Release Date</label>
                                    <input type="date" id="releaseDate">
                                </div>
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label><i class="fas fa-clock"></i> Duration (seconds)</label>
                                    <input type="number" id="duration" placeholder="e.g. 210" readonly>
                                    <div class="form-hint">Auto-detected from file</div>
                                </div>
                                
                                <div class="form-group">
                                    <label><i class="fas fa-music"></i> BPM</label>
                                    <input type="number" id="bpm" placeholder="e.g. 120">
                                </div>
                            </div>
                        </div>
                        
                        <!-- Right Column -->
                        <div class="form-section">
                            <h3 style="margin-bottom: 20px; color: var(--primary-blue);">
                                <i class="fas fa-paint-brush"></i> Artwork & Description
                            </h3>
                            
                            <div class="form-group">
                                <label><i class="fas fa-image"></i> Artwork</label>
                                <input type="file" id="artworkInput" accept="image/jpeg,image/png,image/webp" style="display: none;">
                                <div id="artworkPreview" class="artwork-preview" onclick="document.getElementById('artworkInput').click()">
                                    <span>Click to upload artwork</span>
                                </div>
                                <div class="form-hint">JPG, PNG, WEBP (max 2MB, 1000x1000)</div>
                            </div>
                            
                            <div class="form-group">
                                <label><i class="fas fa-align-left"></i> Description</label>
                                <textarea id="description" rows="4" placeholder="Tell us about this track..."></textarea>
                            </div>
                            
                            <h3 style="margin: 20px 0 15px; color: var(--primary-blue);">
                                <i class="fas fa-check-circle"></i> Options
                            </h3>
                            
                            <div class="checkbox-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="explicit"> Explicit Content
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" id="featured"> Featured Track
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" id="editorPick"> Editor's Pick
                                </label>
                            </div>
                        </div>
                        
                        <!-- Progress Bar -->
                        <div id="uploadProgress" class="upload-progress">
                            <div class="progress-bar">
                                <div id="progressFill" class="progress-fill"></div>
                            </div>
                            <div id="progressText" class="progress-text">0%</div>
                        </div>
                        
                        <!-- Status Message -->
                        <div id="statusMessage" class="status-message">
                            <i class="fas fa-info-circle"></i>
                            <span></span>
                        </div>
                        
                        <!-- Action Buttons -->
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="resetForm()">
                                <i class="fas fa-undo"></i> Reset
                            </button>
                            <button type="submit" id="submitBtn" class="btn btn-primary" disabled>
                                <i class="fas fa-cloud-upload-alt"></i> Upload Song
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- New Artist Modal -->
    <div id="newArtistModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000;">
        <div style="background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px;">
            <h3 style="margin-bottom: 20px; color: var(--primary-blue);">Add New Artist</h3>
            <input type="text" id="newArtistName" placeholder="Artist Name" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px;">
            <select id="newArtistCountry" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px;">
                <option value="">Select Country</option>
                <option value="Zambia">Zambia</option>
                <option value="USA">USA</option>
                <option value="UK">UK</option>
                <option value="Other">Other</option>
            </select>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button onclick="hideNewArtistModal()" class="btn btn-secondary">Cancel</button>
                <button onclick="saveNewArtist()" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>

    <script>
        // API Base
        const API_BASE = '/api';
        
        // ==================== FILE UPLOAD HANDLING ====================
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const submitBtn = document.getElementById('submitBtn');
        let selectedFile = null;

        // Click upload area
        uploadArea.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'audio/mpeg') {
                handleFileSelect(file);
            } else {
                showStatus('error', 'Please select an MP3 file');
            }
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleFileSelect(file);
            }
        });

        function handleFileSelect(file) {
            selectedFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            fileInfo.style.display = 'flex';
            uploadArea.style.display = 'none';
            submitBtn.disabled = false;
            
            // Try to auto-detect duration
            getAudioDuration(file);
        }

        function clearSelectedFile() {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.style.display = 'none';
            uploadArea.style.display = 'flex';
            submitBtn.disabled = true;
            document.getElementById('duration').value = '';
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // Auto-detect audio duration
        function getAudioDuration(file) {
            const audio = new Audio();
            audio.src = URL.createObjectURL(file);
            audio.addEventListener('loadedmetadata', () => {
                document.getElementById('duration').value = Math.round(audio.duration);
                URL.revokeObjectURL(audio.src);
            });
        }

        // ==================== ARTWORK HANDLING ====================
        const artworkInput = document.getElementById('artworkInput');
        const artworkPreview = document.getElementById('artworkPreview');
        let artworkFile = null;

        artworkInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (!file.type.startsWith('image/')) {
                    showStatus('error', 'Please select an image file');
                    return;
                }
                if (file.size > 2 * 1024 * 1024) {
                    showStatus('error', 'Image must be less than 2MB');
                    return;
                }
                
                artworkFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    artworkPreview.innerHTML = `
                        <img src="${e.target.result}" alt="Preview">
                        <div class="remove-image" onclick="removeArtwork(event)"><i class="fas fa-times"></i></div>
                    `;
                    artworkPreview.classList.add('has-image');
                };
                reader.readAsDataURL(file);
            }
        });

        function removeArtwork(event) {
            event.stopPropagation();
            artworkFile = null;
            artworkInput.value = '';
            artworkPreview.innerHTML = '<span>Click to upload artwork</span>';
            artworkPreview.classList.remove('has-image');
        }

        // ==================== ARTIST SELECTION ====================
        async function loadArtists() {
            try {
                const response = await fetch(`${API_BASE}/artists`);
                const artists = await response.json();
                
                const select = document.getElementById('artistSelect');
                select.innerHTML = '<option value="">Select Artist</option>';
                
                artists.forEach(artist => {
                    const option = document.createElement('option');
                    option.value = artist.id;
                    option.textContent = artist.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading artists:', error);
            }
        }

        // ==================== NEW ARTIST MODAL ====================
        function showNewArtistModal() {
            document.getElementById('newArtistModal').style.display = 'flex';
        }

        function hideNewArtistModal() {
            document.getElementById('newArtistModal').style.display = 'none';
            document.getElementById('newArtistName').value = '';
        }

        async function saveNewArtist() {
            const name = document.getElementById('newArtistName').value.trim();
            const country = document.getElementById('newArtistCountry').value;
            
            if (!name) {
                alert('Please enter artist name');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/admin/artists/quick`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, country })
                });
                
                if (response.ok) {
                    await loadArtists();
                    hideNewArtistModal();
                    showStatus('success', 'Artist added successfully');
                } else {
                    showStatus('error', 'Failed to add artist');
                }
            } catch (error) {
                showStatus('error', error.message);
            }
        }

        // ==================== FORM SUBMISSION ====================
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!selectedFile) {
                showStatus('error', 'Please select an MP3 file');
                return;
            }

            const title = document.getElementById('title').value;
            const artistId = document.getElementById('artistSelect').value;

            if (!title || !artistId) {
                showStatus('error', 'Title and artist are required');
                return;
            }

            // Show progress
            const progressDiv = document.getElementById('uploadProgress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            progressDiv.style.display = 'block';
            
            submitBtn.disabled = true;
            showStatus('info', 'Uploading track...');

            try {
                // Simulate progress (in real app, you'd use XMLHttpRequest for progress)
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 10;
                    if (progress <= 90) {
                        progressFill.style.width = progress + '%';
                        progressText.textContent = progress + '%';
                    }
                }, 300);

                // Create form data
                const formData = new FormData();
                formData.append('file', selectedFile);
                formData.append('title', title);
                formData.append('artist_id', artistId);
                formData.append('genre', document.getElementById('genre').value);
                formData.append('release_date', document.getElementById('releaseDate').value);
                formData.append('duration', document.getElementById('duration').value);
                formData.append('description', document.getElementById('description').value);
                formData.append('bpm', document.getElementById('bpm').value);
                formData.append('explicit', document.getElementById('explicit').checked ? '1' : '0');
                formData.append('featured', document.getElementById('featured').checked ? '1' : '0');
                formData.append('editor_pick', document.getElementById('editorPick').checked ? '1' : '0');
                
                if (artworkFile) {
                    formData.append('artwork', artworkFile);
                }

                // Send to API
                const response = await fetch(`${API_BASE}/admin/tracks`, {
                    method: 'POST',
                    body: formData
                });

                clearInterval(interval);
                progressFill.style.width = '100%';
                progressText.textContent = '100%';

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Upload failed');
                }
                
                showStatus('success', 'Track uploaded successfully!');
                resetForm();
                
            } catch (error) {
                progressFill.style.width = '0%';
                progressText.textContent = '0%';
                showStatus('error', 'Upload failed: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                setTimeout(() => {
                    document.getElementById('uploadProgress').style.display = 'none';
                }, 2000);
            }
        });

        function resetForm() {
            clearSelectedFile();
            removeArtwork(event);
            document.getElementById('title').value = '';
            document.getElementById('artistSelect').value = '';
            document.getElementById('genre').value = '';
            document.getElementById('releaseDate').value = '';
            document.getElementById('duration').value = '';
            document.getElementById('description').value = '';
            document.getElementById('bpm').value = '';
            document.getElementById('explicit').checked = false;
            document.getElementById('featured').checked = false;
            document.getElementById('editorPick').checked = false;
        }

        function showStatus(type, message) {
            const statusEl = document.getElementById('statusMessage');
            const icon = statusEl.querySelector('i');
            const span = statusEl.querySelector('span');
            
            statusEl.className = 'status-message status-' + type;
            
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };
            
            icon.className = 'fas ' + icons[type];
            span.textContent = message;
            statusEl.style.display = 'flex';
            
            if (type !== 'info') {
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 5000);
            }
        }

        // ==================== AUTHENTICATION ====================
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.clear();
                window.location.href = '/';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
            const loginTime = localStorage.getItem('admin_login_time');
            
            if (!isLoggedIn || !loginTime) {
                window.location.href = '/';
                return false;
            }
            
            const hoursSince = (Date.now() - parseInt(loginTime)) / (1000 * 60 * 60);
            if (hoursSince > 24) {
                localStorage.clear();
                window.location.href = '/';
                return false;
            }
            
            // Load artists
            loadArtists();
        });

        // Make functions global
        window.clearSelectedFile = clearSelectedFile;
        window.showNewArtistModal = showNewArtistModal;
        window.hideNewArtistModal = hideNewArtistModal;
        window.saveNewArtist = saveNewArtist;
        window.removeArtwork = removeArtwork;
        window.resetForm = resetForm;
        window.logout = logout;
    </script>
</body>
</html>
