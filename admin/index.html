<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Dashboard - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-blue: #1f6f9f;
            --primary-light: #2f8ed0;
            --primary-lighter: #70c8ff;
            --primary-dark: #1f4c73;
            --gray: #666;
            --light-gray: #f0f2f5;
            --white: #ffffff;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --success: #10b981;
            --warning: #f59e0b;
            --info: #3b82f6;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--light-gray);
            min-height: 100vh;
            color: #333;
            display: flex;
            flex-direction: column;
        }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px;
            flex: 1;
        }
        
        .admin-header {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .header-top h1 {
            color: var(--primary-blue);
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--light-gray);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .user-info i {
            color: var(--primary-blue);
        }
        
        .user-info span {
            font-weight: 600;
        }
        
        .logout-btn {
            color: #666;
            transition: color 0.3s;
            padding: 8px;
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
        }
        
        .logout-btn:hover {
            color: var(--primary-blue);
        }
        
        .admin-tabs {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding: 5px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .admin-tabs::-webkit-scrollbar {
            display: none;
        }
        
        .tab-btn {
            padding: 10px 15px !important;
            background: transparent;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem !important;
            font-weight: 600 !important;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            height: 40px !important;
        }
        
        .tab-btn i {
            font-size: 1rem !important;
        }
        
        .tab-btn:hover {
            background: #f0f0f0;
            color: var(--primary-blue);
        }
        
        .tab-btn.active {
            background: var(--primary-blue);
            color: white;
        }
        
        .admin-content {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .content-header {
            margin-bottom: 24px;
        }
        
        .content-header h2 {
            font-size: 1.3rem;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .content-header h2 i {
            color: var(--primary-blue);
        }
        
        .content-header p {
            color: var(--gray);
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        /* Stats Grid - Mobile first 2 columns, desktop 4 columns */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--light-gray);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(31, 111, 159, 0.15);
        }
        
        .stat-card:hover {
            border-color: var(--primary-blue);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(31, 111, 159, 0.15);
        }
        
        .stat-card .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .stat-card .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-blue);
            line-height: 1.2;
            margin-bottom: 5px;
        }
        
        .stat-card .stat-label {
            font-size: 0.75rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Section Header */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(31, 111, 159, 0.2);
        }
        
        .section-header h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .section-header i {
            color: var(--primary-blue);
            font-size: 1rem;
        }
        
        /* Total Views Card */
        .total-views-card {
            background: linear-gradient(135deg, #1f6f9f 0%, #2f8ed0 100%);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        
        .total-views-card .views-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .total-views-card .views-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .total-views-card .views-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        /* Views by Type Grid - Mobile first 2 columns */
        .views-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .view-card {
            background: var(--light-gray);
            padding: 16px 12px;
            border-radius: 12px;
            border: 1px solid rgba(31, 111, 159, 0.15);
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .view-card:hover {
            border-color: var(--primary-blue);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(31, 111, 159, 0.1);
        }
        
        .view-card .view-icon {
            font-size: 1.5rem;
            margin-bottom: 6px;
        }
        
        .view-card .view-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-blue);
        }
        
        .view-card .view-label {
            font-size: 0.7rem;
            color: var(--gray);
            margin-top: 2px;
        }
        
        .view-card .view-sub {
            font-size: 0.6rem;
            color: #999;
            margin-top: 2px;
        }
        
        /* Loading & Empty States */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        
        .loading i {
            font-size: 2.5rem;
            color: var(--primary-blue);
            margin-bottom: 16px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
        }
        
        .empty-state i {
            font-size: 3rem;
            color: var(--primary-blue);
            margin-bottom: 15px;
            opacity: 0.3;
        }
        
        .empty-state h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--primary-dark);
        }
        
        /* Footer */
        .admin-footer {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
            text-align: center;
            border: 1px solid rgba(31, 111, 159, 0.1);
            color: var(--gray);
            font-size: 0.8rem;
        }
        
        .admin-footer a {
            color: var(--primary-blue);
            text-decoration: none;
        }
        
        .admin-footer a:hover {
            text-decoration: underline;
        }
        
        /* Tablet Styles */
        @media (min-width: 768px) {
            .admin-container {
                padding: 15px;
            }
            
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .views-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }
        
        /* Desktop Styles */
        @media (min-width: 1024px) {
            .admin-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="header-top">
                <h1><i class="fas fa-tachometer-alt"></i> Dashboard</h1>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span>Admin</span>
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
            
            <div class="admin-tabs">
                <a href="/admin/" class="tab-btn active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="/admin/upload" class="tab-btn"><i class="fas fa-cloud-upload-alt"></i> Upload</a>
                <a href="/admin/songs" class="tab-btn"><i class="fas fa-music"></i> Songs</a>
                <a href="/admin/albums/index.html" class="tab-btn"><i class="fas fa-compact-disc"></i> Albums</a>
                <a href="/admin/eps/index.html" class="tab-btn"><i class="fas fa-play-circle"></i> EPs</a>
                <a href="/admin/artists/index.html" class="tab-btn"><i class="fas fa-microphone"></i> Artists</a>
                <a href="/admin/playlists/index.html" class="tab-btn"><i class="fas fa-list"></i> Playlists</a>
                <a href="/admin/genres/index.html" class="tab-btn"><i class="fas fa-tag"></i> Genres</a>
                <a href="/admin/pages/index.html" class="tab-btn"><i class="fas fa-file-alt"></i> Pages</a>
                <a href="/admin/analytics/index.html" class="tab-btn"><i class="fas fa-chart-line"></i> Analytics</a>
                <a href="/admin/trash.html" class="tab-btn"><i class="fas fa-trash-alt"></i> Trash</a>
            </div>
        </div>
        
        <div class="admin-content" id="dashboardContent">
            <div class="loading">
                <i class="fas fa-circle-notch fa-spin"></i>
                <div>Loading dashboard data...</div>
            </div>
        </div>
        
        <div class="admin-footer">
            <p>&copy; 2024 ZEDTOPVIBES. All rights reserved. | <a href="/admin/">Admin Panel</a> | <a href="/">Visit Site</a></p>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        
        let tracks = [];
        let albums = [];
        let eps = [];
        let artists = [];
        let playlists = [];
        
        function checkAuth() {
            const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
            const loginTime = localStorage.getItem('admin_login_time');
            
            if (!isLoggedIn || !loginTime) {
                window.location.href = '/admin/login.html';
                return false;
            }
            
            const hoursSince = (Date.now() - parseInt(loginTime)) / (1000 * 60 * 60);
            if (hoursSince > 24) {
                localStorage.clear();
                window.location.href = '/admin/login.html';
                return false;
            }
            return true;
        }
        
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.clear();
                window.location.href = '/admin/login.html';
            }
        }
        
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        async function loadDashboardData() {
            try {
                const [tracksRes, albumsRes, epsRes, artistsRes, playlistsRes] = await Promise.all([
                    fetch(`${API_BASE}/admin/tracks`),
                    fetch(`${API_BASE}/admin/albums`),
                    fetch(`${API_BASE}/admin/eps`),
                    fetch(`${API_BASE}/admin/artists`),
                    fetch(`${API_BASE}/admin/playlists`)
                ]);
                
                tracks = await tracksRes.json();
                albums = await albumsRes.json();
                eps = await epsRes.json();
                artists = await artistsRes.json();
                playlists = await playlistsRes.json();
                
                renderDashboard();
                
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('dashboardContent').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle" style="color: #ef4444;"></i>
                        <h3>Failed to Load Dashboard</h3>
                        <p style="margin: 12px 0;">${error.message}</p>
                        <button onclick="loadDashboardData()" class="tab-btn active" style="background: var(--primary-blue); color: white; border: none; cursor: pointer;">Try Again</button>
                    </div>
                `;
            }
        }
        
        function renderDashboard() {
            const totalTracks = tracks.length;
            const totalAlbums = albums.length;
            const totalEps = eps.length;
            const totalArtists = artists.length;
            
            const totalTrackViews = tracks.reduce((sum, t) => sum + (t.views || 0), 0);
            const totalAlbumViews = albums.reduce((sum, a) => sum + (a.views || 0), 0);
            const totalEPViews = eps.reduce((sum, e) => sum + (e.views || 0), 0);
            const totalArtistViews = artists.reduce((sum, a) => sum + (a.views || 0), 0);
            const totalPlaylistViews = playlists.reduce((sum, p) => sum + (p.views || 0), 0);
            const totalViews = totalTrackViews + totalAlbumViews + totalEPViews + totalArtistViews + totalPlaylistViews;
            
            const html = `
                <div class="content-header">
                    <h2><i class="fas fa-smile"></i> Welcome back, Admin</h2>
                    <p id="currentDate"></p>
                </div>
                
                <!-- Content Overview -->
                <div class="section-header">
                    <i class="fas fa-database"></i>
                    <h3>Content Overview</h3>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-music"></i></div>
                        <div class="stat-value">${totalTracks}</div>
                        <div class="stat-label">Total Songs</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-compact-disc"></i></div>
                        <div class="stat-value">${totalAlbums}</div>
                        <div class="stat-label">Total Albums</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-play-circle"></i></div>
                        <div class="stat-value">${totalEps}</div>
                        <div class="stat-label">Total EPs</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-microphone"></i></div>
                        <div class="stat-value">${totalArtists}</div>
                        <div class="stat-label">Total Artists</div>
                    </div>
                </div>
                
                <!-- Total Views -->
                <div class="total-views-card">
                    <div class="views-icon"><i class="fas fa-eye"></i></div>
                    <div class="views-value">${formatNumber(totalViews)}</div>
                    <div class="views-label">Total Views Across All Content</div>
                </div>
                
                <!-- Views by Content Type -->
                <div class="section-header">
                    <i class="fas fa-chart-bar"></i>
                    <h3>Views by Content Type</h3>
                </div>
                <div class="views-grid">
                    <div class="view-card" onclick="window.location.href='/admin/analytics/tracks.html'">
                        <div class="view-icon"><i class="fas fa-music"></i></div>
                        <div class="view-value">${formatNumber(totalTrackViews)}</div>
                        <div class="view-label">Tracks</div>
                        <div class="view-sub">${totalTracks} total</div>
                    </div>
                    <div class="view-card" onclick="window.location.href='/admin/analytics/albums.html'">
                        <div class="view-icon"><i class="fas fa-compact-disc"></i></div>
                        <div class="view-value">${formatNumber(totalAlbumViews)}</div>
                        <div class="view-label">Albums</div>
                        <div class="view-sub">${totalAlbums} total</div>
                    </div>
                    <div class="view-card" onclick="window.location.href='/admin/analytics/eps.html'">
                        <div class="view-icon"><i class="fas fa-play-circle"></i></div>
                        <div class="view-value">${formatNumber(totalEPViews)}</div>
                        <div class="view-label">EPs</div>
                        <div class="view-sub">${totalEps} total</div>
                    </div>
                    <div class="view-card" onclick="window.location.href='/admin/analytics/artists.html'">
                        <div class="view-icon"><i class="fas fa-microphone"></i></div>
                        <div class="view-value">${formatNumber(totalArtistViews)}</div>
                        <div class="view-label">Artists</div>
                        <div class="view-sub">${totalArtists} total</div>
                    </div>
                    <div class="view-card" onclick="window.location.href='/admin/analytics/playlists.html'">
                        <div class="view-icon"><i class="fas fa-list"></i></div>
                        <div class="view-value">${formatNumber(totalPlaylistViews)}</div>
                        <div class="view-label">Playlists</div>
                        <div class="view-sub">${playlists.length} total</div>
                    </div>
                </div>
            `;
            
            document.getElementById('dashboardContent').innerHTML = html;
            
            const dateElement = document.getElementById('currentDate');
            if (dateElement) {
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                dateElement.textContent = new Date().toLocaleDateString('en-GB', options);
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            if (checkAuth()) {
                loadDashboardData();
            }
        });
    </script>
</body>
</html>
