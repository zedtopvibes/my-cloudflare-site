<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Dashboard - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/admin/shared/styles.css">
</head>
<body>
    <div class="admin-layout">
        <main class="admin-main">
            <div class="admin-container">
                <div id="admin-header" data-title="Dashboard" data-icon="tachometer-alt"></div>
                
                <div class="admin-content" id="dashboardContent">
                    <!-- Skeleton Loaders -->
                    <div class="content-header">
                        <h2><i class="fas fa-smile"></i> <span class="skeleton" style="width: 180px; height: 24px; display: inline-block;"></span></h2>
                        <p><span class="skeleton" style="width: 200px; height: 16px; display: inline-block;"></span></p>
                    </div>
                    
                    <div class="section-header">
                        <i class="fas fa-database"></i>
                        <h3>Content Overview</h3>
                    </div>
                    <div class="stats-grid" id="statsGridSkeleton">
                        <div class="stat-card"><div class="skeleton-icon skeleton"></div><div class="skeleton-value skeleton"></div><div class="skeleton-label skeleton"></div></div>
                        <div class="stat-card"><div class="skeleton-icon skeleton"></div><div class="skeleton-value skeleton"></div><div class="skeleton-label skeleton"></div></div>
                        <div class="stat-card"><div class="skeleton-icon skeleton"></div><div class="skeleton-value skeleton"></div><div class="skeleton-label skeleton"></div></div>
                        <div class="stat-card"><div class="skeleton-icon skeleton"></div><div class="skeleton-value skeleton"></div><div class="skeleton-label skeleton"></div></div>
                    </div>
                    
                    <div class="total-views-card skeleton" style="height: 120px;"></div>
                    
                    <div class="section-header">
                        <i class="fas fa-chart-bar"></i>
                        <h3>Views by Content Type</h3>
                    </div>
                    <div class="views-grid" id="viewsGridSkeleton">
                        <div class="view-card"><div class="skeleton-icon skeleton"></div><div class="skeleton-value skeleton" style="width: 50%;"></div><div class="skeleton-label skeleton" style="width: 60%;"></div></div>
                        <div class="view-card"><div class="skeleton-icon skeleton"></div><div class="skeleton-value skeleton" style="width: 50%;"></div><div class="skeleton-label skeleton" style="width: 60%;"></div></div>
                        <div class="view-card"><div class="skeleton-icon skeleton"></div><div class="skeleton-value skeleton" style="width: 50%;"></div><div class="skeleton-label skeleton" style="width: 60%;"></div></div>
                        <div class="view-card"><div class="skeleton-icon skeleton"></div><div class="skeleton-value skeleton" style="width: 50%;"></div><div class="skeleton-label skeleton" style="width: 60%;"></div></div>
                        <div class="view-card"><div class="skeleton-icon skeleton"></div><div class="skeleton-value skeleton" style="width: 50%;"></div><div class="skeleton-label skeleton" style="width: 60%;"></div></div>
                    </div>
                </div>
                
                <div id="admin-footer"></div>
            </div>
        </main>
    </div>

    <script src="/admin/shared/loader.js"></script>
    <script>
        // ========== DASHBOARD-SPECIFIC CODE ==========
        const API_BASE = '/api';
        
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        async function loadDashboard() {
            try {
                const response = await fetch(`${API_BASE}/admin/stats`);
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error || 'Failed to load stats');
                }
                
                const stats = result.data;
                
                const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                const currentDate = new Date().toLocaleDateString('en-GB', dateOptions);
                
                const html = `
                    <div class="content-header">
                        <h2><i class="fas fa-smile"></i> Welcome back, Admin</h2>
                        <p>${currentDate}</p>
                    </div>
                    
                    <div class="section-header">
                        <i class="fas fa-database"></i>
                        <h3>Content Overview</h3>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-music"></i></div>
                            <div class="stat-value">${stats.tracks.total}</div>
                            <div class="stat-label">Total Songs</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-compact-disc"></i></div>
                            <div class="stat-value">${stats.albums.total}</div>
                            <div class="stat-label">Total Albums</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-play-circle"></i></div>
                            <div class="stat-value">${stats.eps.total}</div>
                            <div class="stat-label">Total EPs</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-microphone"></i></div>
                            <div class="stat-value">${stats.artists.total}</div>
                            <div class="stat-label">Total Artists</div>
                        </div>
                    </div>
                    
                    <div class="total-views-card">
                        <div class="views-icon"><i class="fas fa-eye"></i></div>
                        <div class="views-value">${formatNumber(stats.total_views)}</div>
                        <div class="views-label">Total Views Across All Content</div>
                    </div>
                    
                    <div class="section-header">
                        <i class="fas fa-chart-bar"></i>
                        <h3>Views by Content Type</h3>
                    </div>
                    <div class="views-grid">
                        <div class="view-card" onclick="window.location.href='/admin/analytics/tracks.html'">
                            <div class="view-icon"><i class="fas fa-music"></i></div>
                            <div class="view-value">${formatNumber(stats.tracks.total_views)}</div>
                            <div class="view-label">Tracks</div>
                            <div class="view-sub">${stats.tracks.total} total</div>
                        </div>
                        <div class="view-card" onclick="window.location.href='/admin/analytics/albums.html'">
                            <div class="view-icon"><i class="fas fa-compact-disc"></i></div>
                            <div class="view-value">${formatNumber(stats.albums.total_views)}</div>
                            <div class="view-label">Albums</div>
                            <div class="view-sub">${stats.albums.total} total</div>
                        </div>
                        <div class="view-card" onclick="window.location.href='/admin/analytics/eps.html'">
                            <div class="view-icon"><i class="fas fa-play-circle"></i></div>
                            <div class="view-value">${formatNumber(stats.eps.total_views)}</div>
                            <div class="view-label">EPs</div>
                            <div class="view-sub">${stats.eps.total} total</div>
                        </div>
                        <div class="view-card" onclick="window.location.href='/admin/analytics/artists.html'">
                            <div class="view-icon"><i class="fas fa-microphone"></i></div>
                            <div class="view-value">${formatNumber(stats.artists.total_views)}</div>
                            <div class="view-label">Artists</div>
                            <div class="view-sub">${stats.artists.total} total</div>
                        </div>
                        <div class="view-card" onclick="window.location.href='/admin/analytics/playlists.html'">
                            <div class="view-icon"><i class="fas fa-list"></i></div>
                            <div class="view-value">${formatNumber(stats.playlists.total_views)}</div>
                            <div class="view-label">Playlists</div>
                            <div class="view-sub">${stats.playlists.total} total</div>
                        </div>
                    </div>
                `;
                
                document.getElementById('dashboardContent').innerHTML = html;
                
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('dashboardContent').innerHTML = `
                    <div class="empty-state" style="text-align: center; padding: 40px;">
                        <i class="fas fa-exclamation-circle" style="font-size: 3rem; color: #ef4444; margin-bottom: 15px;"></i>
                        <h3>Failed to Load Dashboard</h3>
                        <p style="margin: 12px 0;">${error.message}</p>
                        <button onclick="loadDashboard()" class="tab-btn active" style="background: var(--primary-blue); color: white; border: none; cursor: pointer; display: inline-block; padding: 10px 20px;">Try Again</button>
                    </div>
                `;
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadDashboard();
        });
    </script>
</body>
</html>
