<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Successful | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-blue: #1f6f9f;
            --primary-light: #2f8ed0;
            --primary-dark: #1f4c73;
            --success: #28a745;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-700: #374151;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .success-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: var(--success);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
        }
        
        h1 {
            color: var(--primary-dark);
            margin-bottom: 10px;
            font-size: 2rem;
        }
        
        .subtitle {
            color: #6b7280;
            margin-bottom: 30px;
        }
        
        .track-info {
            background: var(--gray-50);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
            border: 1px solid var(--gray-200);
        }
        
        .info-row {
            display: flex;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--gray-200);
        }
        
        .info-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .info-label {
            width: 100px;
            font-weight: 600;
            color: var(--primary-blue);
        }
        
        .info-value {
            flex: 1;
            color: var(--gray-700);
            word-break: break-word;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: var(--primary-blue);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: var(--gray-100);
            color: #333;
            border: 1px solid var(--gray-200);
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>
        
        <h1>Upload Successful!</h1>
        <p class="subtitle">Your track has been uploaded and processed</p>
        
        <div class="track-info" id="trackInfo">
            <!-- Will be filled by JavaScript -->
            <div style="text-align: center; color: #666;">
                <i class="fas fa-spinner fa-spin"></i> Loading...
            </div>
        </div>
        
        <div class="action-buttons">
            <a href="/admin/upload.html" class="btn btn-primary">
                <i class="fas fa-upload"></i> Upload Another
            </a>
            <a href="/admin/tracks" class="btn btn-secondary">
                <i class="fas fa-music"></i> View All
            </a>
        </div>
    </div>

    <script>
        // Get track ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const trackId = urlParams.get('id');
        const title = urlParams.get('title');
        const artist = urlParams.get('artist');

        if (trackId && title && artist) {
            document.getElementById('trackInfo').innerHTML = `
                <div class="info-row">
                    <div class="info-label">Title</div>
                    <div class="info-value">${title}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">Artist</div>
                    <div class="info-value">${artist}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">Track ID</div>
                    <div class="info-value">#${trackId}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">Status</div>
                    <div class="info-value" style="color: var(--success);">
                        <i class="fas fa-check-circle"></i> Ready
                    </div>
                </div>
            `;
        } else {
            document.getElementById('trackInfo').innerHTML = `
                <div style="text-align: center; color: #666;">
                    <i class="fas fa-exclamation-circle"></i> No track information available
                </div>
            `;
        }
    </script>
</body>
</html>
