<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Profile | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1e3c72;
            --primary-light: #2a4a8a;
            --primary-soft: #e8f0fe;
            --secondary: #00b4d8;
            --success: #10b981;
            --error: #ef4444;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--gray-200);
        }
        
        .header h1 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--gray-800);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header h1 i {
            color: var(--primary);
        }
        
        .back-btn {
            padding: 8px 16px;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            color: var(--gray-700);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--gray-200);
        }
        
        .profile-card {
            background: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--gray-200);
        }
        
        .cover {
            height: 200px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 5rem;
        }
        
        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .info {
            padding: 24px;
            border-bottom: 1px solid var(--gray-200);
        }
        
        .info h1 {
            font-size: 2rem;
            color: var(--gray-800);
            margin-bottom: 4px;
        }
        
        .artist {
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .date {
            color: var(--gray-500);
            font-size: 0.9rem;
            margin-bottom: 12px;
        }
        
        .description {
            color: var(--gray-600);
            line-height: 1.6;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-bottom: 1px solid var(--gray-200);
        }
        
        .stat {
            padding: 20px;
            text-align: center;
            border-right: 1px solid var(--gray-200);
        }
        
        .stat:last-child { border-right: none; }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--gray-500);
            text-transform: uppercase;
        }
        
        .tracks-section {
            padding: 24px;
        }
        
        .tracks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .tracks-header h2 {
            font-size: 1.2rem;
            color: var(--gray-700);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .track-count {
            background: var(--gray-100);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        .tracks-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .track-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
        }
        
        .track-number {
            width: 30px;
            height: 30px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--primary);
            margin-right: 12px;
            border: 1px solid var(--gray-200);
        }
        
        .track-info {
            flex: 1;
        }
        
        .track-title {
            font-weight: 500;
            color: var(--gray-800);
            margin-bottom: 2px;
        }
        
        .track-artist {
            font-size: 0.8rem;
            color: var(--gray-500);
        }
        
        .track-stats {
            display: flex;
            gap: 16px;
            margin-right: 16px;
            color: var(--gray-500);
            font-size: 0.8rem;
        }
        
        .remove-btn {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 50%;
            background: var(--gray-200);
            color: var(--gray-500);
            cursor: pointer;
        }
        
        .remove-btn:hover {
            background: var(--error);
            color: white;
        }
        
        .empty-tracks {
            text-align: center;
            padding: 40px;
            color: var(--gray-500);
            background: var(--gray-50);
            border-radius: var(--radius-md);
            border: 1px dashed var(--gray-300);
        }
        
        .actions {
            padding: 20px 24px 24px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            border-top: 1px solid var(--gray-200);
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-200); }
        .btn-danger { background: var(--error); color: white; }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--gray-500);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-compact-disc"></i> Album Details</h1>
            <a href="/admin/albums/index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
        
        <div class="profile-card" id="profile">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
        </div>
    </div>

    <script>
        const API = '/api';
        const urlParams = new URLSearchParams(window.location.search);
        const albumId = urlParams.get('id');

        async function loadAlbum() {
            try {
                const res = await fetch(`${API}/albums/${albumId}`);
                const album = await res.json();
                renderAlbum(album);
            } catch (error) {
                document.getElementById('profile').innerHTML = '<div class="loading">Failed to load album</div>';
            }
        }

        function renderAlbum(album) {
            const tracks = album.tracks || [];
            const formatDuration = (s) => s ? `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}` : '0:00';
            
            document.getElementById('profile').innerHTML = `
                <div class="cover">
                    ${album.cover_url ? `<img src="${album.cover_url}" alt="${album.title}">` : '<i class="fas fa-compact-disc"></i>'}
                </div>
                
                <div class="info">
                    <h1>${escape(album.title)}</h1>
                    <div class="artist">${escape(album.artist)}</div>
                    <div class="date">Released: ${album.release_date ? new Date(album.release_date).toLocaleDateString() : 'Unknown'}</div>
                    ${album.description ? `<div class="description">${escape(album.description)}</div>` : ''}
                </div>
                
                <div class="stats">
                    <div class="stat"><div class="stat-value">${tracks.length}</div><div class="stat-label">Tracks</div></div>
                    <div class="stat"><div class="stat-value">${formatNumber(album.plays || 0)}</div><div class="stat-label">Plays</div></div>
                    <div class="stat"><div class="stat-value">${formatNumber(album.views || 0)}</div><div class="stat-label">Views</div></div>
                    <div class="stat"><div class="stat-value">${formatDuration(tracks.reduce((sum, t) => sum + (t.duration || 0), 0))}</div><div class="stat-label">Duration</div></div>
                </div>
                
                <div class="tracks-section">
                    <div class="tracks-header">
                        <h2><i class="fas fa-music"></i> Tracks</h2>
                        <span class="track-count">${tracks.length} tracks</span>
                    </div>
                    
                    ${tracks.length > 0 ? `
                        <div class="tracks-list">
                            ${tracks.map((track, i) => `
                                <div class="track-item">
                                    <div class="track-number">${i+1}</div>
                                    <div class="track-info">
                                        <div class="track-title">${escape(track.title)}</div>
                                        <div class="track-artist">${escape(track.artist)}</div>
                                    </div>
                                    <div class="track-stats">
                                        <span><i class="fas fa-headphones"></i> ${formatNumber(track.plays || 0)}</span>
                                    </div>
                                    <button class="remove-btn" onclick="removeTrack(${album.id}, ${track.id})"><i class="fas fa-times"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    ` : `
                        <div class="empty-tracks">
                            <p>No tracks in this album yet</p>
                        </div>
                    `}
                </div>
                
                <div class="actions">
                    <a href="/admin/albums/add-tracks.html?id=${album.id}" class="btn btn-secondary"><i class="fas fa-plus"></i> Add Tracks</a>
                    <a href="/admin/albums/edit.html?id=${album.id}" class="btn btn-primary"><i class="fas fa-edit"></i> Edit</a>
                    <button class="btn btn-danger" onclick="deleteAlbum(${album.id})"><i class="fas fa-trash"></i> Delete</button>
                </div>
            `;
        }

        async function removeTrack(albumId, trackId) {
            if (!confirm('Remove track from album?')) return;
            try {
                await fetch(`${API}/admin/albums/${albumId}/tracks/${trackId}`, { method: 'DELETE' });
                location.reload();
            } catch (error) {
                alert('Failed to remove track');
            }
        }

        async function deleteAlbum(id) {
            if (!confirm('Delete this album?')) return;
            try {
                await fetch(`${API}/admin/albums/${id}`, { method: 'DELETE' });
                window.location.href = '/admin/albums/index.html';
            } catch (error) {
                alert('Failed to delete album');
            }
        }

        function escape(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
        function formatNumber(n) { if (!n) return '0'; if (n >= 1e6) return (n/1e6).toFixed(1) + 'M'; if (n >= 1e3) return (n/1e3).toFixed(1) + 'K'; return n.toString(); }

        if (!localStorage.getItem('admin_logged_in')) window.location.href = '/admin/login.html';
        else loadAlbum();
    </script>
</body>
</html>
