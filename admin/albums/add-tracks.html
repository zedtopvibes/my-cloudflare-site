<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Tracks - Album | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1e3c72;
            --primary-light: #2a4a8a;
            --primary-soft: #e8f0fe;
            --secondary: #00b4d8;
            --success: #10b981;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.5;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--gray-200);
        }
        
        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--gray-800);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header h1 i {
            color: var(--primary);
        }
        
        .back-btn {
            padding: 6px 14px;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            color: var(--gray-700);
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--gray-200);
        }
        
        .back-btn:hover {
            background: var(--gray-200);
        }
        
        /* Main Content */
        .content-card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid var(--gray-200);
        }
        
        /* Album Header */
        .album-header {
            padding: 20px;
            background: linear-gradient(135deg, var(--primary-soft), white);
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .album-cover-small {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
        }
        
        .album-cover-small img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius-md);
        }
        
        .album-details h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 4px;
        }
        
        .album-artist {
            font-size: 0.95rem;
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .album-stats {
            display: flex;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--gray-500);
        }
        
        .album-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* Search Section */
        .search-section {
            padding: 20px;
            border-bottom: 1px solid var(--gray-200);
            background: white;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            padding: 8px 16px;
            border: 1px solid var(--gray-200);
            width: 100%;
        }
        
        .search-box i {
            color: var(--gray-400);
            margin-right: 10px;
        }
        
        .search-box input {
            border: none;
            background: transparent;
            padding: 8px 0;
            width: 100%;
            outline: none;
            font-size: 0.95rem;
        }
        
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 6px 14px;
            background: var(--gray-100);
            border: 1px solid var(--gray-200);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--gray-600);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover {
            background: var(--primary-soft);
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* Tracks Container */
        .tracks-container {
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .track-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
            margin-bottom: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .track-item:hover {
            background: var(--primary-soft);
            border-color: var(--primary);
        }
        
        .track-item.selected {
            background: var(--primary-soft);
            border-color: var(--primary);
            border-width: 2px;
        }
        
        .track-checkbox {
            margin-right: 12px;
        }
        
        .track-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .track-cover {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
            margin-right: 12px;
        }
        
        .track-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius-sm);
        }
        
        .track-info {
            flex: 1;
        }
        
        .track-title {
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 4px;
        }
        
        .track-artist {
            font-size: 0.8rem;
            color: var(--gray-500);
        }
        
        .track-meta {
            display: flex;
            gap: 20px;
            margin-right: 16px;
            font-size: 0.8rem;
            color: var(--gray-500);
        }
        
        .track-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .track-meta i {
            color: var(--primary);
            font-size: 0.7rem;
        }
        
        .unavailable-track {
            display: flex;
            align-items: center;
            padding: 10px;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            margin-bottom: 6px;
            opacity: 0.7;
            border-left: 3px solid var(--gray-400);
        }
        
        .unavailable-info {
            flex: 1;
            margin-left: 10px;
        }
        
        .unavailable-title {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--gray-600);
        }
        
        .unavailable-artist {
            font-size: 0.7rem;
            color: var(--gray-500);
        }
        
        .album-badge {
            font-size: 0.7rem;
            background: var(--primary-soft);
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 12px;
            white-space: nowrap;
        }
        
        /* Selection Bar */
        .selection-bar {
            padding: 16px 20px;
            background: var(--gray-100);
            border-top: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .selected-count {
            font-weight: 500;
            color: var(--gray-700);
        }
        
        .selected-count span {
            color: var(--primary);
            font-weight: 700;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: var(--primary-light);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: var(--gray-200);
            color: var(--gray-700);
        }
        
        .btn-secondary:hover {
            background: var(--gray-300);
        }
        
        .info-section {
            margin-top: 20px;
            padding: 16px;
            background: var(--gray-50);
            border-radius: var(--radius-md);
            border: 1px dashed var(--gray-300);
        }
        
        .info-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gray-600);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .stats-badge {
            background: var(--primary-soft);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-left: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--gray-500);
        }
        
        .loading i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 16px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-500);
        }
        
        .empty-state i {
            font-size: 4rem;
            color: var(--gray-300);
            margin-bottom: 16px;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 6px;
            color: white;
            z-index: 2000;
            animation: slideIn 0.3s;
        }
        
        .toast.success { background: var(--success); }
        .toast.error { background: #ef4444; }
        .toast.info { background: var(--primary); }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .album-header {
                flex-direction: column;
                text-align: center;
            }
            
            .track-item {
                flex-wrap: wrap;
            }
            
            .track-meta {
                width: 100%;
                margin-left: 58px;
                margin-top: 8px;
            }
            
            .selection-bar {
                flex-direction: column;
                gap: 12px;
            }
            
            .action-buttons {
                width: 100%;
            }
            
            .btn {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-music"></i>
                Add Tracks to Album
            </h1>
            <a href="/admin/albums/index.html" class="back-btn" id="backBtn">
                <i class="fas fa-arrow-left"></i>
                Back to Albums
            </a>
        </div>
        
        <div class="content-card" id="contentCard">
            <div class="loading">
                <i class="fas fa-circle-notch fa-spin"></i>
                <div>Loading tracks...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let albumId = null;
        let album = null;
        let allTracks = [];
        let allAlbums = [];
        let albumTrackIds = new Set();
        let tracksInOtherAlbums = new Map();
        let selectedTracks = new Set();
        let currentFilter = 'all';

        async function loadPage() {
            const urlParams = new URLSearchParams(window.location.search);
            albumId = urlParams.get('id');
            
            if (!albumId) {
                window.location.href = '/admin/albums/index.html';
                return;
            }
            
            try {
                // Load ALL data in parallel
                const [albumRes, tracksRes, albumsRes] = await Promise.all([
                    fetch(`${API_BASE}/albums/${albumId}`),
                    fetch(`${API_BASE}/tracks`),
                    fetch(`${API_BASE}/albums`)
                ]);
                
                if (!albumRes.ok) throw new Error('Album not found');
                
                album = await albumRes.json();
                allTracks = await tracksRes.json();
                allAlbums = await albumsRes.json();
                
                console.log('📊 Data loaded:', {
                    album: album.title,
                    totalTracks: allTracks.length,
                    otherAlbums: allAlbums.length - 1
                });
                
                // Get IDs of tracks already in THIS album
                albumTrackIds = new Set((album.tracks || []).map(t => t.id));
                console.log('✅ Tracks in this album:', albumTrackIds.size);
                
                // Build map of tracks in OTHER albums
                tracksInOtherAlbums.clear();
                
                for (const otherAlbum of allAlbums) {
                    if (otherAlbum.id == albumId) continue; // Skip current album
                    
                    if (otherAlbum.tracks && otherAlbum.tracks.length > 0) {
                        for (const track of otherAlbum.tracks) {
                            tracksInOtherAlbums.set(track.id, {
                                albumId: otherAlbum.id,
                                albumTitle: otherAlbum.title
                            });
                        }
                    }
                }
                console.log('🔴 Tracks in other albums:', tracksInOtherAlbums.size);
                
                renderPage();
                
            } catch (error) {
                console.error('❌ Error:', error);
                document.getElementById('contentCard').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle" style="color: #ef4444;"></i>
                        <h3>Failed to Load</h3>
                        <p style="margin: 12px 0;">${error.message}</p>
                        <button onclick="loadPage()" class="btn btn-primary">Try Again</button>
                    </div>
                `;
            }
        }

        function renderPage() {
            // AVAILABLE tracks = NOT in this album AND NOT in other albums
            const availableTracks = allTracks.filter(track => {
                // Skip if already in this album
                if (albumTrackIds.has(track.id)) return false;
                
                // Skip if in another album
                if (tracksInOtherAlbums.has(track.id)) return false;
                
                // This track is free!
                return true;
            });
            
            // UNAVAILABLE tracks = in other albums (for info display)
            const unavailableTracks = allTracks.filter(track => 
                tracksInOtherAlbums.has(track.id) && !albumTrackIds.has(track.id)
            );
            
            // ALREADY IN THIS ALBUM tracks (for stats)
            const inThisAlbum = allTracks.filter(track => albumTrackIds.has(track.id));
            
            console.log('📈 Track breakdown:', {
                available: availableTracks.length,
                inThisAlbum: inThisAlbum.length,
                inOtherAlbums: unavailableTracks.length,
                total: allTracks.length
            });
            
            // Apply search and filter
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const filteredTracks = availableTracks.filter(track => {
                const matchesSearch = track.title.toLowerCase().includes(searchTerm) ||
                                    track.artist.toLowerCase().includes(searchTerm);
                
                if (currentFilter === 'all') return matchesSearch;
                if (currentFilter === 'featured') return matchesSearch && track.featured;
                if (currentFilter === 'recent') {
                    const sevenDaysAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);
                    const trackDate = new Date(track.uploaded_at).getTime();
                    return matchesSearch && trackDate > sevenDaysAgo;
                }
                return matchesSearch;
            });

            const contentCard = document.getElementById('contentCard');
            
            contentCard.innerHTML = `
                <div class="album-header">
                    <div class="album-cover-small">
                        ${album.cover_url 
                            ? `<img src="${album.cover_url}" alt="${escapeHtml(album.title)}">`
                            : '💿'
                        }
                    </div>
                    <div class="album-details">
                        <h2>${escapeHtml(album.title)}</h2>
                        <div class="album-artist">${escapeHtml(album.artist)}</div>
                        <div class="album-stats">
                            <span><i class="fas fa-music"></i> ${album.tracks?.length || 0} tracks</span>
                            <span><i class="fas fa-headphones"></i> ${formatNumber(album.plays || 0)} plays</span>
                        </div>
                    </div>
                </div>
                
                <div class="search-section">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search tracks by title or artist..." value="${escapeHtml(searchTerm)}">
                    </div>
                    
                    <div class="filter-bar">
                        <button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All</button>
                        <button class="filter-btn ${currentFilter === 'featured' ? 'active' : ''}" onclick="setFilter('featured')">Featured</button>
                        <button class="filter-btn ${currentFilter === 'recent' ? 'active' : ''}" onclick="setFilter('recent')">Recent</button>
                    </div>
                    
                    <div style="display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;">
                        <span class="stats-badge"><i class="fas fa-check-circle" style="color: var(--success);"></i> ${availableTracks.length} available</span>
                        <span class="stats-badge"><i class="fas fa-music"></i> ${inThisAlbum.length} in this album</span>
                        <span class="stats-badge"><i class="fas fa-lock" style="color: var(--gray-500);"></i> ${unavailableTracks.length} in other albums</span>
                    </div>
                </div>
                
                <div class="tracks-container">
                    ${filteredTracks.length > 0 ? `
                        <div style="margin-bottom: 10px; color: var(--gray-500); font-size: 0.85rem;">
                            <i class="fas fa-check-circle" style="color: var(--success);"></i> 
                            Showing ${filteredTracks.length} available tracks
                        </div>
                        ${filteredTracks.map(track => `
                            <div class="track-item ${selectedTracks.has(track.id) ? 'selected' : ''}" onclick="toggleTrack(${track.id}, event)">
                                <div class="track-checkbox" onclick="event.stopPropagation()">
                                    <input type="checkbox" 
                                           ${selectedTracks.has(track.id) ? 'checked' : ''} 
                                           onchange="toggleTrack(${track.id})">
                                </div>
                                <div class="track-cover">
                                    ${track.artwork_url 
                                        ? `<img src="${track.artwork_url}" alt="">`
                                        : '<i class="fas fa-music"></i>'
                                    }
                                </div>
                                <div class="track-info">
                                    <div class="track-title">${escapeHtml(track.title)}</div>
                                    <div class="track-artist">${escapeHtml(track.artist)}</div>
                                </div>
                                <div class="track-meta">
                                    <span><i class="fas fa-headphones"></i> ${formatNumber(track.plays || 0)}</span>
                                    <span><i class="fas fa-clock"></i> ${formatDuration(track.duration)}</span>
                                </div>
                            </div>
                        `).join('')
                    } : availableTracks.length === 0 ? `
                        <div class="empty-state">
                            <i class="fas fa-check-circle" style="color: var(--success); font-size: 3rem;"></i>
                            <h3>All tracks are assigned</h3>
                            <p>Every track in your library already belongs to an album</p>
                            ${unavailableTracks.length > 0 ? `
                                <p style="margin-top: 10px; font-size: 0.9rem;">
                                    ${unavailableTracks.length} tracks are in other albums
                                </p>
                            ` : ''}
                        </div>
                    ` : `
                        <div class="empty-state">
                            <i class="fas fa-search"></i>
                            <h3>No matches found</h3>
                            <p>Try a different search term</p>
                        </div>
                    `}
                    
                    ${unavailableTracks.length > 0 && searchTerm === '' ? `
                        <div class="info-section">
                            <div class="info-title">
                                <i class="fas fa-info-circle"></i> 
                                Tracks in other albums (${unavailableTracks.length})
                            </div>
                            ${unavailableTracks.slice(0, 5).map(track => {
                                const albumInfo = tracksInOtherAlbums.get(track.id);
                                return `
                                    <div class="unavailable-track">
                                        <i class="fas fa-lock" style="color: var(--gray-400); width: 20px;"></i>
                                        <div class="unavailable-info">
                                            <div class="unavailable-title">${escapeHtml(track.title)}</div>
                                            <div class="unavailable-artist">${escapeHtml(track.artist)}</div>
                                        </div>
                                        <span class="album-badge">${escapeHtml(albumInfo?.albumTitle)}</span>
                                    </div>
                                `;
                            }).join('')}
                            ${unavailableTracks.length > 5 ? `
                                <div style="text-align: center; margin-top: 10px; font-size: 0.8rem; color: var(--gray-500);">
                                    +${unavailableTracks.length - 5} more tracks in other albums
                                </div>
                            ` : ''}
                        </div>
                    ` : ''}
                </div>
                
                <div class="selection-bar">
                    <div class="selected-count">
                        <span>${selectedTracks.size}</span> track${selectedTracks.size !== 1 ? 's' : ''} selected
                    </div>
                    <div class="action-buttons">
                        <button class="btn btn-secondary" onclick="clearSelection()">
                            Clear
                        </button>
                        <button class="btn btn-primary" onclick="addSelectedTracks()" ${selectedTracks.size === 0 ? 'disabled' : ''}>
                            <i class="fas fa-plus-circle"></i> Add to Album
                        </button>
                    </div>
                </div>
            `;

            // Add search listener
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', debounce(() => {
                    renderPage();
                }, 300));
            }
        }

        function toggleTrack(trackId, event) {
            if (selectedTracks.has(trackId)) {
                selectedTracks.delete(trackId);
            } else {
                selectedTracks.add(trackId);
            }
            renderPage();
        }

        function setFilter(filter) {
            currentFilter = filter;
            renderPage();
        }

        function clearSelection() {
            selectedTracks.clear();
            renderPage();
        }

        async function addSelectedTracks() {
            if (selectedTracks.size === 0) return;

            const addButtons = document.querySelectorAll('.btn-primary');
            addButtons.forEach(btn => btn.disabled = true);

            let successCount = 0;
            let errorCount = 0;
            const errors = [];

            for (const trackId of selectedTracks) {
                try {
                    const res = await fetch(`${API_BASE}/admin/albums/${albumId}/tracks`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ track_id: trackId })
                    });

                    const data = await res.json();
                    
                    if (res.ok) {
                        successCount++;
                        albumTrackIds.add(trackId);
                    } else {
                        errorCount++;
                        errors.push(data.error || 'Unknown error');
                    }
                } catch (error) {
                    console.error('Error adding track:', error);
                    errorCount++;
                    errors.push(error.message);
                }
            }

            selectedTracks.clear();

            if (errorCount === 0) {
                showToast(`✅ Successfully added ${successCount} track${successCount !== 1 ? 's' : ''}!`, 'success');
            } else if (successCount > 0) {
                showToast(`⚠️ Added ${successCount} tracks (${errorCount} failed)`, 'error');
            } else {
                showToast(`❌ ${errors[0] || 'Failed to add tracks'}`, 'error');
            }

            // Reload page to show updated album
            setTimeout(() => {
                window.location.href = `/admin/albums/profile.html?id=${albumId}`;
            }, 1500);
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function formatDuration(seconds) {
            if (!seconds) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Update back button to return to profile
        document.getElementById('backBtn').href = `/admin/albums/profile.html?id=${albumId}`;

        // Check authentication
        function checkAuth() {
            const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
            const loginTime = localStorage.getItem('admin_login_time');
            
            if (!isLoggedIn || !loginTime) {
                window.location.href = '/admin/login.html';
                return false;
            }
            
            const hoursSince = (Date.now() - parseInt(loginTime)) / (1000 * 60 * 60);
            if (hoursSince > 24) {
                localStorage.clear();
                window.location.href = '/admin/login.html';
                return false;
            }
            return true;
        }

        // Initialize
        if (checkAuth()) {
            loadPage();
        }
    </script>
</body>
</html>
