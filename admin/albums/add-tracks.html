<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Tracks | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1e3c72;
            --primary-light: #2a4a8a;
            --primary-soft: #e8f0fe;
            --secondary: #00b4d8;
            --success: #10b981;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--gray-200);
        }
        
        .header h1 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--gray-800);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header h1 i {
            color: var(--primary);
        }
        
        .back-btn {
            padding: 8px 16px;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            color: var(--gray-700);
            text-decoration: none;
            border: 1px solid var(--gray-200);
        }
        
        .album-info {
            background: white;
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid var(--gray-200);
        }
        
        .album-cover {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }
        
        .album-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius-md);
        }
        
        .search-box {
            background: white;
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--gray-200);
        }
        
        .search-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
            font-size: 1rem;
        }
        
        .tracks-list {
            background: white;
            border-radius: var(--radius-lg);
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--gray-200);
        }
        
        .track-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--gray-200);
            cursor: pointer;
        }
        
        .track-item:hover { background: var(--gray-50); }
        .track-item.selected { background: var(--primary-soft); }
        
        .track-checkbox { margin-right: 15px; }
        .track-info { flex: 1; }
        .track-title { font-weight: 500; }
        .track-artist { font-size: 0.8rem; color: var(--gray-500); }
        .track-meta { color: var(--gray-500); font-size: 0.8rem; }
        
        .actions {
            background: white;
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--gray-200);
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 500;
            cursor: pointer;
        }
        
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-200); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray-500);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-music"></i> Add Tracks</h1>
            <a href="/admin/albums/index.html" class="back-btn">Back</a>
        </div>
        
        <div id="content">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
        </div>
    </div>

    <script>
        const API = '/api';
        const urlParams = new URLSearchParams(window.location.search);
        const albumId = urlParams.get('id');
        
        let album = null;
        let allTracks = [];
        let albumTrackIds = new Set();
        let selectedTracks = new Set();

        async function loadData() {
            try {
                const [albumRes, tracksRes] = await Promise.all([
                    fetch(`${API}/albums/${albumId}`),
                    fetch(`${API}/tracks`)
                ]);
                
                album = await albumRes.json();
                allTracks = await tracksRes.json();
                albumTrackIds = new Set((album.tracks || []).map(t => t.id));
                
                render();
            } catch (error) {
                document.getElementById('content').innerHTML = '<div class="loading">Failed to load</div>';
            }
        }

        function render() {
            const availableTracks = allTracks.filter(t => !albumTrackIds.has(t.id));
            
            document.getElementById('content').innerHTML = `
                <div class="album-info">
                    <div class="album-cover">
                        ${album.cover_url ? `<img src="${album.cover_url}" alt="">` : '<i class="fas fa-compact-disc"></i>'}
                    </div>
                    <div>
                        <h3>${escape(album.title)}</h3>
                        <p>${escape(album.artist)} • ${album.tracks?.length || 0} tracks</p>
                    </div>
                </div>
                
                <div class="search-box">
                    <input type="text" id="search" placeholder="Search tracks..." oninput="filterTracks(this.value)">
                </div>
                
                <div class="tracks-list" id="tracksList">
                    ${availableTracks.map(track => `
                        <div class="track-item ${selectedTracks.has(track.id) ? 'selected' : ''}" 
                             onclick="toggleTrack(${track.id})">
                            <div class="track-checkbox">
                                <input type="checkbox" ${selectedTracks.has(track.id) ? 'checked' : ''}>
                            </div>
                            <div class="track-info">
                                <div class="track-title">${escape(track.title)}</div>
                                <div class="track-artist">${escape(track.artist)}</div>
                            </div>
                            <div class="track-meta">
                                <span><i class="fas fa-headphones"></i> ${formatNumber(track.plays || 0)}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="actions">
                    <span>${selectedTracks.size} selected</span>
                    <div>
                        <button class="btn btn-secondary" onclick="clearSelection()">Clear</button>
                        <button class="btn btn-primary" onclick="addTracks()" ${selectedTracks.size === 0 ? 'disabled' : ''}>
                            Add Selected
                        </button>
                    </div>
                </div>
            `;
        }

        function toggleTrack(id) {
            if (selectedTracks.has(id)) selectedTracks.delete(id);
            else selectedTracks.add(id);
            render();
        }

        function clearSelection() {
            selectedTracks.clear();
            render();
        }

        function filterTracks(search) {
            // Simple filter implementation
            const items = document.querySelectorAll('.track-item');
            items.forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(search.toLowerCase()) ? 'flex' : 'none';
            });
        }

        async function addTracks() {
            const btn = document.querySelector('.btn-primary');
            btn.disabled = true;
            btn.textContent = 'Adding...';
            
            let success = 0;
            for (const trackId of selectedTracks) {
                try {
                    const res = await fetch(`${API}/admin/albums/${albumId}/tracks`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ track_id: trackId })
                    });
                    if (res.ok) success++;
                } catch (e) {}
            }
            
            alert(`Added ${success} tracks`);
            window.location.href = `/admin/albums/profile.html?id=${albumId}`;
        }

        function escape(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
        function formatNumber(n) { if (!n) return '0'; if (n >= 1e6) return (n/1e6).toFixed(1) + 'M'; if (n >= 1e3) return (n/1e3).toFixed(1) + 'K'; return n.toString(); }

        if (!localStorage.getItem('admin_logged_in')) window.location.href = '/admin/login.html';
        else loadData();
    </script>
</body>
</html>
