<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albums - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1e3c72;
            --primary-light: #2a4a8a;
            --primary-soft: #e8f0fe;
            --secondary: #00b4d8;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.5;
        }
        
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .admin-header {
            background: white;
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .header-top h1 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--gray-800);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-top h1 i {
            color: var(--primary);
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--gray-100);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.9rem;
        }
        
        .logout-btn {
            background: none;
            border: none;
            color: var(--gray-600);
            cursor: pointer;
            font-size: 1rem;
        }
        
        .admin-tabs {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        
        .tab-btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--gray-600);
            cursor: pointer;
            white-space: nowrap;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .tab-btn:hover {
            background: var(--gray-100);
            color: var(--primary);
        }
        
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        
        .admin-content {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }
        
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .content-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--gray-700);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .search-section {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            padding: 5px 12px;
            border: 1px solid var(--gray-200);
            min-width: 250px;
        }
        
        .search-box i {
            color: var(--gray-400);
            margin-right: 8px;
        }
        
        .search-box input {
            border: none;
            background: transparent;
            padding: 8px 0;
            width: 100%;
            outline: none;
            font-size: 0.95rem;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-light);
        }
        
        .btn-secondary {
            background: var(--gray-100);
            color: var(--gray-700);
            border: 1px solid var(--gray-200);
        }
        
        .albums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .album-card {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .album-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }
        
        .album-cover {
            height: 180px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
        }
        
        .album-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .featured-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #fbbf24;
            color: #92400e;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .album-info {
            padding: 16px;
        }
        
        .album-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--gray-800);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .album-artist {
            font-size: 0.9rem;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .album-meta {
            display: flex;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--gray-500);
        }
        
        .album-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
        }
        
        .page-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            background: white;
            cursor: pointer;
        }
        
        .page-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray-500);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--gray-500);
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="header-top">
                <h1><i class="fas fa-compact-disc"></i> Albums</h1>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span>Admin</span>
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
            
            <div class="admin-tabs">
                <a href="/admin/" class="tab-btn"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="/admin/upload" class="tab-btn"><i class="fas fa-cloud-upload-alt"></i> Upload</a>
                <a href="/admin/songs" class="tab-btn"><i class="fas fa-music"></i> Songs</a>
                <a href="/admin/albums/index.html" class="tab-btn active"><i class="fas fa-compact-disc"></i> Albums</a>
                <a href="/admin/artists/index.html" class="tab-btn"><i class="fas fa-microphone"></i> Artists</a>
                <a href="/admin/playlists/index.html" class="tab-btn"><i class="fas fa-list"></i> Playlists</a>
            </div>
        </div>
        
        <div class="admin-content">
            <div class="content-header">
                <h2><i class="fas fa-compact-disc"></i> All Albums</h2>
                <div class="search-section">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search albums..." onkeyup="searchAlbums()">
                    </div>
                    <a href="/admin/albums/edit.html" class="btn btn-primary">
                        <i class="fas fa-plus-circle"></i> New Album
                    </a>
                </div>
            </div>

            <div id="albumsGrid" class="albums-grid">
                <div class="loading">
                    <i class="fas fa-circle-notch fa-spin"></i> Loading...
                </div>
            </div>

            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let allAlbums = [];
        let currentPage = 1;
        const itemsPerPage = 12;

        function logout() {
            if (confirm('Logout?')) {
                localStorage.clear();
                window.location.href = '/admin/login.html';
            }
        }

        function checkAuth() {
            const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
            if (!isLoggedIn) window.location.href = '/admin/login.html';
            return isLoggedIn;
        }

        async function loadAlbums() {
            try {
                const res = await fetch(`${API_BASE}/albums`);
                allAlbums = await res.json();
                renderAlbums();
            } catch (error) {
                document.getElementById('albumsGrid').innerHTML = '<div class="empty-state">Failed to load albums</div>';
            }
        }

        function renderAlbums() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allAlbums.filter(a => 
                a.title.toLowerCase().includes(search) || 
                a.artist.toLowerCase().includes(search)
            );
            
            if (filtered.length === 0) {
                document.getElementById('albumsGrid').innerHTML = '<div class="empty-state">No albums found</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const pageItems = filtered.slice(start, start + itemsPerPage);
            
            document.getElementById('albumsGrid').innerHTML = pageItems.map(album => `
                <a href="/admin/albums/profile.html?id=${album.id}" class="album-card">
                    <div class="album-cover">
                        ${album.cover_url ? `<img src="${album.cover_url}" alt="${album.title}">` : '<i class="fas fa-compact-disc"></i>'}
                        ${album.is_featured ? '<span class="featured-badge">Featured</span>' : ''}
                    </div>
                    <div class="album-info">
                        <div class="album-title">${escapeHtml(album.title)}</div>
                        <div class="album-artist">${escapeHtml(album.artist)}</div>
                        <div class="album-meta">
                            <span><i class="fas fa-music"></i> ${album.tracks?.length || 0}</span>
                            <span><i class="fas fa-headphones"></i> ${formatNumber(album.plays || 0)}</span>
                        </div>
                    </div>
                </a>
            `).join('');
            
            renderPagination(totalPages);
        }

        function renderPagination(total) {
            if (total <= 1) {
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            let html = '';
            for (let i = 1; i <= total; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            document.getElementById('pagination').innerHTML = html;
        }

        function goToPage(page) { currentPage = page; renderAlbums(); }
        function searchAlbums() { currentPage = 1; renderAlbums(); }
        
        function escapeHtml(text) { 
            const div = document.createElement('div'); 
            div.textContent = text; 
            return div.innerHTML; 
        }
        
        function formatNumber(n) { 
            if (!n) return '0'; 
            if (n >= 1e6) return (n/1e6).toFixed(1) + 'M'; 
            if (n >= 1e3) return (n/1e3).toFixed(1) + 'K'; 
            return n.toString(); 
        }

        if (checkAuth()) loadAlbums();
    </script>
</body>
</html>
