<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Album | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1e3c72;
            --primary-light: #2a4a8a;
            --primary-soft: #e8f0fe;
            --secondary: #00b4d8;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--gray-200);
        }
        
        .header h1 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--gray-800);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header h1 i {
            color: var(--primary);
        }
        
        .back-btn {
            padding: 8px 16px;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            color: var(--gray-700);
            text-decoration: none;
            border: 1px solid var(--gray-200);
        }
        
        .form-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--gray-200);
        }
        
        .cover-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .cover-preview {
            width: 150px;
            height: 150px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            overflow: hidden;
        }
        
        .cover-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .cover-upload-btn {
            background: var(--gray-100);
            border: 1px solid var(--gray-200);
            padding: 8px 16px;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: inline-block;
        }
        
        #coverInput { display: none; }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: var(--gray-700);
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
            font-family: 'Inter', sans-serif;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 20px 0;
        }
        
        .actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 30px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-200); }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray-500);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-compact-disc"></i> <span id="pageTitle">Create Album</span></h1>
            <a href="/admin/albums/index.html" class="back-btn">Back</a>
        </div>
        
        <div class="form-card" id="formCard">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
        </div>
    </div>

    <script>
        const API = '/api';
        let coverFile = null;

        async function loadAlbum() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            
            if (!id) {
                document.getElementById('pageTitle').textContent = 'Create Album';
                renderForm(null);
                return;
            }
            
            try {
                const res = await fetch(`${API}/albums/${id}`);
                const album = await res.json();
                document.getElementById('pageTitle').textContent = 'Edit Album';
                renderForm(album);
            } catch (error) {
                document.getElementById('formCard').innerHTML = '<div class="loading">Failed to load album</div>';
            }
        }

        function renderForm(album) {
            document.getElementById('formCard').innerHTML = `
                <form id="albumForm">
                    <input type="hidden" id="albumId" value="${album?.id || ''}">
                    
                    <div class="cover-section">
                        <div class="cover-preview" id="coverPreview">
                            ${album?.cover_url ? `<img src="${album.cover_url}" alt="Cover">` : '<i class="fas fa-compact-disc"></i>'}
                        </div>
                        <label for="coverInput" class="cover-upload-btn">
                            <i class="fas fa-camera"></i> ${album?.cover_url ? 'Change Cover' : 'Upload Cover'}
                        </label>
                        <input type="file" id="coverInput" accept="image/*" onchange="previewCover(this)">
                    </div>
                    
                    <div class="form-group">
                        <label>Title *</label>
                        <input type="text" id="title" value="${escape(album?.title || '')}" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Artist *</label>
                        <input type="text" id="artist" value="${escape(album?.artist || '')}" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Release Date</label>
                            <input type="date" id="releaseDate" value="${album?.release_date || ''}">
                        </div>
                        <div class="form-group">
                            <label>Genre</label>
                            <input type="text" id="genre" value="${escape(album?.genre || '')}">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="description" rows="3">${escape(album?.description || '')}</textarea>
                    </div>
                    
                    <div class="checkbox">
                        <input type="checkbox" id="featured" ${album?.is_featured ? 'checked' : ''}>
                        <label for="featured">Featured Album</label>
                    </div>
                    
                    <div class="actions">
                        <button type="button" class="btn btn-secondary" onclick="window.location.href='/admin/albums/index.html'">Cancel</button>
                        <button type="submit" class="btn btn-primary">${album ? 'Update' : 'Create'}</button>
                    </div>
                </form>
            `;
            document.getElementById('albumForm').addEventListener('submit', handleSubmit);
        }

        function previewCover(input) {
            if (input.files && input.files[0]) {
                coverFile = input.files[0];
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('coverPreview').innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                };
                reader.readAsDataURL(coverFile);
            }
        }

        async function handleSubmit(e) {
            e.preventDefault();
            
            const id = document.getElementById('albumId').value;
            const data = {
                title: document.getElementById('title').value,
                artist: document.getElementById('artist').value,
                release_date: document.getElementById('releaseDate').value || null,
                genre: document.getElementById('genre').value || null,
                description: document.getElementById('description').value || null,
                is_featured: document.getElementById('featured').checked
            };

            try {
                let res;
                if (id) {
                    res = await fetch(`${API}/admin/albums/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } else {
                    res = await fetch(`${API}/admin/albums`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                }
                
                const result = await res.json();
                const albumId = result.id || id;
                
                if (coverFile) {
                    const formData = new FormData();
                    formData.append('cover', coverFile);
                    await fetch(`${API}/admin/albums/${albumId}/cover`, {
                        method: 'POST',
                        body: formData
                    });
                }
                
                window.location.href = `/admin/albums/profile.html?id=${albumId}`;
            } catch (error) {
                alert('Failed to save album');
            }
        }

        function escape(str) { if (!str) return ''; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

        if (!localStorage.getItem('admin_logged_in')) window.location.href = '/admin/login.html';
        else loadAlbum();
    </script>
</body>
</html>
