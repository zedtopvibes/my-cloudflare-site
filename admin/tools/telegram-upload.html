<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Telegram Upload - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/admin/shared/styles.css">
    <style>
        .telegram-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            padding: 60px 20px;
        }
        
        .telegram-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #1f6f9f 0%, #2f8ed0 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }
        
        .telegram-icon i {
            font-size: 3.5rem;
            color: white;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(31, 111, 159, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(31, 111, 159, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(31, 111, 159, 0); }
        }
        
        .telegram-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 12px;
        }
        
        .telegram-message {
            font-size: 1rem;
            color: var(--gray);
            margin-bottom: 20px;
            max-width: 500px;
        }
        
        .info-card {
            background: var(--light-gray);
            border-radius: 12px;
            padding: 20px;
            max-width: 450px;
            margin: 20px auto;
            text-align: left;
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .info-card h4 {
            color: var(--primary-dark);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-card p {
            color: var(--gray);
            font-size: 0.85rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-card i {
            color: var(--primary-blue);
            width: 20px;
        }
        
        .coming-soon-badge {
            background: #fff3cd;
            color: #856404;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
            margin-top: 15px;
        }
        
        .back-link {
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-blue);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        
        .back-link:hover {
            gap: 12px;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <main class="admin-main">
            <div class="admin-container">
            <div id="admin-header" data-title="Telegram Upload" data-icon="fab telegram"></div>
                <div class="admin-content">
                    <div class="telegram-container">
                        <div class="telegram-icon">
                            <i class="fab fa-telegram"></i>
                        </div>
                        <h1 class="telegram-title">Telegram Upload</h1>
                        <p class="telegram-message">Upload music files directly to your site via Telegram bot</p>
                        
                        <div class="info-card">
                            <h4><i class="fas fa-info-circle"></i> How it will work</h4>
                            <p><i class="fab fa-telegram"></i> Send audio files to @ZedtopvibesBot</p>
                            <p><i class="fas fa-cloud-upload-alt"></i> Auto-upload to R2 storage</p>
                            <p><i class="fas fa-database"></i> Creates draft song in database</p>
                            <p><i class="fas fa-edit"></i> Edit metadata in admin panel</p>
                            <p><i class="fas fa-bolt"></i> Fast uploads from your phone</p>
                        </div>
                        
                        <div class="coming-soon-badge">
                            <i class="fas fa-cog"></i> Coming Soon
                        </div>
                        
                        <a href="javascript:history.back()" class="back-link">
                            <i class="fas fa-arrow-left"></i>
                            <span>Go Back</span>
                        </a>
                    </div>
                </div>
                
                <div id="admin-footer"></div>
            </div>
        </main>
    </div>

    <script src="/admin/shared/loader.js"></script>
</body>
</html>
