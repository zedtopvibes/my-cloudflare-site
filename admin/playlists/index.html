<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Playlists - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1e3c72;
            --primary-light: #2a4a8a;
            --primary-soft: #e8f0fe;
            --secondary: #00b4d8;
            --success: #10b981;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.5;
        }
        
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .admin-header {
            background: white;
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .header-top h1 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--gray-800);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-top h1 i {
            color: var(--primary);
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--gray-100);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.9rem;
        }
        
        .logout-btn {
            background: none;
            border: none;
            color: var(--gray-600);
            cursor: pointer;
            font-size: 1rem;
        }
        
        .admin-tabs {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        
        .tab-btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--gray-600);
            cursor: pointer;
            white-space: nowrap;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .tab-btn:hover {
            background: var(--gray-100);
            color: var(--primary);
        }
        
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        
        .admin-content {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }
        
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .content-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--gray-700);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .search-section {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            padding: 5px 12px;
            border: 1px solid var(--gray-200);
            min-width: 250px;
        }
        
        .search-box i {
            color: var(--gray-400);
            margin-right: 8px;
        }
        
        .search-box input {
            border: none;
            background: transparent;
            padding: 8px 0;
            width: 100%;
            outline: none;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-light);
        }
        
        .btn-secondary {
            background: var(--gray-100);
            color: var(--gray-700);
            border: 1px solid var(--gray-200);
        }
        
        /* Playlists Grid */
        .playlists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .playlist-card {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .playlist-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }
        
        .playlist-cover {
            height: 140px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
        }
        
        .playlist-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .playlist-cover .default-cover {
            opacity: 0.8;
        }
        
        .playlist-info {
            padding: 16px;
        }
        
        .playlist-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--gray-800);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .playlist-meta {
            display: flex;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--gray-500);
            margin-bottom: 8px;
        }
        
        .playlist-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .playlist-meta i {
            color: var(--primary);
            font-size: 0.75rem;
        }
        
        .playlist-creator {
            font-size: 0.75rem;
            color: var(--gray-500);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-500);
        }
        
        .empty-state i {
            font-size: 4rem;
            color: var(--gray-300);
            margin-bottom: 16px;
        }
        
        .empty-state h3 {
            font-size: 1.2rem;
            color: var(--gray-700);
            margin-bottom: 8px;
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
        }
        
        .page-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm);
            background: white;
            cursor: pointer;
        }
        
        .page-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray-500);
        }
        
        @media (max-width: 640px) {
            .playlists-grid {
                grid-template-columns: 1fr;
            }
            
            .content-header {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-section {
                flex-direction: column;
            }
            
            .search-box {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="header-top">
                <h1><i class="fas fa-list"></i> Playlists</h1>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span>Admin</span>
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
            
            <div class="admin-tabs">
                <a href="/admin/" class="tab-btn"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="/admin/upload" class="tab-btn"><i class="fas fa-cloud-upload-alt"></i> Upload</a>
                <a href="/admin/songs" class="tab-btn"><i class="fas fa-music"></i> Songs</a>
                <a href="/admin/albums" class="tab-btn"><i class="fas fa-compact-disc"></i> Albums</a>
                <a href="/admin/artists/index.html" class="tab-btn"><i class="fas fa-microphone"></i> Artists</a>
                <a href="/admin/playlists/index.html" class="tab-btn active"><i class="fas fa-list"></i> Playlists</a>
            </div>
        </div>
        
        <div class="admin-content">
            <div class="content-header">
                <h2>
                    <i class="fas fa-list"></i> All Playlists
                    <button onclick="loadPlaylists()" class="btn btn-secondary" style="margin-left: 8px;">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </h2>
                <div class="search-section">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search playlists..." onkeyup="searchPlaylists()">
                    </div>
                    <a href="/admin/playlists/edit.html" class="btn btn-primary">
                        <i class="fas fa-plus-circle"></i> New Playlist
                    </a>
                </div>
            </div>

            <!-- Playlists Grid -->
            <div id="playlistsGrid" class="playlists-grid">
                <div class="loading">
                    <i class="fas fa-circle-notch fa-spin"></i>
                    <div>Loading playlists...</div>
                </div>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let allPlaylists = [];
        let allTracks = [];
        let currentPage = 1;
        const itemsPerPage = 12;

        function logout() {
            if (confirm('Logout?')) {
                localStorage.clear();
                window.location.href = '/admin/login.html';
            }
        }

        function checkAuth() {
            const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
            if (!isLoggedIn) window.location.href = '/admin/login.html';
            return isLoggedIn;
        }

        async function loadPlaylists() {
            if (!checkAuth()) return;
            
            try {
                const [playlistsRes, tracksRes] = await Promise.all([
                    fetch(`${API_BASE}/playlists`).catch(() => ({ ok: false })),
                    fetch(`${API_BASE}/tracks`).catch(() => ({ ok: false }))
                ]);
                
                allPlaylists = playlistsRes.ok ? await playlistsRes.json() : [];
                allTracks = tracksRes.ok ? await tracksRes.json() : [];
                
                renderPlaylists();
            } catch (error) {
                showError('Failed to load playlists');
            }
        }

        function renderPlaylists() {
            const container = document.getElementById('playlistsGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = allPlaylists.filter(p => 
                p.name.toLowerCase().includes(searchTerm) ||
                (p.description && p.description.toLowerCase().includes(searchTerm))
            );
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-list"></i>
                        <h3>No playlists found</h3>
                        <p>${searchTerm ? 'Try a different search' : 'Create your first playlist'}</p>
                        <a href="/admin/playlists/edit.html" class="btn btn-primary" style="margin-top: 16px;">
                            <i class="fas fa-plus-circle"></i> Create Playlist
                        </a>
                    </div>
                `;
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            // Pagination
            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pagePlaylists = filtered.slice(start, end);
            
            container.innerHTML = pagePlaylists.map(playlist => {
                // Get track count (this would ideally come from API)
                const trackCount = 0; // You'd need an endpoint to get playlist tracks
                
                return `
                <a href="/admin/playlists/profile.html?id=${playlist.id}" class="playlist-card">
                    <div class="playlist-cover">
                        ${playlist.cover_url 
                            ? `<img src="${playlist.cover_url}" alt="${escapeHtml(playlist.name)}">`
                            : `<i class="fas fa-list default-cover"></i>`
                        }
                    </div>
                    <div class="playlist-info">
                        <div class="playlist-name">${escapeHtml(playlist.name)}</div>
                        <div class="playlist-meta">
                            <span><i class="fas fa-music"></i> ${playlist.track_count || 0} tracks</span>
                            <span><i class="fas fa-headphones"></i> ${formatNumber(playlist.plays || 0)}</span>
                        </div>
                        <div class="playlist-creator">
                            <i class="fas fa-user"></i> ${playlist.created_by || 'Zedtopvibes'}
                        </div>
                    </div>
                </a>
            `}).join('');
            
            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            if (totalPages <= 1) {
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            document.getElementById('pagination').innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            renderPlaylists();
        }

        function searchPlaylists() {
            currentPage = 1;
            renderPlaylists();
        }

        function showError(message) {
            document.getElementById('playlistsGrid').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-circle" style="color: #ef4444;"></i>
                    <h3>Error</h3>
                    <p>${message}</p>
                    <button onclick="loadPlaylists()" class="btn btn-primary" style="margin-top: 16px;">Try Again</button>
                </div>
            `;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        // Initialize
        if (checkAuth()) {
            loadPlaylists();
        }
    </script>
</body>
</html>
