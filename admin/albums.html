<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Albums - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-blue: #1f6f9f;
            --primary-light: #2f8ed0;
            --primary-lighter: #70c8ff;
            --primary-dark: #1f4c73;
            --dark: #1a1a1a;
            --gray: #666;
            --light-gray: #f0f2f5;
            --white: #ffffff;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
        }
        
        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--light-gray);
            min-height: 100vh;
            line-height: 1.5;
            color: #333;
        }
        
        .admin-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px;
        }
        
        .admin-header {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .header-top h1 {
            color: var(--primary-blue);
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--light-gray);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            margin-left: auto;
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .user-info i {
            color: var(--primary-blue);
        }
        
        .user-info span {
            font-weight: 600;
        }
        
        .logout-btn {
            color: #666;
            transition: color 0.3s;
            padding: 8px;
            text-decoration: none;
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
        }
        
        .logout-btn:hover {
            color: var(--primary-blue);
        }
        
        .admin-tabs {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding: 5px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .admin-tabs::-webkit-scrollbar {
            display: none;
        }
        
        .tab-btn {
            padding: 10px 15px;
            background: transparent;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        
        .tab-btn i {
            font-size: 1rem;
        }
        
        .tab-btn:hover {
            background: #f0f0f0;
            color: var(--primary-blue);
        }
        
        .tab-btn.active {
            background: var(--primary-blue);
            color: white;
        }
        
        .admin-content {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(31, 111, 159, 0.1);
            min-height: 500px;
        }
        
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .content-header h2 {
            font-size: 1.3rem;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .content-header h2 i {
            color: var(--primary-blue);
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        
        .btn-primary {
            background: var(--primary-blue);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(31, 111, 159, 0.3);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid rgba(31, 111, 159, 0.15);
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }
        
        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-blue);
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid rgba(31, 111, 159, 0.15);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(31, 111, 159, 0.1);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state i {
            font-size: 4rem;
            color: var(--primary-blue);
            margin-bottom: 15px;
            opacity: 0.5;
        }
        
        .empty-state h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--primary-dark);
        }
        
        .stats-summary {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            background: rgba(31, 111, 159, 0.03);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 0.9rem;
        }
        
        .stat-item i {
            color: var(--primary-blue);
        }
        
        .stat-item strong {
            color: var(--primary-dark);
        }
        
        .albums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .album-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid rgba(31, 111, 159, 0.15);
            transition: all 0.3s;
        }
        
        .album-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary-blue);
            box-shadow: 0 5px 20px rgba(31, 111, 159, 0.2);
        }
        
        .album-thumbnail {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #1f6f9f, #70c8ff);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
        }
        
        .album-info {
            padding: 15px;
        }
        
        .album-info h3 {
            margin-bottom: 5px;
            color: var(--primary-dark);
        }
        
        .album-info p {
            color: var(--primary-blue);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        .album-stats {
            display: flex;
            gap: 10px;
            font-size: 0.8rem;
            color: #666;
        }
        
        @media (min-width: 768px) {
            .admin-container {
                padding: 20px;
            }
            
            .admin-header {
                padding: 20px 25px;
            }
            
            .header-top h1 {
                font-size: 1.5rem;
            }
        }
        
        @media (max-width: 480px) {
            .admin-header {
                padding: 12px;
            }
            
            .header-top h1 {
                font-size: 1.1rem;
            }
            
            .user-info {
                padding: 5px 10px;
                font-size: 0.8rem;
            }
            
            .tab-btn {
                padding: 8px 12px;
                font-size: 0.8rem;
            }
            
            .content-header {
                flex-direction: column;
                align-items: stretch;
            }
            
            .btn {
                width: 100%;
            }
            
            .albums-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Header -->
        <div class="admin-header">
            <div class="header-top">
                <h1>
                    <i class="fas fa-cog"></i> 
                    Albums
                </h1>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span>Admin</span>
                    <button class="logout-btn" title="Logout" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
            
            <!-- Navigation Tabs -->
            <div class="admin-tabs">
                <a href="index.html" class="tab-btn"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="upload.html" class="tab-btn"><i class="fas fa-cloud-upload-alt"></i> Upload</a>
                <a href="songs.html" class="tab-btn"><i class="fas fa-music"></i> Songs</a>
                <a href="albums.html" class="tab-btn active"><i class="fas fa-compact-disc"></i> Albums</a>
                <a href="artists.html" class="tab-btn"><i class="fas fa-microphone"></i> Artists</a>
                <a href="playlists.html" class="tab-btn"><i class="fas fa-list"></i> Playlists</a>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="admin-content">
            <div class="content-header">
                <h2><i class="fas fa-compact-disc"></i> Albums Management</h2>
                <button class="btn btn-primary" onclick="alert('Create album feature coming soon!')">
                    <i class="fas fa-plus"></i> Create Album
                </button>
            </div>
            
            <div class="stats-summary">
                <div class="stat-item"><i class="fas fa-compact-disc"></i> Total Albums: <strong>0</strong></div>
                <div class="stat-item"><i class="fas fa-music"></i> Total Songs: <strong>0</strong></div>
                <div class="stat-item"><i class="fas fa-eye"></i> Total Views: <strong>0</strong></div>
            </div>
            
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search albums..." disabled>
            </div>
            
            <div class="empty-state">
                <i class="fas fa-compact-disc"></i>
                <h3>No Albums Yet</h3>
                <p style="margin-bottom: 20px;">Create your first album to get started</p>
                <button class="btn btn-primary" onclick="alert('Create album feature coming soon!')">
                    <i class="fas fa-plus"></i> Create Album
                </button>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.clear();
                window.location.href = '/admin/login.html';
            }
        }
    </script>
</body>
</html>
