<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>YT Stats - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/admin/shared/styles.css">
    <style>
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .achievement-card {
            background: var(--light-gray);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(31,111,159,0.15);
            transition: all 0.3s;
        }
        .achievement-card.unlocked {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }
        .achievement-card.unlocked i {
            color: white;
        }
        .achievement-card i {
            font-size: 1.5rem;
            margin-bottom: 6px;
            color: var(--primary-blue);
        }
        .achievement-card .achievement-name {
            font-size: 0.75rem;
            font-weight: 600;
        }
        .achievement-card .achievement-target {
            font-size: 0.65rem;
            opacity: 0.8;
        }
        .best-day-card {
            background: var(--light-gray);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(31,111,159,0.15);
        }
        .best-day-card .best-day-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-blue);
        }
        .auto-target-card {
            background: var(--light-gray);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(31,111,159,0.15);
        }
        .auto-target-card .target-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-blue);
        }
        @media (max-width: 768px) {
            .achievements-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <main class="admin-main">
            <div class="admin-container">
                <div id="admin-header" data-title="YT Stats" data-icon="fab fa-youtube"></div>
                
                <div class="admin-content">
                    <!-- Fetch Button Section -->
                    <div style="margin-bottom: 24px; text-align: center;">
                        <button id="fetchBtn" class="btn btn-primary">
                            <i class="fab fa-youtube"></i> Fetch Latest Stats
                        </button>
                        <div id="lastFetchInfo" style="margin-top: 8px; font-size: 0.75rem; color: var(--gray);"></div>
                    </div>

                    <!-- Stats Grid -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-users"></i></div>
                            <div class="stat-value" id="currentSubs">—</div>
                            <div class="stat-label">Subscribers</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-eye"></i></div>
                            <div class="stat-value" id="totalViews">—</div>
                            <div class="stat-label">Total Views</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-video"></i></div>
                            <div class="stat-value" id="totalVideos">—</div>
                            <div class="stat-label">Videos</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                            <div class="stat-value" id="weeklyGain">—</div>
                            <div class="stat-label">Weekly Gain</div>
                        </div>
                    </div>

                    <!-- Best Day & Auto Target Row -->
                    <div class="views-grid" style="margin-bottom: 24px;">
                        <div class="best-day-card">
                            <i class="fas fa-trophy" style="font-size: 1.5rem; margin-bottom: 8px; color: var(--primary-blue);"></i>
                            <div class="best-day-value" id="bestDayValue">—</div>
                            <div class="best-day-label" style="font-size: 0.75rem; color: var(--gray);">🏆 Best Day Gain</div>
                            <div id="bestDayDate" style="font-size: 0.7rem; color: var(--gray);">—</div>
                        </div>
                        <div class="auto-target-card">
                            <i class="fas fa-bullseye" style="font-size: 1.5rem; margin-bottom: 8px; color: var(--primary-blue);"></i>
                            <div class="target-value" id="autoTarget">—</div>
                            <div class="target-label" style="font-size: 0.75rem; color: var(--gray);">🎯 Next Milestone</div>
                            <div id="remainingToTarget" style="font-size: 0.7rem; color: var(--gray);">—</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-calendar-week"></i></div>
                            <div class="stat-value" id="weeklySubGain">—</div>
                            <div class="stat-label">Subs (Last 7 Days)</div>
                        </div>
                    </div>

                    <!-- Achievements Section -->
                    <div class="section-header">
                        <i class="fas fa-medal"></i>
                        <h3>Achievements 🏆</h3>
                    </div>
                    <div class="achievements-grid" id="achievementsGrid">
                        <!-- Filled by JS -->
                    </div>

                    <!-- Progress Bar Section -->
                    <div class="section-header">
                        <i class="fas fa-bullseye"></i>
                        <h3>Subscriber Goal Progress</h3>
                        <button id="editGoalBtn" class="settings-btn" style="margin-left: auto;"><i class="fas fa-cog"></i> Set Goal</button>
                    </div>
                    
                    <div style="margin-bottom: 24px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem;">
                            <span id="currentProgressText">—</span>
                            <span id="goalTargetText">Goal: —</span>
                        </div>
                        <div class="progress-bar-container" style="background: var(--light-gray); border-radius: 10px; height: 30px; overflow: hidden;">
                            <div id="progressFill" class="progress-bar-fill" style="width: 0%; background: var(--primary-blue); height: 100%; display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; color: white; font-weight: bold; border-radius: 10px;">
                                0%
                            </div>
                        </div>
                    </div>

                    <!-- History Table -->
                    <div class="section-header">
                        <i class="fas fa-history"></i>
                        <h3>Historical Data</h3>
                    </div>
                    
                    <div style="overflow-x: auto;">
                        <table class="stats-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Subscribers</th>
                                    <th>Views</th>
                                    <th>Videos</th>
                                    <th>Daily Change</th>
                                </tr>
                            </thead>
                            <tbody id="historyTableBody">
                                <tr>
                                    <td colspan="5" style="padding: 40px; text-align: center; color: var(--gray);">
                                        <i class="fas fa-spinner fa-spin"></i> Loading...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <div id="admin-footer"></div>
            </div>
        </main>
    </div>

    <!-- Goal Settings Modal -->
    <div id="goalModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-bullseye"></i> Set Subscriber Goal</h3>
                <button class="close-btn" onclick="closeGoalModal()">&times;</button>
            </div>
            <div class="form-group">
                <label><i class="fas fa-users"></i> Target Subscribers</label>
                <input type="number" id="goalInput" class="form-control" placeholder="Enter goal number" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="closeGoalModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveGoal()">Save Goal</button>
            </div>
        </div>
    </div>

    <script src="/admin/shared/loader.js"></script>
    <script>
        let currentGoal = 1000;
        let currentSubs = 0;

        // Achievement milestones (auto-updates)
        const milestones = [100, 250, 500, 1000, 2500, 5000, 10000, 25000, 50000, 100000];
        
        // Modal functions
        function openGoalModal() {
            document.getElementById('goalModal').style.display = 'flex';
            document.getElementById('goalInput').value = currentGoal;
        }

        function closeGoalModal() {
            document.getElementById('goalModal').style.display = 'none';
        }

        // Fetch goal from API
        async function loadGoal() {
            try {
                const response = await fetch('/api/admin/yt-goal', {
                    credentials: 'include'
                });
                const result = await response.json();
                if (result.success && result.data) {
                    currentGoal = result.data.target_subs;
                    document.getElementById('goalTargetText').innerText = `Goal: ${currentGoal.toLocaleString()}`;
                    updateProgressBar();
                }
            } catch (error) {
                console.error('Error loading goal:', error);
            }
        }

        // Save goal
        async function saveGoal() {
            const newGoal = parseInt(document.getElementById('goalInput').value);
            if (isNaN(newGoal) || newGoal <= 0) {
                alert('Please enter a valid number');
                return;
            }
            
            try {
                const response = await fetch('/api/admin/yt-goal/update', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ target_subs: newGoal, enabled: true })
                });
                const result = await response.json();
                if (result.success) {
                    currentGoal = newGoal;
                    document.getElementById('goalTargetText').innerText = `Goal: ${currentGoal.toLocaleString()}`;
                    updateProgressBar();
                    closeGoalModal();
                } else {
                    alert('Error saving goal');
                }
            } catch (error) {
                console.error('Error saving goal:', error);
                alert('Error saving goal');
            }
        }

        // Update progress bar
        function updateProgressBar() {
            const percent = Math.min((currentSubs / currentGoal) * 100, 100);
            const progressFill = document.getElementById('progressFill');
            progressFill.style.width = percent + '%';
            progressFill.innerHTML = Math.round(percent) + '%';
            document.getElementById('currentProgressText').innerHTML = `${currentSubs.toLocaleString()} / ${currentGoal.toLocaleString()}`;
        }

        // Update achievements display (auto-updates based on currentSubs)
        function updateAchievements(subs) {
            const container = document.getElementById('achievementsGrid');
            container.innerHTML = '';
            
            // Show next 6 milestones
            const nextMilestones = milestones.filter(m => m <= subs * 2).slice(0, 6);
            
            nextMilestones.forEach(milestone => {
                const unlocked = subs >= milestone;
                const card = document.createElement('div');
                card.className = `achievement-card ${unlocked ? 'unlocked' : ''}`;
                card.innerHTML = `
                    <i class="fas ${unlocked ? 'fa-check-circle' : 'fa-lock'}"></i>
                    <div class="achievement-name">${milestone.toLocaleString()} Subs</div>
                    <div class="achievement-target">${unlocked ? 'Unlocked! 🎉' : `${(milestone - subs).toLocaleString()} to go`}</div>
                `;
                container.appendChild(card);
            });
        }

        // Update auto target (automatically finds next milestone)
        function updateAutoTarget(subs) {
            const nextMilestone = milestones.find(m => m > subs);
            if (nextMilestone) {
                const remaining = nextMilestone - subs;
                document.getElementById('autoTarget').innerHTML = `${nextMilestone.toLocaleString()} subs`;
                document.getElementById('remainingToTarget').innerHTML = `${remaining.toLocaleString()} more to go 🎯`;
            } else {
                document.getElementById('autoTarget').innerHTML = `Legend! 🏆`;
                document.getElementById('remainingToTarget').innerHTML = `You're crushing it!`;
            }
        }

        // Update best day
        function updateBestDay(statsData) {
            if (!statsData || statsData.length < 2) {
                document.getElementById('bestDayValue').innerHTML = '—';
                document.getElementById('bestDayDate').innerHTML = 'Not enough data';
                return;
            }
            
            let bestGain = 0;
            let bestDate = '';
            
            for (let i = 0; i < statsData.length - 1; i++) {
                const gain = statsData[i].subscribers - statsData[i + 1].subscribers;
                if (gain > bestGain) {
                    bestGain = gain;
                    bestDate = statsData[i].date;
                }
            }
            
            if (bestGain > 0) {
                document.getElementById('bestDayValue').innerHTML = `+${bestGain.toLocaleString()}`;
                document.getElementById('bestDayDate').innerHTML = bestDate;
            } else {
                document.getElementById('bestDayValue').innerHTML = '—';
                document.getElementById('bestDayDate').innerHTML = 'No gains yet';
            }
        }

        // Fetch stats from YouTube and save
        async function fetchYouTubeStats() {
            const fetchBtn = document.getElementById('fetchBtn');
            const originalText = fetchBtn.innerHTML;
            fetchBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Fetching...';
            fetchBtn.disabled = true;
            
            try {
                const response = await fetch('/api/admin/yt-stats/fetch', {
                    credentials: 'include'
                });
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('lastFetchInfo').innerHTML = `<i class="fas fa-check-circle" style="color: var(--success);"></i> Last fetched: ${result.data.date}`;
                    loadDashboard();
                    loadHistory();
                } else {
                    alert('Error: ' + (result.error || 'Failed to fetch stats'));
                }
            } catch (error) {
                console.error('Error fetching stats:', error);
                alert('Error connecting to server');
            } finally {
                fetchBtn.innerHTML = originalText;
                fetchBtn.disabled = false;
            }
        }

        // Load dashboard stats
        async function loadDashboard() {
            try {
                const statsResponse = await fetch('/api/admin/yt-stats', {
                    credentials: 'include'
                });
                const statsResult = await statsResponse.json();
                
                if (statsResult.success && statsResult.data && statsResult.data.length > 0) {
                    const latest = statsResult.data[0];
                    currentSubs = latest.subscribers;
                    document.getElementById('currentSubs').innerHTML = currentSubs.toLocaleString();
                    document.getElementById('totalViews').innerHTML = latest.total_views.toLocaleString();
                    document.getElementById('totalVideos').innerHTML = latest.videos_uploaded;
                    updateProgressBar();
                    updateAchievements(currentSubs);
                    updateAutoTarget(currentSubs);
                    updateBestDay(statsResult.data);
                } else {
                    document.getElementById('currentSubs').innerHTML = 'No data';
                    document.getElementById('totalViews').innerHTML = 'No data';
                    document.getElementById('totalVideos').innerHTML = 'No data';
                }
                
                const weeklyResponse = await fetch('/api/admin/yt-stats/weekly/summary', {
                    credentials: 'include'
                });
                const weeklyResult = await weeklyResponse.json();
                if (weeklyResult.success && weeklyResult.data) {
                    const weeklyGain = weeklyResult.data.weekly_gain;
                    document.getElementById('weeklyGain').innerHTML = (weeklyGain >= 0 ? '+' : '') + weeklyGain.toLocaleString();
                    document.getElementById('weeklySubGain').innerHTML = (weeklyGain >= 0 ? '+' : '') + weeklyGain.toLocaleString();
                }
                
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        // Load history table
        async function loadHistory() {
            try {
                const response = await fetch('/api/admin/yt-stats', {
                    credentials: 'include'
                });
                const result = await response.json();
                
                const tbody = document.getElementById('historyTableBody');
                
                if (!result.success || !result.data || result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="padding: 40px; text-align: center; color: var(--gray);"><i class="fas fa-database"></i> No data yet. Click "Fetch Latest Stats" to get started.</td></tr>';
                    return;
                }
                
                tbody.innerHTML = '';
                for (let i = 0; i < result.data.length; i++) {
                    const stat = result.data[i];
                    let dailyChange = '';
                    let changeClass = '';
                    
                    if (i < result.data.length - 1) {
                        const change = stat.subscribers - result.data[i + 1].subscribers;
                        dailyChange = change > 0 ? `+${change}` : change;
                        changeClass = change > 0 ? 'style="color: var(--success);"' : (change < 0 ? 'style="color: var(--error);"' : '');
                    } else {
                        dailyChange = '-';
                    }
                    
                    const row = tbody.insertRow();
                    row.insertCell(0).innerHTML = stat.date;
                    row.insertCell(1).innerHTML = `<strong>${stat.subscribers.toLocaleString()}</strong>`;
                    row.insertCell(2).innerHTML = stat.total_views.toLocaleString();
                    row.insertCell(3).innerHTML = stat.videos_uploaded;
                    row.insertCell(4).innerHTML = `<span ${changeClass}>${dailyChange}</span>`;
                }
                
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }

        // Event listeners
        document.getElementById('fetchBtn').addEventListener('click', fetchYouTubeStats);
        document.getElementById('editGoalBtn').addEventListener('click', openGoalModal);
        
        window.onclick = function(event) {
            const modal = document.getElementById('goalModal');
            if (event.target === modal) {
                closeGoalModal();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadGoal();
            loadDashboard();
            loadHistory();
        });
    </script>
</body>
</html>
