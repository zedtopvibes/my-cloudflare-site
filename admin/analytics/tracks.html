<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Track Analytics - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-blue: #1f6f9f;
            --primary-light: #2f8ed0;
            --primary-lighter: #70c8ff;
            --primary-dark: #1f4c73;
            --gray: #666;
            --light-gray: #f0f2f5;
            --white: #ffffff;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --success: #10b981;
            --warning: #f59e0b;
            --info: #3b82f6;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--light-gray);
            min-height: 100vh;
            color: #333;
        }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px;
        }
        
        .admin-header {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .header-top h1 {
            color: var(--primary-blue);
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--light-gray);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .user-info i {
            color: var(--primary-blue);
        }
        
        .user-info span {
            font-weight: 600;
        }
        
        .admin-tabs {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding: 5px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .admin-tabs::-webkit-scrollbar {
            display: none;
        }
        
        .tab-btn {
            padding: 10px 15px !important;
            background: transparent;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem !important;
            font-weight: 600 !important;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            height: 40px !important;
        }
        
        .tab-btn i {
            font-size: 1rem !important;
        }
        
        .tab-btn:hover {
            background: #f0f0f0;
            color: var(--primary-blue);
        }
        
        .tab-btn.active {
            background: var(--primary-blue);
            color: white;
        }
        
        .admin-content {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .content-header {
            margin-bottom: 24px;
        }
        
        .content-header h2 {
            font-size: 1.3rem;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .content-header h2 i {
            color: var(--primary-blue);
        }
        
        .content-header p {
            color: var(--gray);
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        /* Stats Grid - Mobile first 2 columns, tablet 2 columns, desktop 3 columns */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--light-gray);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(31, 111, 159, 0.15);
        }
        
        .stat-card:hover {
            border-color: var(--primary-blue);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(31, 111, 159, 0.15);
        }
        
        .stat-card .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .stat-card .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-blue);
            line-height: 1.2;
            margin-bottom: 5px;
        }
        
        .stat-card .stat-label {
            font-size: 0.75rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-card.primary-gradient {
            background: linear-gradient(135deg, #1f6f9f 0%, #2f8ed0 100%);
        }
        
        .stat-card.primary-gradient .stat-value,
        .stat-card.primary-gradient .stat-label,
        .stat-card.primary-gradient .stat-icon {
            color: white !important;
        }
        
        /* Search & Filter Section */
        .search-section {
            margin-bottom: 20px;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background: var(--light-gray);
            border-radius: 8px;
            padding: 10px 15px;
            border: 1px solid #ddd;
            margin-bottom: 12px;
        }
        
        .search-box i {
            color: var(--primary-blue);
            margin-right: 10px;
        }
        
        .search-box input {
            border: none;
            background: transparent;
            padding: 5px 0;
            width: 100%;
            outline: none;
            font-size: 0.9rem;
        }
        
        .filter-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-select {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: var(--white);
            font-size: 0.85rem;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
        }
        
        /* Track Cards - Mobile first grid */
        .tracks-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        
        .track-card {
            background: var(--light-gray);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(31, 111, 159, 0.1);
            transition: all 0.3s ease;
        }
        
        .track-card:hover {
            border-color: var(--primary-blue);
            transform: translateX(5px);
        }
        
        .track-rank {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            background: var(--primary-blue);
            color: white;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        
        .track-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 6px;
            word-break: break-word;
        }
        
        .track-artist {
            font-size: 0.85rem;
            color: var(--gray);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }
        
        .track-artist i {
            color: var(--primary-blue);
            font-size: 0.7rem;
            width: 16px;
        }
        
        .track-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .track-meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            color: var(--gray);
        }
        
        .track-meta-item i {
            color: var(--primary-blue);
            font-size: 0.7rem;
        }
        
        .track-views {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-blue);
        }
        
        .track-views i {
            font-size: 0.8rem;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .status-badge.published {
            background: #d4edda;
            color: #155724;
        }
        
        .status-badge.draft {
            background: #fff3cd;
            color: #856404;
        }
        
        /* Loading & Empty States */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        
        .loading i {
            font-size: 2.5rem;
            color: var(--primary-blue);
            margin-bottom: 16px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
        }
        
        .empty-state i {
            font-size: 3rem;
            color: var(--primary-blue);
            margin-bottom: 15px;
            opacity: 0.3;
        }
        
        .empty-state h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--primary-dark);
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .page-btn {
            width: 36px;
            height: 36px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .page-btn:hover {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }
        
        .page-btn.active {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }
        
        /* Tablet Styles */
        @media (min-width: 768px) {
            .admin-container {
                padding: 15px;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .search-section {
                display: flex;
                gap: 12px;
                align-items: center;
                flex-wrap: wrap;
            }
            
            .search-box {
                flex: 2;
                margin-bottom: 0;
            }
            
            .filter-row {
                flex: 1;
            }
            
            .tracks-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        /* Desktop Styles */
        @media (min-width: 1024px) {
            .admin-container {
                padding: 20px;
            }
            
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="header-top">
                <h1><i class="fas fa-chart-line"></i> Track Analytics</h1>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span>Admin</span>
                </div>
            </div>
            
            <div class="admin-tabs">
                <a href="/admin/" class="tab-btn"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="/admin/upload" class="tab-btn"><i class="fas fa-cloud-upload-alt"></i> Upload</a>
                <a href="/admin/songs" class="tab-btn"><i class="fas fa-music"></i> Songs</a>
                <a href="/admin/albums/index.html" class="tab-btn"><i class="fas fa-compact-disc"></i> Albums</a>
                <a href="/admin/eps/index.html" class="tab-btn"><i class="fas fa-play-circle"></i> EPs</a>
                <a href="/admin/artists/index.html" class="tab-btn"><i class="fas fa-microphone"></i> Artists</a>
                <a href="/admin/playlists/index.html" class="tab-btn"><i class="fas fa-list"></i> Playlists</a>
                <a href="/admin/analytics/index.html" class="tab-btn"><i class="fas fa-chart-line"></i> Analytics</a>
                <a href="/admin/analytics/tracks.html" class="tab-btn active"><i class="fas fa-music"></i> Tracks</a>
                <a href="/admin/analytics/albums.html" class="tab-btn"><i class="fas fa-compact-disc"></i> Albums</a>
                <a href="/admin/analytics/eps.html" class="tab-btn"><i class="fas fa-play-circle"></i> EPs</a>
                <a href="/admin/analytics/artists.html" class="tab-btn"><i class="fas fa-microphone"></i> Artists</a>
                <a href="/admin/analytics/playlists.html" class="tab-btn"><i class="fas fa-list"></i> Playlists</a>
                <a href="/admin/trash.html" class="tab-btn"><i class="fas fa-trash-alt"></i> Trash</a>
            </div>
        </div>
        
        <div class="admin-content" id="analyticsContent">
            <div class="loading">
                <i class="fas fa-circle-notch fa-spin"></i>
                <div>Loading track analytics...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        
        let tracks = [];
        let filteredTracks = [];
        let currentPage = 1;
        const itemsPerPage = 10;
        
        function checkAuth() {
            const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
            const loginTime = localStorage.getItem('admin_login_time');
            
            if (!isLoggedIn || !loginTime) {
                window.location.href = '/admin/login.html';
                return false;
            }
            
            const hoursSince = (Date.now() - parseInt(loginTime)) / (1000 * 60 * 60);
            if (hoursSince > 24) {
                localStorage.clear();
                window.location.href = '/admin/login.html';
                return false;
            }
            return true;
        }
        
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        function formatDuration(seconds) {
            if (!seconds) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function getArtistName(track) {
            if (track.artists && track.artists.length > 0) {
                const primary = track.artists.find(a => a.is_primary === 1) || track.artists[0];
                return primary.name;
            }
            return track.artist_name || track.artist || 'Unknown Artist';
        }
        
        async function loadTracks() {
            try {
                const response = await fetch(`${API_BASE}/admin/tracks`);
                if (!response.ok) throw new Error('Failed to load tracks');
                
                tracks = await response.json();
                filteredTracks = [...tracks];
                
                // Default sort by most views
                filteredTracks.sort((a, b) => (b.views || 0) - (a.views || 0));
                
                renderAnalytics();
                
            } catch (error) {
                console.error('Error loading tracks:', error);
                document.getElementById('analyticsContent').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle" style="color: #ef4444;"></i>
                        <h3>Failed to Load Tracks</h3>
                        <p style="margin: 12px 0;">${error.message}</p>
                        <button onclick="loadTracks()" class="tab-btn active" style="background: var(--primary-blue); color: white; border: none; cursor: pointer;">Try Again</button>
                    </div>
                `;
            }
        }
        
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const statusFilter = document.getElementById('statusFilter')?.value || 'all';
            const sortBy = document.getElementById('sortFilter')?.value || 'views-desc';
            
            filteredTracks = tracks.filter(track => {
                const titleMatch = track.title?.toLowerCase().includes(searchTerm);
                const artistMatch = getArtistName(track).toLowerCase().includes(searchTerm);
                const matchesSearch = !searchTerm || titleMatch || artistMatch;
                const matchesStatus = statusFilter === 'all' || track.status === statusFilter;
                return matchesSearch && matchesStatus;
            });
            
            // Apply sort
            if (sortBy === 'views-desc') {
                filteredTracks.sort((a, b) => (b.views || 0) - (a.views || 0));
            } else if (sortBy === 'views-asc') {
                filteredTracks.sort((a, b) => (a.views || 0) - (b.views || 0));
            } else if (sortBy === 'title-asc') {
                filteredTracks.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
            } else if (sortBy === 'title-desc') {
                filteredTracks.sort((a, b) => (b.title || '').localeCompare(a.title || ''));
            } else if (sortBy === 'duration-asc') {
                filteredTracks.sort((a, b) => (a.duration || 0) - (b.duration || 0));
            } else if (sortBy === 'duration-desc') {
                filteredTracks.sort((a, b) => (b.duration || 0) - (a.duration || 0));
            }
            
            currentPage = 1;
            renderTracksList();
        }
        
        function renderAnalytics() {
            const totalViews = tracks.reduce((sum, t) => sum + (t.views || 0), 0);
            const totalTracks = tracks.length;
            const publishedTracks = tracks.filter(t => t.status === 'published').length;
            const avgViews = totalTracks > 0 ? Math.round(totalViews / totalTracks) : 0;
            
            const html = `
                <div class="content-header">
                    <h2><i class="fas fa-music"></i> Track Views Analytics</h2>
                    <p>Detailed view statistics for all tracks</p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card primary-gradient">
                        <div class="stat-icon"><i class="fas fa-eye"></i></div>
                        <div class="stat-value">${formatNumber(totalViews)}</div>
                        <div class="stat-label">Total Track Views</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-music"></i></div>
                        <div class="stat-value">${totalTracks}</div>
                        <div class="stat-label">Total Tracks</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-globe"></i></div>
                        <div class="stat-value">${publishedTracks}</div>
                        <div class="stat-label">Published Tracks</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                        <div class="stat-value">${formatNumber(avgViews)}</div>
                        <div class="stat-label">Avg Views per Track</div>
                    </div>
                </div>
                
                <div class="search-section">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search by title or artist...">
                    </div>
                    <div class="filter-row">
                        <select id="statusFilter" class="filter-select">
                            <option value="all">All Status</option>
                            <option value="published">Published</option>
                            <option value="draft">Draft</option>
                        </select>
                        <select id="sortFilter" class="filter-select">
                            <option value="views-desc">Most Views</option>
                            <option value="views-asc">Least Views</option>
                            <option value="title-asc">Title A-Z</option>
                            <option value="title-desc">Title Z-A</option>
                            <option value="duration-desc">Longest</option>
                            <option value="duration-asc">Shortest</option>
                        </select>
                    </div>
                </div>
                
                <div id="tracksContainer">
                    <div class="loading">
                        <i class="fas fa-circle-notch fa-spin"></i>
                        <div>Loading tracks...</div>
                    </div>
                </div>
                
                <div id="pagination" class="pagination"></div>
            `;
            
            document.getElementById('analyticsContent').innerHTML = html;
            
            document.getElementById('searchInput').addEventListener('input', applyFilters);
            document.getElementById('statusFilter').addEventListener('change', applyFilters);
            document.getElementById('sortFilter').addEventListener('change', applyFilters);
            
            renderTracksList();
        }
        
        function renderTracksList() {
            const container = document.getElementById('tracksContainer');
            const paginationContainer = document.getElementById('pagination');
            
            if (filteredTracks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-music"></i>
                        <h3>No Tracks Found</h3>
                        <p>Try adjusting your search or filters</p>
                    </div>
                `;
                paginationContainer.innerHTML = '';
                return;
            }
            
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageTracks = filteredTracks.slice(start, end);
            const totalPages = Math.ceil(filteredTracks.length / itemsPerPage);
            
            let tracksHtml = '<div class="tracks-grid">';
            
            pageTracks.forEach((track, index) => {
                const globalRank = start + index + 1;
                const views = track.views || 0;
                const artistName = getArtistName(track);
                const statusClass = track.status === 'published' ? 'published' : 'draft';
                const statusIcon = track.status === 'published' ? 'fa-globe' : 'fa-pencil-alt';
                const statusText = track.status === 'published' ? 'Published' : 'Draft';
                
                tracksHtml += `
                    <div class="track-card">
                        <div class="track-rank">#${globalRank}</div>
                        <div class="track-title">${escapeHtml(track.title || 'Untitled')}</div>
                        <div class="track-artist">
                            <i class="fas fa-user"></i>
                            ${escapeHtml(artistName)}
                        </div>
                        <div class="track-meta">
                            <div class="track-meta-item">
                                <i class="fas fa-clock"></i>
                                ${formatDuration(track.duration)}
                            </div>
                            <div class="track-meta-item">
                                <i class="fas fa-tag"></i>
                                ${escapeHtml(track.genre) || 'No Genre'}
                            </div>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                            <div class="track-views">
                                <i class="fas fa-eye"></i>
                                ${formatNumber(views)} views
                            </div>
                            <span class="status-badge ${statusClass}">
                                <i class="fas ${statusIcon}"></i>
                                ${statusText}
                            </span>
                        </div>
                    </div>
                `;
            });
            
            tracksHtml += '</div>';
            container.innerHTML = tracksHtml;
            
            if (totalPages > 1) {
                let paginationHtml = '';
                for (let i = 1; i <= totalPages; i++) {
                    paginationHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                }
                paginationContainer.innerHTML = paginationHtml;
            } else {
                paginationContainer.innerHTML = '';
            }
        }
        
        function goToPage(page) {
            currentPage = page;
            renderTracksList();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            if (checkAuth()) {
                loadTracks();
            }
        });
    </script>
