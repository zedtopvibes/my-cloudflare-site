<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Analytics - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-blue: #1f6f9f;
            --primary-light: #2f8ed0;
            --primary-lighter: #70c8ff;
            --primary-dark: #1f4c73;
            --gray: #666;
            --light-gray: #f0f2f5;
            --white: #ffffff;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --success: #10b981;
            --warning: #f59e0b;
            --info: #3b82f6;
            --skeleton-bg: #e2e8f0;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--light-gray);
            min-height: 100vh;
            color: #333;
            display: flex;
            flex-direction: column;
        }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px;
            flex: 1;
            width: 100%;
        }
        
        .admin-header {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .header-top h1 {
            color: var(--primary-blue);
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--light-gray);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .user-info i {
            color: var(--primary-blue);
            font-size: 0.9rem;
        }
        
        .user-info span {
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .admin-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 5px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .admin-tabs::-webkit-scrollbar {
            display: none;
        }
        
        .tab-btn {
            padding: 8px 14px;
            background: transparent;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            height: 36px;
        }
        
        .tab-btn i {
            font-size: 0.85rem;
        }
        
        .tab-btn:hover {
            background: #f0f0f0;
            color: var(--primary-blue);
        }
        
        .tab-btn.active {
            background: var(--primary-blue);
            color: white;
        }
        
        .admin-content {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(31, 111, 159, 0.1);
            width: 100%;
            overflow-x: hidden;
        }
        
        .content-header {
            margin-bottom: 24px;
        }
        
        .content-header h2 {
            font-size: 1.2rem;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .content-header h2 i {
            color: var(--primary-blue);
        }
        
        .content-header p {
            color: var(--gray);
            font-size: 0.85rem;
            margin-top: 5px;
        }
        
        /* Total Views Card - Full Width */
        .total-views-card {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-light) 100%);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            margin-bottom: 30px;
            color: white;
            width: 100%;
        }
        
        .total-views-card .views-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }
        
        .total-views-card .views-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .total-views-card .views-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        /* Section Header */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0 15px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid rgba(31, 111, 159, 0.2);
        }
        
        .section-header:first-of-type {
            margin-top: 0;
        }
        
        .section-header h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .section-header i {
            color: var(--primary-blue);
            font-size: 0.9rem;
        }
        
        /* Views by Type Grid */
        .views-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .view-card {
            background: var(--white);
            padding: 12px 8px;
            border-radius: 12px;
            border: 1px solid rgba(31, 111, 159, 0.15);
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .view-card:hover {
            border-color: var(--primary-blue);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(31, 111, 159, 0.1);
        }
        
        .view-card .view-icon {
            font-size: 1.2rem;
            margin-bottom: 4px;
        }
        
        .view-card .view-value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-blue);
        }
        
        .view-card .view-label {
            font-size: 0.65rem;
            color: var(--gray);
            margin-top: 2px;
        }
        
        .view-card .view-sub {
            font-size: 0.55rem;
            color: #999;
            margin-top: 2px;
        }
        
        /* Top Content Cards */
        .top-content-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .top-content-item {
            background: var(--light-gray);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(31, 111, 159, 0.1);
            transition: all 0.3s ease;
        }
        
        .top-content-item:hover {
            border-color: var(--primary-blue);
            transform: translateX(5px);
        }
        
        .top-content-rank {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            background: var(--primary-blue);
            color: white;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        
        .top-content-info {
            flex: 1;
        }
        
        .top-content-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 6px;
            word-break: break-word;
        }
        
        .top-content-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .content-type-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .content-type-badge.track {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .content-type-badge.album {
            background: #f3e5f5;
            color: #7b1fa2;
        }
        
        .content-type-badge.ep {
            background: #fff3e0;
            color: #f57c00;
        }
        
        .content-type-badge.artist {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .content-type-badge.playlist {
            background: #fce4ec;
            color: #c2185b;
        }
        
        .top-content-subtitle {
            font-size: 0.75rem;
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }
        
        .top-content-subtitle i {
            color: var(--primary-blue);
            font-size: 0.7rem;
            width: 16px;
        }
        
        .top-content-views {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary-blue);
            margin-top: 10px;
        }
        
        .top-content-views i {
            font-size: 0.7rem;
        }
        
        /* Loading & Empty States */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        
        .loading i {
            font-size: 2rem;
            color: var(--primary-blue);
            margin-bottom: 12px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
        }
        
        .empty-state i {
            font-size: 2.5rem;
            color: var(--primary-blue);
            margin-bottom: 12px;
            opacity: 0.3;
        }
        
        .empty-state h3 {
            font-size: 1rem;
            margin-bottom: 6px;
            color: var(--primary-dark);
        }
        
        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--skeleton-bg) 25%, #f1f5f9 50%, var(--skeleton-bg) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .skeleton-card {
            height: 100px;
        }
        
        .skeleton-value {
            height: 32px;
            width: 60%;
            margin: 8px auto;
        }
        
        .skeleton-label {
            height: 14px;
            width: 40%;
            margin: 0 auto;
        }
        
        .skeleton-row {
            height: 100px;
            margin-bottom: 12px;
        }
        
        /* Footer */
        .admin-footer {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            text-align: center;
            border: 1px solid rgba(31, 111, 159, 0.1);
            color: var(--gray);
            font-size: 0.75rem;
        }
        
        .admin-footer a {
            color: var(--primary-blue);
            text-decoration: none;
        }
        
        .admin-footer a:hover {
            text-decoration: underline;
        }
        
        /* Responsive */
        @media (min-width: 768px) {
            .admin-container { padding: 15px; }
            .total-views-card .views-value { font-size: 3rem; }
            .views-grid { grid-template-columns: repeat(5, 1fr); }
            .view-card .view-value { font-size: 1.2rem; }
            .view-card .view-icon { font-size: 1.5rem; }
            .top-content-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        }
        
        @media (max-width: 640px) {
            .total-views-card .views-value { font-size: 2rem; }
            .views-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="header-top">
                <h1><i class="fas fa-chart-line"></i> Analytics</h1>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span>Admin</span>
                </div>
            </div>
            
            <div class="admin-tabs">
                <a href="/admin/" class="tab-btn"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="/admin/upload.html" class="tab-btn"><i class="fas fa-cloud-upload-alt"></i> Upload</a>
                <a href="/admin/songs.html" class="tab-btn"><i class="fas fa-music"></i> Songs</a>
                <a href="/admin/albums/index.html" class="tab-btn"><i class="fas fa-compact-disc"></i> Albums</a>
                <a href="/admin/eps/index.html" class="tab-btn"><i class="fas fa-play-circle"></i> EPs</a>
                <a href="/admin/artists/index.html" class="tab-btn"><i class="fas fa-microphone"></i> Artists</a>
                <a href="/admin/playlists/index.html" class="tab-btn"><i class="fas fa-list"></i> Playlists</a>
                <a href="/admin/genres/index.html" class="tab-btn"><i class="fas fa-tag"></i> Genres</a>
                <a href="/admin/pages/index.html" class="tab-btn"><i class="fas fa-file-alt"></i> Pages</a>
                <a href="/admin/analytics/index.html" class="tab-btn active"><i class="fas fa-chart-line"></i> Analytics</a>
                <a href="/admin/trash.html" class="tab-btn"><i class="fas fa-trash-alt"></i> Trash</a>
            </div>
        </div>
        
        <div class="admin-content" id="analyticsContent">
            <!-- Skeleton Loader -->
            <div class="content-header">
                <h2><i class="fas fa-chart-line"></i> <span class="skeleton" style="width: 180px; height: 28px; display: inline-block;"></span></h2>
                <p><span class="skeleton" style="width: 250px; height: 16px; display: inline-block;"></span></p>
            </div>
            
            <!-- Total Views Card - Full Width -->
            <div class="total-views-card skeleton">
                <div class="skeleton-icon skeleton" style="width: 40px; height: 40px; margin: 0 auto 12px; border-radius: 50%;"></div>
                <div class="skeleton-value skeleton" style="width: 150px; height: 40px; margin: 0 auto 8px;"></div>
                <div class="skeleton-label skeleton" style="width: 120px; height: 16px; margin: 0 auto;"></div>
            </div>
            
            <div class="section-header">
                <i class="fas fa-chart-bar"></i>
                <h3>Views by Content Type</h3>
            </div>
            <div class="views-grid">
                <div class="view-card skeleton-card"><div class="skeleton-value skeleton"></div><div class="skeleton-label skeleton"></div></div>
                <div class="view-card skeleton-card"><div class="skeleton-value skeleton"></div><div class="skeleton-label skeleton"></div></div>
                <div class="view-card skeleton-card"><div class="skeleton-value skeleton"></div><div class="skeleton-label skeleton"></div></div>
                <div class="view-card skeleton-card"><div class="skeleton-value skeleton"></div><div class="skeleton-label skeleton"></div></div>
                <div class="view-card skeleton-card"><div class="skeleton-value skeleton"></div><div class="skeleton-label skeleton"></div></div>
            </div>
            
            <div class="section-header">
                <i class="fas fa-trophy"></i>
                <h3>Top 10 Most Viewed Content</h3>
            </div>

                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
            </div>
        </div>
        
        <div class="admin-footer">
            <p>© 2024 ZEDTOPVIBES. All rights reserved. | <a href="/admin/">Admin</a> | <a href="/">Visit Site</a></p>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        
        function checkAuth() {
            const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
            const loginTime = localStorage.getItem('admin_login_time');
            
            if (!isLoggedIn || !loginTime) {
                window.location.href = '/admin/login.html';
                return false;
            }
            
            const hoursSince = (Date.now() - parseInt(loginTime)) / (1000 * 60 * 60);
            if (hoursSince > 24) {
                localStorage.clear();
                window.location.href = '/admin/login.html';
                return false;
            }
            return true;
        }
        
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function loadTopContent() {
            // Fetch only the data needed for top 10
            const [tracksRes, albumsRes, epsRes, artistsRes, playlistsRes] = await Promise.all([
                fetch(`${API_BASE}/admin/tracks`),
                fetch(`${API_BASE}/admin/albums`),
                fetch(`${API_BASE}/admin/eps`),
                fetch(`${API_BASE}/admin/artists`),
                fetch(`${API_BASE}/admin/playlists`)
            ]);
            
            const tracks = await tracksRes.json();
            const albums = await albumsRes.json();
            const eps = await epsRes.json();
            const artists = await artistsRes.json();
            const playlists = await playlistsRes.json();
            
            const allContent = [];
            
            tracks.forEach(track => {
                allContent.push({
                    id: track.id,
                    title: track.title,
                    type: 'track',
                    views: track.views || 0,
                    subtitle: track.artist_name || track.artist || 'Unknown Artist'
                });
            });
            
            albums.forEach(album => {
                allContent.push({
                    id: album.id,
                    title: album.title,
                    type: 'album',
                    views: album.views || 0,
                    subtitle: album.artist_name || album.artist || 'Unknown Artist'
                });
            });
            
            eps.forEach(ep => {
                allContent.push({
                    id: ep.id,
                    title: ep.title,
                    type: 'ep',
                    views: ep.views || 0,
                    subtitle: ep.artist_name || ep.artist || 'Unknown Artist'
                });
            });
            
            artists.forEach(artist => {
                allContent.push({
                    id: artist.id,
                    title: artist.name,
                    type: 'artist',
                    views: artist.views || 0,
                    subtitle: artist.country || 'Artist'
                });
            });
            
            playlists.forEach(playlist => {
                allContent.push({
                    id: playlist.id,
                    title: playlist.name,
                    type: 'playlist',
                    views: playlist.views || 0,
                    subtitle: playlist.track_count ? `${playlist.track_count} tracks` : 'Playlist'
                });
            });
            
            const topContent = allContent.sort((a, b) => b.views - a.views).slice(0, 10);
            
            if (topContent.length === 0) {
                return '<div class="empty-state"><i class="fas fa-chart-line"></i><h3>No Data Available</h3><p>Upload content to see analytics</p></div>';
            }
            
            return `
                <div class="top-content-list">
                    ${topContent.map((item, index) => {
                        let typeIcon = '';
                        let typeClass = '';
                        switch(item.type) {
                            case 'track':
                                typeIcon = '<i class="fas fa-music"></i>';
                                typeClass = 'track';
                                break;
                            case 'album':
                                typeIcon = '<i class="fas fa-compact-disc"></i>';
                                typeClass = 'album';
                                break;
                            case 'ep':
                                typeIcon = '<i class="fas fa-play-circle"></i>';
                                typeClass = 'ep';
                                break;
                            case 'artist':
                                typeIcon = '<i class="fas fa-microphone"></i>';
                                typeClass = 'artist';
                                break;
                            case 'playlist':
                                typeIcon = '<i class="fas fa-list"></i>';
                                typeClass = 'playlist';
                                break;
                        }
                        return `
                            <div class="top-content-item">
                                <div class="top-content-rank">#${index + 1}</div>
                                <div class="top-content-info">
                                    <div class="top-content-title">${escapeHtml(item.title)}</div>
                                    <div class="top-content-meta">
                                        <span class="content-type-badge ${typeClass}">${typeIcon} ${item.type.toUpperCase()}</span>
                                        <div class="top-content-subtitle">
                                            <i class="fas ${item.type === 'artist' ? 'fa-globe' : 'fa-user'}"></i>
                                            ${escapeHtml(item.subtitle)}
                                        </div>
                                    </div>
                                    <div class="top-content-views">
                                        <i class="fas fa-eye"></i> ${formatNumber(item.views)} views
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }
        
        async function loadAnalyticsData() {
            try {
                // First load stats from lightweight endpoint
                const statsResponse = await fetch(`${API_BASE}/admin/stats`);
                const statsResult = await statsResponse.json();
                
                if (!statsResult.success) {
                    throw new Error(statsResult.error || 'Failed to load stats');
                }
                
                const stats = statsResult.data;
                
                const totalViews = stats.total_views;
                const totalTrackViews = stats.tracks.total_views;
                const totalAlbumViews = stats.albums.total_views;
                const totalEPViews = stats.eps.total_views;
                const totalArtistViews = stats.artists.total_views;
                const totalPlaylistViews = stats.playlists.total_views;
                
                const totalTracks = stats.tracks.total;
                const totalAlbums = stats.albums.total;
                const totalEPs = stats.eps.total;
                const totalArtists = stats.artists.total;
                const totalPlaylists = stats.playlists.total;
                
                // Update stats section
                const statsHtml = `
                    <div class="content-header">
                        <h2><i class="fas fa-chart-line"></i> Views Analytics</h2>
                        <p>Comprehensive view statistics across all content types</p>
                    </div>
                    
                    <div class="total-views-card">
                        <div class="views-icon"><i class="fas fa-eye"></i></div>
                        <div class="views-value">${formatNumber(totalViews)}</div>
                        <div class="views-label">Total Views Across All Content</div>
                    </div>
                    
                    <div class="section-header">
                        <i class="fas fa-chart-bar"></i>
                        <h3>Views by Content Type</h3>
                    </div>
                    <div class="views-grid">
                        <div class="view-card" onclick="window.location.href='/admin/analytics/tracks.html'">
                            <div class="view-icon"><i class="fas fa-music"></i></div>
                            <div class="view-value">${formatNumber(totalTrackViews)}</div>
                            <div class="view-label">Tracks</div>
                            <div class="view-sub">${totalTracks} total</div>
                        </div>
                        <div class="view-card" onclick="window.location.href='/admin/analytics/albums.html'">
                            <div class="view-icon"><i class="fas fa-compact-disc"></i></div>
                            <div class="view-value">${formatNumber(totalAlbumViews)}</div>
                            <div class="view-label">Albums</div>
                            <div class="view-sub">${totalAlbums} total</div>
                        </div>
                        <div class="view-card" onclick="window.location.href='/admin/analytics/eps.html'">
                            <div class="view-icon"><i class="fas fa-play-circle"></i></div>
                            <div class="view-value">${formatNumber(totalEPViews)}</div>
                            <div class="view-label">EPs</div>
                            <div class="view-sub">${totalEPs} total</div>
                        </div>
                        <div class="view-card" onclick="window.location.href='/admin/analytics/artists.html'">
                            <div class="view-icon"><i class="fas fa-microphone"></i></div>
                            <div class="view-value">${formatNumber(totalArtistViews)}</div>
                            <div class="view-label">Artists</div>
                            <div class="view-sub">${totalArtists} total</div>
                        </div>
                        <div class="view-card" onclick="window.location.href='/admin/analytics/playlists.html'">
                            <div class="view-icon"><i class="fas fa-list"></i></div>
                            <div class="view-value">${formatNumber(totalPlaylistViews)}</div>
                            <div class="view-label">Playlists</div>
                            <div class="view-sub">${totalPlaylists} total</div>
                        </div>
                    </div>
                    
                    <div class="section-header">
                        <i class="fas fa-trophy"></i>
                        <h3>Top 10 Most Viewed Content</h3>
                    </div>
                    <div id="topContentContainer">
                        <div class="skeleton-row"></div>
                        <div class="skeleton-row"></div>
                        <div class="skeleton-row"></div>
                    </div>
                `;
                
                document.getElementById('analyticsContent').innerHTML = statsHtml;
                
                // Then load top content separately (can be async)
                const topContentHtml = await loadTopContent();
                document.getElementById('topContentContainer').innerHTML = topContentHtml;
                
            } catch (error) {
                console.error('Error loading analytics:', error);
                document.getElementById('analyticsContent').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle" style="color: #ef4444;"></i>
                        <h3>Failed to Load Analytics</h3>
                        <p style="margin: 12px 0;">${error.message}</p>
                        <button onclick="loadAnalyticsData()" class="btn btn-primary" style="background: var(--primary-blue); color: white; border: none; cursor: pointer; padding: 10px 20px; border-radius: 8px;">Try Again</button>
                    </div>
                `;
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            if (checkAuth()) {
                loadAnalyticsData();
            }
        });
    </script>
</body>
</html>
