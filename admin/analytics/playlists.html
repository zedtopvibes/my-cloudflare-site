<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Playlist Analytics - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/admin/shared/styles.css">
    <style>
        /* ========== PLAYLIST ANALYTICS PAGE SPECIFIC STYLES ========== */
        .content-header {
            margin-bottom: 24px;
        }
        
        .content-header h2 {
            font-size: 1.3rem;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .content-header h2 i {
            color: var(--primary-blue);
        }
        
        .content-header p {
            color: var(--gray);
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--light-gray);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(31, 111, 159, 0.15);
        }
        
        .stat-card:hover {
            border-color: var(--primary-blue);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(31, 111, 159, 0.15);
        }
        
        .stat-card .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .stat-card .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-blue);
            line-height: 1.2;
            margin-bottom: 5px;
        }
        
        .stat-card .stat-label {
            font-size: 0.75rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-card.primary-gradient {
            background: linear-gradient(135deg, #1f6f9f 0%, #2f8ed0 100%);
        }
        
        .stat-card.primary-gradient .stat-value,
        .stat-card.primary-gradient .stat-label,
        .stat-card.primary-gradient .stat-icon {
            color: white !important;
        }
        
        .search-section {
            margin-bottom: 20px;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background: var(--light-gray);
            border-radius: 8px;
            padding: 10px 15px;
            border: 1px solid #ddd;
            margin-bottom: 12px;
        }
        
        .search-box i {
            color: var(--primary-blue);
            margin-right: 10px;
        }
        
        .search-box input {
            border: none;
            background: transparent;
            padding: 5px 0;
            width: 100%;
            outline: none;
            font-size: 0.9rem;
        }
        
        .filter-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-select {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: var(--white);
            font-size: 0.85rem;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
        }
        
        .playlists-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        
        .playlist-card {
            background: var(--light-gray);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(31, 111, 159, 0.1);
            transition: all 0.3s ease;
        }
        
        .playlist-card:hover {
            border-color: var(--primary-blue);
            transform: translateX(5px);
        }
        
        .playlist-rank {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            background: var(--primary-blue);
            color: white;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        
        .playlist-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 6px;
            word-break: break-word;
        }
        
        .playlist-description {
            font-size: 0.8rem;
            color: var(--gray);
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .playlist-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .playlist-stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            color: var(--gray);
        }
        
        .playlist-stat-item i {
            color: var(--primary-blue);
            font-size: 0.7rem;
        }
        
        .playlist-views {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-blue);
        }
        
        .playlist-views i {
            font-size: 0.8rem;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        
        .loading i {
            font-size: 2.5rem;
            color: var(--primary-blue);
            margin-bottom: 16px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
        }
        
        .empty-state i {
            font-size: 3rem;
            color: var(--primary-blue);
            margin-bottom: 15px;
            opacity: 0.3;
        }
        
        .empty-state h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--primary-dark);
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .page-btn {
            width: 36px;
            height: 36px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .page-btn:hover {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }
        
        .page-btn.active {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }
        
        .skeleton {
            background: linear-gradient(90deg, var(--skeleton-bg) 25%, #f1f5f9 50%, var(--skeleton-bg) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .skeleton-stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .skeleton-stat-card {
            height: 140px;
            border-radius: 12px;
        }
        
        .skeleton-search {
            height: 50px;
            margin-bottom: 20px;
        }
        
        .skeleton-row {
            height: 200px;
            margin-bottom: 12px;
            border-radius: 12px;
        }
        
        @media (min-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .skeleton-stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .search-section {
                display: flex;
                gap: 12px;
                align-items: center;
                flex-wrap: wrap;
            }
            .search-box {
                flex: 2;
                margin-bottom: 0;
            }
            .filter-row {
                flex: 1;
            }
            .playlists-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (min-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .skeleton-stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <main class="admin-main">
            <div class="admin-container">
                <div id="admin-header" data-title="Playlist Analytics" data-icon="chart-line"></div>
                
                <div class="admin-content" id="analyticsContent">
                    <div class="content-header">
                        <h2><i class="fas fa-list"></i> <span class="skeleton" style="width: 220px; height: 28px; display: inline-block;"></span></h2>
                        <p><span class="skeleton" style="width: 280px; height: 16px; display: inline-block;"></span></p>
                    </div>
                    
                    <div class="skeleton-stats-grid">
                        <div class="skeleton-stat-card skeleton"></div>
                        <div class="skeleton-stat-card skeleton"></div>
                        <div class="skeleton-stat-card skeleton"></div>
                        <div class="skeleton-stat-card skeleton"></div>
                    </div>
                    
                    <div class="skeleton-search skeleton"></div>
                    
                    <div class="playlists-grid">
                        <div class="skeleton-row skeleton"></div>
                        <div class="skeleton-row skeleton"></div>
                        <div class="skeleton-row skeleton"></div>
                    </div>
                </div>
                
                <div id="admin-footer"></div>
            </div>
        </main>
    </div>

    <script src="/admin/shared/loader.js"></script>
    <script>
        // ========== PLAYLIST ANALYTICS SPECIFIC CODE ==========
        const API_BASE = '/api';
        
        let playlists = [];
        let filteredPlaylists = [];
        let currentPage = 1;
        const itemsPerPage = 10;
        
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        async function loadPlaylists() {
            try {
                const response = await fetch(`${API_BASE}/admin/playlists`);
                if (!response.ok) throw new Error('Failed to load playlists');
                
                playlists = await response.json();
                filteredPlaylists = [...playlists];
                
                filteredPlaylists.sort((a, b) => (b.views || 0) - (a.views || 0));
                
                renderAnalytics();
                
            } catch (error) {
                console.error('Error loading playlists:', error);
                document.getElementById('analyticsContent').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle" style="color: #ef4444;"></i>
                        <h3>Failed to Load Playlists</h3>
                        <p style="margin: 12px 0;">${error.message}</p>
                        <button onclick="loadPlaylists()" class="tab-btn active" style="background: var(--primary-blue); color: white; border: none; cursor: pointer;">Try Again</button>
                    </div>
                `;
            }
        }
        
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const sortBy = document.getElementById('sortFilter')?.value || 'views-desc';
            
            filteredPlaylists = playlists.filter(playlist => {
                const nameMatch = playlist.name?.toLowerCase().includes(searchTerm);
                const descriptionMatch = playlist.description?.toLowerCase().includes(searchTerm);
                return !searchTerm || nameMatch || descriptionMatch;
            });
            
            if (sortBy === 'views-desc') {
                filteredPlaylists.sort((a, b) => (b.views || 0) - (a.views || 0));
            } else if (sortBy === 'views-asc') {
                filteredPlaylists.sort((a, b) => (a.views || 0) - (b.views || 0));
            } else if (sortBy === 'name-asc') {
                filteredPlaylists.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
            } else if (sortBy === 'name-desc') {
                filteredPlaylists.sort((a, b) => (b.name || '').localeCompare(a.name || ''));
            } else if (sortBy === 'tracks-desc') {
                filteredPlaylists.sort((a, b) => (b.track_count || 0) - (a.track_count || 0));
            } else if (sortBy === 'tracks-asc') {
                filteredPlaylists.sort((a, b) => (a.track_count || 0) - (b.track_count || 0));
            }
            
            currentPage = 1;
            renderPlaylistsList();
        }
        
        function renderAnalytics() {
            const totalViews = playlists.reduce((sum, p) => sum + (p.views || 0), 0);
            const totalPlaylists = playlists.length;
            const totalTracks = playlists.reduce((sum, p) => sum + (p.track_count || 0), 0);
            const avgViews = totalPlaylists > 0 ? Math.round(totalViews / totalPlaylists) : 0;
            
            const html = `
                <div class="content-header">
                    <h2><i class="fas fa-list"></i> Playlist Views Analytics</h2>
                    <p>Detailed view statistics for all playlists</p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card primary-gradient">
                        <div class="stat-icon"><i class="fas fa-eye"></i></div>
                        <div class="stat-value">${formatNumber(totalViews)}</div>
                        <div class="stat-label">Total Playlist Views</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-list"></i></div>
                        <div class="stat-value">${totalPlaylists}</div>
                        <div class="stat-label">Total Playlists</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-music"></i></div>
                        <div class="stat-value">${totalTracks}</div>
                        <div class="stat-label">Total Tracks in Playlists</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                        <div class="stat-value">${formatNumber(avgViews)}</div>
                        <div class="stat-label">Avg Views per Playlist</div>
                    </div>
                </div>
                
                <div class="search-section">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search by playlist name or description...">
                    </div>
                    <div class="filter-row">
                        <select id="sortFilter" class="filter-select">
                            <option value="views-desc">Most Views</option>
                            <option value="views-asc">Least Views</option>
                            <option value="name-asc">Name A-Z</option>
                            <option value="name-desc">Name Z-A</option>
                            <option value="tracks-desc">Most Tracks</option>
                            <option value="tracks-asc">Least Tracks</option>
                        </select>
                    </div>
                </div>
                
                <div id="playlistsContainer">
                    <div class="loading">
                        <i class="fas fa-circle-notch fa-spin"></i>
                        <div>Loading playlists...</div>
                    </div>
                </div>
                
                <div id="pagination" class="pagination"></div>
            `;
            
            document.getElementById('analyticsContent').innerHTML = html;
            
            document.getElementById('searchInput').addEventListener('input', applyFilters);
            document.getElementById('sortFilter').addEventListener('change', applyFilters);
            
            renderPlaylistsList();
        }
        
        function renderPlaylistsList() {
            const container = document.getElementById('playlistsContainer');
            const paginationContainer = document.getElementById('pagination');
            
            if (filteredPlaylists.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-list"></i>
                        <h3>No Playlists Found</h3>
                        <p>Try adjusting your search or create some playlists</p>
                    </div>
                `;
                paginationContainer.innerHTML = '';
                return;
            }
            
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pagePlaylists = filteredPlaylists.slice(start, end);
            const totalPages = Math.ceil(filteredPlaylists.length / itemsPerPage);
            
            let playlistsHtml = '<div class="playlists-grid">';
            
            pagePlaylists.forEach((playlist, index) => {
                const globalRank = start + index + 1;
                const views = playlist.views || 0;
                const trackCount = playlist.track_count || 0;
                const description = playlist.description || 'No description available';
                
                playlistsHtml += `
                    <div class="playlist-card">
                        <div class="playlist-rank">#${globalRank}</div>
                        <div class="playlist-name">${escapeHtml(playlist.name)}</div>
                        <div class="playlist-description">${escapeHtml(description)}</div>
                        <div class="playlist-stats">
                            <div class="playlist-stat-item">
                                <i class="fas fa-music"></i>
                                ${trackCount} ${trackCount === 1 ? 'Track' : 'Tracks'}
                            </div>
                        </div>
                        <div class="playlist-views">
                            <i class="fas fa-eye"></i>
                            ${formatNumber(views)} views
                        </div>
                    </div>
                `;
            });
            
            playlistsHtml += '</div>';
            container.innerHTML = playlistsHtml;
            
            if (totalPages > 1) {
                let paginationHtml = '';
                for (let i = 1; i <= totalPages; i++) {
                    paginationHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                }
                paginationContainer.innerHTML = paginationHtml;
            } else {
                paginationContainer.innerHTML = '';
            }
        }
        
        function goToPage(page) {
            currentPage = page;
            renderPlaylistsList();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadPlaylists();
        });
    </script>
</body>
</html>
