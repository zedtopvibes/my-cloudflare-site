<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Artist Analytics - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-blue: #1f6f9f;
            --primary-light: #2f8ed0;
            --primary-lighter: #70c8ff;
            --primary-dark: #1f4c73;
            --gray: #666;
            --light-gray: #f0f2f5;
            --white: #ffffff;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --success: #10b981;
            --warning: #f59e0b;
            --info: #3b82f6;
            --skeleton-bg: #e2e8f0;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--light-gray);
            min-height: 100vh;
            color: #333;
            display: flex;
            flex-direction: column;
        }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px;
            flex: 1;
            width: 100%;
        }
        
        .admin-header {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .header-top h1 {
            color: var(--primary-blue);
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--light-gray);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .user-info i {
            color: var(--primary-blue);
        }
        
        .user-info span {
            font-weight: 600;
        }
        
        .admin-tabs {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding: 5px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .admin-tabs::-webkit-scrollbar {
            display: none;
        }
        
        .tab-btn {
            padding: 10px 15px !important;
            background: transparent;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem !important;
            font-weight: 600 !important;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            height: 40px !important;
        }
        
        .tab-btn i {
            font-size: 1rem !important;
        }
        
        .tab-btn:hover {
            background: #f0f0f0;
            color: var(--primary-blue);
        }
        
        .tab-btn.active {
            background: var(--primary-blue);
            color: white;
        }
        
        .admin-content {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .content-header {
            margin-bottom: 24px;
        }
        
        .content-header h2 {
            font-size: 1.3rem;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .content-header h2 i {
            color: var(--primary-blue);
        }
        
        .content-header p {
            color: var(--gray);
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        /* Stats Grid - Mobile first 2 columns, desktop 3 columns */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--light-gray);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(31, 111, 159, 0.15);
        }
        
        .stat-card:hover {
            border-color: var(--primary-blue);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(31, 111, 159, 0.15);
        }
        
        .stat-card .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .stat-card .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-blue);
            line-height: 1.2;
            margin-bottom: 5px;
        }
        
        .stat-card .stat-label {
            font-size: 0.75rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-card.primary-gradient {
            background: linear-gradient(135deg, #1f6f9f 0%, #2f8ed0 100%);
        }
        
        .stat-card.primary-gradient .stat-value,
        .stat-card.primary-gradient .stat-label,
        .stat-card.primary-gradient .stat-icon {
            color: white !important;
        }
        
        /* Search & Filter Section */
        .search-section {
            margin-bottom: 20px;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background: var(--light-gray);
            border-radius: 8px;
            padding: 10px 15px;
            border: 1px solid #ddd;
            margin-bottom: 12px;
        }
        
        .search-box i {
            color: var(--primary-blue);
            margin-right: 10px;
        }
        
        .search-box input {
            border: none;
            background: transparent;
            padding: 5px 0;
            width: 100%;
            outline: none;
            font-size: 0.9rem;
        }
        
        .filter-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-select {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: var(--white);
            font-size: 0.85rem;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
        }
        
        /* Artist Cards - Mobile first grid */
        .artists-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        
        .artist-card {
            background: var(--light-gray);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(31, 111, 159, 0.1);
            transition: all 0.3s ease;
        }
        
        .artist-card:hover {
            border-color: var(--primary-blue);
            transform: translateX(5px);
        }
        
        .artist-rank {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            background: var(--primary-blue);
            color: white;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        
        .artist-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 6px;
            word-break: break-word;
        }
        
        .artist-country {
            font-size: 0.85rem;
            color: var(--gray);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }
        
        .artist-country i {
            color: var(--primary-blue);
            font-size: 0.7rem;
            width: 16px;
        }
        
        .artist-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .artist-stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            color: var(--gray);
        }
        
        .artist-stat-item i {
            color: var(--primary-blue);
            font-size: 0.7rem;
        }
        
        .artist-views {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-blue);
        }
        
        .artist-views i {
            font-size: 0.8rem;
        }
        
        .artist-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--primary-blue);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .artist-badge.featured {
            background: #f59e0b;
        }
        
        .artist-badge.legend {
            background: #10b981;
        }
        
        /* Loading & Empty States */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        
        .loading i {
            font-size: 2.5rem;
            color: var(--primary-blue);
            margin-bottom: 16px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
        }
        
        .empty-state i {
            font-size: 3rem;
            color: var(--primary-blue);
            margin-bottom: 15px;
            opacity: 0.3;
        }
        
        .empty-state h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--primary-dark);
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .page-btn {
            width: 36px;
            height: 36px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .page-btn:hover {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }
        
        .page-btn.active {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }
        
        /* Skeleton Loader */
        .skeleton {
            background: linear-gradient(90deg, var(--skeleton-bg) 25%, #f1f5f9 50%, var(--skeleton-bg) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .skeleton-stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .skeleton-stat-card {
            height: 140px;
            border-radius: 12px;
        }
        
        .skeleton-search {
            height: 50px;
            margin-bottom: 20px;
        }
        
        .skeleton-card {
            height: 200px;
            border-radius: 12px;
        }
        
        .skeleton-row {
            height: 200px;
            margin-bottom: 12px;
            border-radius: 12px;
        }
        
        /* Footer */
        .admin-footer {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            text-align: center;
            border: 1px solid rgba(31, 111, 159, 0.1);
            color: var(--gray);
            font-size: 0.75rem;
        }
        
        .admin-footer a {
            color: var(--primary-blue);
            text-decoration: none;
        }
        
        .admin-footer a:hover {
            text-decoration: underline;
        }
        
        /* Tablet Styles */
        @media (min-width: 768px) {
            .admin-container {
                padding: 15px;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .skeleton-stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .search-section {
                display: flex;
                gap: 12px;
                align-items: center;
                flex-wrap: wrap;
            }
            
            .search-box {
                flex: 2;
                margin-bottom: 0;
            }
            
            .filter-row {
                flex: 1;
            }
            
            .artists-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        /* Desktop Styles */
        @media (min-width: 1024px) {
            .admin-container {
                padding: 20px;
            }
            
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .skeleton-stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="header-top">
                <h1><i class="fas fa-chart-line"></i> Artist Analytics</h1>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span>Admin</span>
                </div>
            </div>
            
            <div class="admin-tabs">
                <a href="/admin/" class="tab-btn"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="/admin/upload" class="tab-btn"><i class="fas fa-cloud-upload-alt"></i> Upload</a>
                <a href="/admin/songs" class="tab-btn"><i class="fas fa-music"></i> Songs</a>
                <a href="/admin/albums/index.html" class="tab-btn"><i class="fas fa-compact-disc"></i> Albums</a>
                <a href="/admin/eps/index.html" class="tab-btn"><i class="fas fa-play-circle"></i> EPs</a>
                <a href="/admin/artists/index.html" class="tab-btn"><i class="fas fa-microphone"></i> Artists</a>
                <a href="/admin/playlists/index.html" class="tab-btn"><i class="fas fa-list"></i> Playlists</a>
                <a href="/admin/analytics/index.html" class="tab-btn"><i class="fas fa-chart-line"></i> Analytics</a>
                <a href="/admin/analytics/tracks.html" class="tab-btn"><i class="fas fa-music"></i> Tracks</a>
                <a href="/admin/analytics/albums.html" class="tab-btn"><i class="fas fa-compact-disc"></i> Albums</a>
                <a href="/admin/analytics/eps.html" class="tab-btn"><i class="fas fa-play-circle"></i> EPs</a>
                <a href="/admin/analytics/artists.html" class="tab-btn active"><i class="fas fa-microphone"></i> Artists</a>
                <a href="/admin/analytics/playlists.html" class="tab-btn"><i class="fas fa-list"></i> Playlists</a>
                <a href="/admin/trash.html" class="tab-btn"><i class="fas fa-trash-alt"></i> Trash</a>
            </div>
        </div>
        
        <div class="admin-content" id="analyticsContent">
            <!-- Skeleton Loader -->
            <div class="content-header">
                <h2><i class="fas fa-microphone"></i> <span class="skeleton" style="width: 200px; height: 28px; display: inline-block;"></span></h2>
                <p><span class="skeleton" style="width: 300px; height: 16px; display: inline-block;"></span></p>
            </div>
            
            <div class="skeleton-stats-grid">
                <div class="skeleton-stat-card skeleton"></div>
                <div class="skeleton-stat-card skeleton"></div>
                <div class="skeleton-stat-card skeleton"></div>
                <div class="skeleton-stat-card skeleton"></div>
            </div>
            
            <div class="skeleton-search skeleton"></div>
            
            <div class="artists-grid">
                <div class="skeleton-row skeleton"></div>
                <div class="skeleton-row skeleton"></div>
                <div class="skeleton-row skeleton"></div>
            </div>
        </div>
        
        <div class="admin-footer">
            <p>© 2024 ZEDTOPVIBES. All rights reserved. | <a href="/admin/">Admin</a> | <a href="/">Visit Site</a></p>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        
        let artists = [];
        let filteredArtists = [];
        let currentPage = 1;
        const itemsPerPage = 10;
        
        function checkAuth() {
            const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
            const loginTime = localStorage.getItem('admin_login_time');
            
            if (!isLoggedIn || !loginTime) {
                window.location.href = '/admin/login.html';
                return false;
            }
            
            const hoursSince = (Date.now() - parseInt(loginTime)) / (1000 * 60 * 60);
            if (hoursSince > 24) {
                localStorage.clear();
                window.location.href = '/admin/login.html';
                return false;
            }
            return true;
        }
        
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        async function loadArtists() {
            try {
                const response = await fetch(`${API_BASE}/admin/artists`);
                if (!response.ok) throw new Error('Failed to load artists');
                
                artists = await response.json();
                
                // Calculate track, album, and EP counts for each artist
                for (let artist of artists) {
                    // Fetch tracks for this artist
                    const tracksResponse = await fetch(`${API_BASE}/admin/tracks?artist_id=${artist.id}`);
                    const tracks = await tracksResponse.json();
                    artist.track_count = tracks.length || 0;
                    
                    // Fetch albums for this artist
                    const albumsResponse = await fetch(`${API_BASE}/admin/albums?artist_id=${artist.id}`);
                    const albums = await albumsResponse.json();
                    artist.album_count = albums.length || 0;
                    
                    // Fetch EPs for this artist
                    const epsResponse = await fetch(`${API_BASE}/admin/eps?artist_id=${artist.id}`);
                    const eps = await epsResponse.json();
                    artist.ep_count = eps.length || 0;
                }
                
                filteredArtists = [...artists];
                
                // Default sort by most views
                filteredArtists.sort((a, b) => (b.views || 0) - (a.views || 0));
                
                renderAnalytics();
                
            } catch (error) {
                console.error('Error loading artists:', error);
                document.getElementById('analyticsContent').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle" style="color: #ef4444;"></i>
                        <h3>Failed to Load Artists</h3>
                        <p style="margin: 12px 0;">${error.message}</p>
                        <button onclick="loadArtists()" class="tab-btn active" style="background: var(--primary-blue); color: white; border: none; cursor: pointer;">Try Again</button>
                    </div>
                    <div class="admin-footer">
                        <p>© 2024 ZEDTOPVIBES. All rights reserved. | <a href="/admin/">Admin</a> | <a href="/">Visit Site</a></p>
                    </div>
                `;
            }
        }
        
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const sortBy = document.getElementById('sortFilter')?.value || 'views-desc';
            
            filteredArtists = artists.filter(artist => {
                const nameMatch = artist.name?.toLowerCase().includes(searchTerm);
                const countryMatch = artist.country?.toLowerCase().includes(searchTerm);
                return !searchTerm || nameMatch || countryMatch;
            });
            
            // Apply sort
            if (sortBy === 'views-desc') {
                filteredArtists.sort((a, b) => (b.views || 0) - (a.views || 0));
            } else if (sortBy === 'views-asc') {
                filteredArtists.sort((a, b) => (a.views || 0) - (b.views || 0));
            } else if (sortBy === 'name-asc') {
                filteredArtists.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
            } else if (sortBy === 'name-desc') {
                filteredArtists.sort((a, b) => (b.name || '').localeCompare(a.name || ''));
            } else if (sortBy === 'tracks-desc') {
                filteredArtists.sort((a, b) => (b.track_count || 0) - (a.track_count || 0));
            } else if (sortBy === 'tracks-asc') {
                filteredArtists.sort((a, b) => (a.track_count || 0) - (b.track_count || 0));
            } else if (sortBy === 'albums-desc') {
                filteredArtists.sort((a, b) => (b.album_count || 0) - (a.album_count || 0));
            } else if (sortBy === 'albums-asc') {
                filteredArtists.sort((a, b) => (a.album_count || 0) - (b.album_count || 0));
            } else if (sortBy === 'eps-desc') {
                filteredArtists.sort((a, b) => (b.ep_count || 0) - (a.ep_count || 0));
            } else if (sortBy === 'eps-asc') {
                filteredArtists.sort((a, b) => (a.ep_count || 0) - (b.ep_count || 0));
            }
            
            currentPage = 1;
            renderArtistsList();
        }
        
        function renderAnalytics() {
            const totalViews = artists.reduce((sum, a) => sum + (a.views || 0), 0);
            const totalArtists = artists.length;
            const totalTracks = artists.reduce((sum, a) => sum + (a.track_count || 0), 0);
            const avgViews = totalArtists > 0 ? Math.round(totalViews / totalArtists) : 0;
            
            const html = `
                <div class="content-header">
                    <h2><i class="fas fa-microphone"></i> Artist Views Analytics</h2>
                    <p>Detailed view statistics for all artists (profile views only)</p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card primary-gradient">
                        <div class="stat-icon"><i class="fas fa-eye"></i></div>
                        <div class="stat-value">${formatNumber(totalViews)}</div>
                        <div class="stat-label">Total Artist Profile Views</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-microphone"></i></div>
                        <div class="stat-value">${totalArtists}</div>
                        <div class="stat-label">Total Artists</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-music"></i></div>
                        <div class="stat-value">${totalTracks}</div>
                        <div class="stat-label">Total Tracks</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                        <div class="stat-value">${formatNumber(avgViews)}</div>
                        <div class="stat-label">Avg Views per Artist</div>
                    </div>
                </div>
                
                <div class="search-section">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search by artist name or country...">
                    </div>
                    <div class="filter-row">
                        <select id="sortFilter" class="filter-select">
                            <option value="views-desc">Most Profile Views</option>
                            <option value="views-asc">Least Profile Views</option>
                            <option value="name-asc">Name A-Z</option>
                            <option value="name-desc">Name Z-A</option>
                            <option value="tracks-desc">Most Tracks</option>
                            <option value="tracks-asc">Least Tracks</option>
                            <option value="albums-desc">Most Albums</option>
                            <option value="albums-asc">Least Albums</option>
                            <option value="eps-desc">Most EPs</option>
                            <option value="eps-asc">Least EPs</option>
                        </select>
                    </div>
                </div>
                
                <div id="artistsContainer">
                    <div class="loading">
                        <i class="fas fa-circle-notch fa-spin"></i>
                        <div>Loading artists...</div>
                    </div>
                </div>
                
                <div id="pagination" class="pagination"></div>
            `;
            
            document.getElementById('analyticsContent').innerHTML = html;
            
            document.getElementById('searchInput').addEventListener('input', applyFilters);
            document.getElementById('sortFilter').addEventListener('change', applyFilters);
            
            renderArtistsList();
        }
        
        function renderArtistsList() {
            const container = document.getElementById('artistsContainer');
            const paginationContainer = document.getElementById('pagination');
            
            if (filteredArtists.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-microphone"></i>
                        <h3>No Artists Found</h3>
                        <p>Try adjusting your search or create some artists</p>
                    </div>
                `;
                paginationContainer.innerHTML = '';
                return;
            }
            
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageArtists = filteredArtists.slice(start, end);
            const totalPages = Math.ceil(filteredArtists.length / itemsPerPage);
            
            let artistsHtml = '<div class="artists-grid">';
            
            pageArtists.forEach((artist, index) => {
                const globalRank = start + index + 1;
                const views = artist.views || 0;
                const trackCount = artist.track_count || 0;
                const albumCount = artist.album_count || 0;
                const epCount = artist.ep_count || 0;
                const country = artist.country || 'Unknown Location';
                const isFeatured = artist.is_featured === 1 || artist.is_featured === true;
                const isLegend = artist.is_zambian_legend === 1 || artist.is_zambian_legend === true;
                
                artistsHtml += `
                    <div class="artist-card">
                        <div class="artist-rank">#${globalRank}</div>
                        <div class="artist-name">${escapeHtml(artist.name)}</div>
                        <div class="artist-country">
                            <i class="fas fa-map-marker-alt"></i>
                            ${escapeHtml(country)}
                        </div>
                        <div class="artist-stats">
                            <div class="artist-stat-item">
                                <i class="fas fa-music"></i>
                                ${trackCount} ${trackCount === 1 ? 'Track' : 'Tracks'}
                            </div>
                            <div class="artist-stat-item">
                                <i class="fas fa-compact-disc"></i>
                                ${albumCount} ${albumCount === 1 ? 'Album' : 'Albums'}
                            </div>
                            <div class="artist-stat-item">
                                <i class="fas fa-play-circle"></i>
                                ${epCount} ${epCount === 1 ? 'EP' : 'EPs'}
                            </div>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                            <div class="artist-views">
                                <i class="fas fa-eye"></i>
                                ${formatNumber(views)} profile views
                            </div>
                            <div style="display: flex; gap: 8px;">
                                ${isFeatured ? '<span class="artist-badge featured"><i class="fas fa-star"></i> Featured</span>' : ''}
                                ${isLegend ? '<span class="artist-badge legend"><i class="fas fa-crown"></i> Legend</span>' : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            artistsHtml += '</div>';
            container.innerHTML = artistsHtml;
            
            if (totalPages > 1) {
                let paginationHtml = '';
                for (let i = 1; i <= totalPages; i++) {
                    paginationHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                }
                paginationContainer.innerHTML = paginationHtml;
            } else {
                paginationContainer.innerHTML = '';
            }
        }
        
        function goToPage(page) {
            currentPage = page;
            renderArtistsList();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            if (checkAuth()) {
                loadArtists();
            }
        });
    </script>
</body>
</html>
