<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Artist Analytics - Admin | ZEDTOPVIBES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/admin/shared/styles.css">
    <style>
        /* ========== ARTIST ANALYTICS PAGE SPECIFIC STYLES ========== */
        .content-header {
            margin-bottom: 24px;
        }
        
        .content-header h2 {
            font-size: 1.3rem;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .content-header h2 i {
            color: var(--primary-blue);
        }
        
        .content-header p {
            color: var(--gray);
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--light-gray);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(31, 111, 159, 0.15);
        }
        
        .stat-card:hover {
            border-color: var(--primary-blue);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(31, 111, 159, 0.15);
        }
        
        .stat-card .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .stat-card .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-blue);
            line-height: 1.2;
            margin-bottom: 5px;
        }
        
        .stat-card .stat-label {
            font-size: 0.75rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-card.primary-gradient {
            background: linear-gradient(135deg, #1f6f9f 0%, #2f8ed0 100%);
        }
        
        .stat-card.primary-gradient .stat-value,
        .stat-card.primary-gradient .stat-label,
        .stat-card.primary-gradient .stat-icon {
            color: white !important;
        }
        
        .search-section {
            margin-bottom: 20px;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background: var(--light-gray);
            border-radius: 8px;
            padding: 10px 15px;
            border: 1px solid #ddd;
            margin-bottom: 12px;
        }
        
        .search-box i {
            color: var(--primary-blue);
            margin-right: 10px;
        }
        
        .search-box input {
            border: none;
            background: transparent;
            padding: 5px 0;
            width: 100%;
            outline: none;
            font-size: 0.9rem;
        }
        
        .filter-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-select {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: var(--white);
            font-size: 0.85rem;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
        }
        
        .artists-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        
        .artist-card {
            background: var(--light-gray);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(31, 111, 159, 0.1);
            transition: all 0.3s ease;
        }
        
        .artist-card:hover {
            border-color: var(--primary-blue);
            transform: translateX(5px);
        }
        
        .artist-rank {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            background: var(--primary-blue);
            color: white;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        
        .artist-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 6px;
            word-break: break-word;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .artist-country {
            font-size: 0.85rem;
            color: var(--gray);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }
        
        .artist-country i {
            color: var(--primary-blue);
            font-size: 0.7rem;
            width: 16px;
        }
        
        .artist-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(31, 111, 159, 0.1);
        }
        
        .artist-stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            color: var(--gray);
        }
        
        .artist-stat-item i {
            color: var(--primary-blue);
            font-size: 0.7rem;
        }
        
        .artist-views {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-blue);
        }
        
        .artist-views i {
            font-size: 0.8rem;
        }
        
        .artist-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--primary-blue);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .artist-badge.featured {
            background: #f59e0b;
        }
        
        .artist-badge.legend {
            background: #10b981;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        
        .status-badge.published {
            background: #d4edda;
            color: #155724;
        }
        
        .status-badge.draft {
            background: #fff3cd;
            color: #856404;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        
        .loading i {
            font-size: 2.5rem;
            color: var(--primary-blue);
            margin-bottom: 16px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
        }
        
        .empty-state i {
            font-size: 3rem;
            color: var(--primary-blue);
            margin-bottom: 15px;
            opacity: 0.3;
        }
        
        .empty-state h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--primary-dark);
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .page-btn {
            width: 36px;
            height: 36px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .page-btn:hover {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }
        
        .page-btn.active {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }
        
        .skeleton {
            background: linear-gradient(90deg, var(--skeleton-bg) 25%, #f1f5f9 50%, var(--skeleton-bg) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .skeleton-stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .skeleton-stat-card {
            height: 140px;
            border-radius: 12px;
        }
        
        .skeleton-search {
            height: 50px;
            margin-bottom: 20px;
        }
        
        .skeleton-row {
            height: 140px;
            margin-bottom: 12px;
            border-radius: 12px;
        }
        
        @media (min-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            .skeleton-stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            .search-section {
                display: flex;
                gap: 12px;
                align-items: center;
                flex-wrap: wrap;
            }
            .search-box {
                flex: 2;
                margin-bottom: 0;
            }
            .filter-row {
                flex: 1;
            }
            .artists-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 640px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <main class="admin-main">
            <div class="admin-container">
                <div id="admin-header" data-title="Artist Analytics" data-icon="chart-line"></div>
                
                <div class="admin-content" id="analyticsContent">
                    <div class="skeleton-stats-grid">
                        <div class="skeleton-stat-card skeleton"></div>
                        <div class="skeleton-stat-card skeleton"></div>
                        <div class="skeleton-stat-card skeleton"></div>
                        <div class="skeleton-stat-card skeleton"></div>
                    </div>
                    <div class="skeleton-search skeleton"></div>
                    <div class="artists-grid">
                        <div class="skeleton-row skeleton"></div>
                        <div class="skeleton-row skeleton"></div>
                        <div class="skeleton-row skeleton"></div>
                    </div>
                </div>
                
                <div id="admin-footer"></div>
            </div>
        </main>
    </div>

    <script src="/admin/shared/loader.js"></script>
    <script>
        // ========== ARTIST ANALYTICS SPECIFIC CODE ==========
        const API_BASE = '/api';
        
        let currentPage = 1;
        let totalPages = 1;
        const itemsPerPage = 10;
        let currentSearchTerm = '';
        let currentSort = 'views-desc';
        
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function loadAnalytics() {
            try {
                let url = `${API_BASE}/admin/artists/analytics?page=${currentPage}&limit=${itemsPerPage}&sort=${currentSort}`;
                
                if (currentSearchTerm) {
                    url += `&search=${encodeURIComponent(currentSearchTerm)}`;
                }
                
                const response = await fetch(url);
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error || 'Failed to load analytics');
                }
                
                const summary = result.data.summary;
                const artists = result.data.artists;
                const pagination = result.pagination;
                
                totalPages = pagination.total_pages || 1;
                
                renderAnalytics(summary, artists);
                renderPagination();
                
            } catch (error) {
                console.error('Error loading analytics:', error);
                document.getElementById('analyticsContent').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle" style="color: #ef4444;"></i>
                        <h3>Failed to Load Analytics</h3>
                        <p style="margin: 12px 0;">${error.message}</p>
                        <button onclick="loadAnalytics()" class="btn btn-primary" style="background: var(--primary-blue); color: white; border: none; cursor: pointer; padding: 10px 20px; border-radius: 8px;">Try Again</button>
                    </div>
                `;
            }
        }
        
        function renderAnalytics(summary, artists) {
            const totalViews = summary.total_views || 0;
            const totalArtists = summary.total_artists || 0;
            const totalTracks = summary.total_tracks || 0;
            const avgViews = summary.avg_views || 0;
            
            const html = `
                <div class="content-header">
                    <h2><i class="fas fa-microphone"></i> Artist Views Analytics</h2>
                    <p>Detailed view statistics for all artists (profile views only)</p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card primary-gradient">
                        <div class="stat-icon"><i class="fas fa-eye"></i></div>
                        <div class="stat-value">${formatNumber(totalViews)}</div>
                        <div class="stat-label">Total Artist Profile Views</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-microphone"></i></div>
                        <div class="stat-value">${totalArtists}</div>
                        <div class="stat-label">Total Artists</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-music"></i></div>
                        <div class="stat-value">${totalTracks}</div>
                        <div class="stat-label">Total Tracks</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                        <div class="stat-value">${formatNumber(avgViews)}</div>
                        <div class="stat-label">Avg Views per Artist</div>
                    </div>
                </div>
                
                <div class="search-section">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search by artist name or country..." value="${escapeHtml(currentSearchTerm)}">
                    </div>
                    <div class="filter-row">
                        <select id="sortFilter" class="filter-select">
                            <option value="views-desc" ${currentSort === 'views-desc' ? 'selected' : ''}>Most Profile Views</option>
                            <option value="views-asc" ${currentSort === 'views-asc' ? 'selected' : ''}>Least Profile Views</option>
                            <option value="name-asc" ${currentSort === 'name-asc' ? 'selected' : ''}>Name A-Z</option>
                            <option value="name-desc" ${currentSort === 'name-desc' ? 'selected' : ''}>Name Z-A</option>
                            <option value="tracks-desc" ${currentSort === 'tracks-desc' ? 'selected' : ''}>Most Tracks</option>
                            <option value="tracks-asc" ${currentSort === 'tracks-asc' ? 'selected' : ''}>Least Tracks</option>
                        </select>
                    </div>
                </div>
                
                <div id="artistsContainer">
                    <div class="artists-grid">
                        ${artists.map((artist, index) => {
                            const globalRank = ((currentPage - 1) * itemsPerPage) + index + 1;
                            const views = artist.views || 0;
                            const trackCount = artist.track_count || 0;
                            const albumCount = artist.album_count || 0;
                            const epCount = artist.ep_count || 0;
                            const country = artist.country || 'Unknown Location';
                            const isFeatured = artist.is_featured === true;
                            const isLegend = artist.is_zambian_legend === true;
                            const statusBadge = artist.status === 'published' 
                                ? '<span class="status-badge published"><i class="fas fa-globe"></i> Published</span>'
                                : '<span class="status-badge draft"><i class="fas fa-pencil-alt"></i> Draft</span>';
                            
                            const artistImage = artist.image_url || artist.photo_url;
                            
                            return `
                                <div class="artist-card">
                                    <div class="artist-rank">#${globalRank}</div>
                                    <div class="artist-name">${escapeHtml(artist.name)} ${statusBadge}</div>
                                    <div class="artist-country">
                                        <i class="fas fa-map-marker-alt"></i>
                                        ${escapeHtml(country)}
                                    </div>
                                    <div class="artist-stats">
                                        <div class="artist-stat-item">
                                            <i class="fas fa-music"></i>
                                            ${trackCount} ${trackCount === 1 ? 'Track' : 'Tracks'}
                                        </div>
                                        <div class="artist-stat-item">
                                            <i class="fas fa-compact-disc"></i>
                                            ${albumCount} ${albumCount === 1 ? 'Album' : 'Albums'}
                                        </div>
                                        <div class="artist-stat-item">
                                            <i class="fas fa-play-circle"></i>
                                            ${epCount} ${epCount === 1 ? 'EP' : 'EPs'}
                                        </div>
                                    </div>
                                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                                        <div class="artist-views">
                                            <i class="fas fa-eye"></i>
                                            ${formatNumber(views)} profile views
                                        </div>
                                        <div style="display: flex; gap: 8px;">
                                            ${isFeatured ? '<span class="artist-badge featured"><i class="fas fa-star"></i> Featured</span>' : ''}
                                            ${isLegend ? '<span class="artist-badge legend"><i class="fas fa-crown"></i> Legend</span>' : ''}
                                        </div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                
                <div id="pagination" class="pagination"></div>
            `;
            
            document.getElementById('analyticsContent').innerHTML = html;
            
            document.getElementById('searchInput').addEventListener('input', applyFilters);
            document.getElementById('sortFilter').addEventListener('change', applyFilters);
        }
        
        function applyFilters() {
            currentSearchTerm = document.getElementById('searchInput').value;
            currentSort = document.getElementById('sortFilter').value;
            currentPage = 1;
            loadAnalytics();
        }
        
        function renderPagination() {
            const paginationContainer = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                paginationContainer.innerHTML = '';
                return;
            }
            
            let html = '';
            
            if (currentPage > 1) {
                html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})"><i class="fas fa-chevron-left"></i></button>`;
            }
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<button class="page-btn" disabled>...</button>`;
                }
            }
            
            if (currentPage < totalPages) {
                html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})"><i class="fas fa-chevron-right"></i></button>`;
            }
            
            paginationContainer.innerHTML = html;
        }
        
        function goToPage(page) {
            currentPage = page;
            loadAnalytics();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadAnalytics();
        });
    </script>
</body>
</html>
